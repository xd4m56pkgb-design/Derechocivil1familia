  }

  window.addEventListener("error", (e)=>{

  });

  try{
    /* =========================

    ========================= */
    const SCORE_OK = 0.5;
    const SCORE_BAD = 0.20;   // resta
    const SCORE_BLANK = 0;    // no suma ni resta

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LA ADOPCIÓN

Desde antiguo, la adopción supone integrar en una familia a quien no pertenece a ella por consanguinidad, creando una relación de parentesco fundada en el propio acto adoptivo. El art. 108.1 del Código Civil establece que la filiación puede tener lugar por naturaleza y por adopción, y añade que la filiación matrimonial, la no matrimonial y la adoptiva producen los mismos efectos.

La legislación española vigente se caracteriza así por una tendencia a equiparar la filiación adoptiva con la filiación por naturaleza, sobre la base de que, una vez constituida la adopción, no existe razón suficiente para diferenciar entre hijos consanguíneos e hijos adoptivos, especialmente cuando la adopción responde a la inexistencia de filiación biológica.

1.1. Los criterios normativos actualmente imperantes: la Ley 21/1987

Según el propio legislador, el régimen instaurado por la Ley de 1970 resultaba excesivamente permisivo y generaba consecuencias consideradas inaceptables, lo que llevó a la Ley 21/1987 a modificar tanto los criterios normativos como la propia configuración de la adopción. Desde entonces, la adopción pasó a depender en gran medida de una dimensión administrativa y de la intervención de entidades públicas o privadas colaboradoras en su fase de iniciativa. El texto apunta, no obstante, dudas sobre los resultados de este modelo, en la medida en que habría retrasado la adopción y la integración de menores susceptibles de adopción en familias interesadas, aunque deja expresamente al margen un examen profundo de ese debate para centrarse en la sistematización del Derecho vigente.

1.2. La adopción internacional: la Ley 54/2007

La Ley 54/2007, de 28 de diciembre, de adopción internacional, tiene como objeto principal establecer las normas de Derecho internacional privado en esta materia. Su relevancia se proyecta sobre el Código Civil mediante la nueva redacción del apartado 5 del art. 9, que dispone que la adopción internacional se rige por la Ley de Adopción Internacional y que las adopciones constituidas por autoridades extranjeras producirán efectos en España conforme a dicha ley.

1.3. La Ley 26/2015, de 28 de julio, de modificación del sistema de protección a la infancia y ala

adolescencia La aprobación de la LPIA ha tenido una incidencia destacada en esta materia, como muestra el hecho de que su artículo tercero modifique numerosos preceptos de la Ley 54/2007, de adopción internacional.

2. PRESUPUESTOS O REQUISITOS DE LA ADOPCIÓN

El primer presupuesto de la adopción es la situación de desamparo del menor, entendida como una circunstancia de hecho derivada de la falta de ejercicio o del ejercicio incorrecto de las funciones de guarda por parte de padres o tutores, que priva al menor de la asistencia moral o material necesaria, aunque también cabe que los padres atiendan a sus hijos y decidan entregarlos en adopción por motivos particulares. En los supuestos de desamparo, las entidades públicas de protección de menores asumen por ministerio de la ley su tutela automática y deben adoptar las medidas de protección oportunas, pudiendo constituir acogimiento familiar o residencial, temporal o permanente, e incluso guarda con fines de adopción.

La irrevocabilidad de la adopción explica que el art. 175.4 establezca que nadie puede ser adoptado por más de una persona, salvo que la adopción se realice conjunta o sucesivamente por ambos cónyuges o por una pareja unida por relación de afectividad análoga a la conyugal.

También se permite que el matrimonio o la constitución posterior de la pareja posibiliten la adopción de los hijos del consorte o conviviente, y que, en caso de muerte del adoptante o de exclusión prevista legalmente, pueda producirse una nueva adopción. Aunque el sistema parte de la regla del adoptante individual, mantiene la adopción conjunta por parejas matrimoniales o de hecho, dentro de una línea de equiparación normativa entre matrimonio y uniones more uxorio.

2.1. Requisitos de los adoptantes

Presupuesta la plena capacidad de obrar, el Código Civil exige al adoptante haber cumplido veinticinco años. Si existen dos adoptantes, basta con que uno haya alcanzado esa edad.

Además, debe mediar entre adoptante y adoptado una diferencia mínima de dieciséis años y, como regla general, una diferencia máxima de cuarenta y cinco, aunque esta última puede superarse en determinados casos, especialmente cuando se trate de grupos de hermanos o de menores con necesidades especiales. La LPIA introdujo también la posibilidad de adopción conjunta pese a la separación, divorcio o ruptura previa de la pareja, siempre que el adoptando hubiera convivido efectivamente con ambos durante al menos los dos años anteriores a la propuesta de adopción.

La regulación actual permite la adopción por matrimonios o por parejas unidas por análoga relación de afectividad sin referencia al sexo de sus integrantes, lo que cierra la polémica sobre la adopción por parejas homosexuales, y la legislación posterior ha reforzado la plena equiparación jurídica entre matrimonio y pareja estable a efectos de capacidad para adoptar. Desde el punto de vista cronológico, el adoptante debe reunir la edad mínima legal, respetar la diferencia mínima de edad con el adoptado y no superar, por regla general, la diferencia máxima introducida por la ley.

Estas exigencias cronológicas no excluyen otros requisitos. No pueden adoptar los menores de edad, estén o no emancipados, ni quienes no puedan ser tutores conforme al Código Civil.

Tampoco pueden ser adoptantes las personas jurídicas, ya que la posición de adoptante solo puede corresponder a una persona humana.

2.2. El adoptado

La Ley 21/1987 estableció como principio que solo pueden ser adoptados los menores no emancipados, criterio que mantiene la Ley 26/2015. Excepcionalmente, cabe la adopción de un mayor de edad o de un menor emancipado cuando, inmediatamente antes de la emancipación, hubiera existido acogimiento con los futuros adoptantes o convivencia estable con ellos durante al menos un año. Fuera de esa excepción, el adoptado solo necesita haber nacido, tener capacidad jurídica y no haber llegado todavía a la emancipación.

Queda excluida la posibilidad de adoptar a los nascituri o de celebrar pactos válidos sobre su futura adopción. El sistema pretende impedir estas situaciones y, en particular, refuerza esa idea al disponer que el asentimiento de la madre no puede prestarse hasta transcurridas seis semanas desde el parto.

2.3. Las prohibiciones

El art. 175.3 prohíbe la adopción de los descendientes, de los parientes en segundo grado de la línea colateral por consanguinidad o afinidad y del pupilo por su tutor mientras no haya sido aprobada definitivamente la cuenta general justificada de la tutela. La razón de las prohibiciones basadas en el parentesco es que la filiación adoptiva presupone crear parentesco donde no existe, mientras que la prohibición relativa al tutor y al pupilo busca proteger los intereses del tutelado, aplazando la eventual adopción hasta que queden definitivamente aprobadas las cuentas de la tutela.

El art. 175.4 reitera que nadie puede ser adoptado por más de una persona, salvo en los supuestos de adopción conjunta o sucesiva por cónyuges o por parejas unidas por relación de afectividad análoga a la conyugal. También admite la adopción del hijo del cónyuge o del conviviente constituida la pareja, así como una nueva adopción en caso de muerte del adoptante o de exclusión legal. No obstante, el texto subraya que esa posibilidad debe valorarse con prudencia, porque una futura crisis de la pareja no afecta a la adopción, que es irrevocable y mantiene todos sus efectos en el tiempo.

3. EL PROCEDIMIENTO DE ADOPCIÓN

3.1. La propuesta de la entidad pública

El inicio del expediente de adopción exige, con carácter general, una propuesta previa de la entidad pública a favor del adoptante o adoptantes que hayan sido declarados idóneos para el ejercicio de la patria potestad, pudiendo esa declaración ser anterior a la propuesta. La entidad pública ocupa una posición central en el sistema adoptivo instaurado por la Ley 21/1987, dentro de un modelo fuertemente administrativizado, cuya aplicación práctica se traduce en la competencia territorial de las Comunidades Autónomas para desarrollar los aspectos reglamentarios y en la existencia de listas de adoptantes previamente calificados como idóneos.

La LPIA incorpora al Código Civil unas condiciones básicas comunes sobre la declaración de idoneidad, materia que hasta entonces había quedado remitida a normativas autonómicas no siempre coincidentes. El art. 176.3 entiende por idoneidad la capacidad, aptitud y motivación adecuadas para ejercer la responsabilidad parental conforme a las necesidades del menor y a las peculiaridades y consecuencias de la adopción, excluyendo de esa declaración a quienes estén privados o suspendidos en el ejercicio de la patria potestad o tengan confiada la guarda de su hijo a la entidad pública. La idoneidad requiere una valoración psicosocial sobre la situación personal, familiar, relacional y social de los adoptantes, su capacidad para crear vínculos estables y seguros, sus habilidades educativas y su aptitud para atender al menor, y se formaliza mediante resolución. Los candidatos deben asistir a sesiones informativas y de preparación, y en la declaración debe constar además si aceptarían una adopción en la que el menor mantenga relación con su familia de origen. La entidad pública puede también delegar la guarda del menor en situación de desamparo a personas declaradas idóneas y asignadas para su adopción, constituyéndose así la delegación de guarda con fines de adopción.

3.2. La solicitud privada de adopción

Excepcionalmente, el expediente de adopción puede iniciarse sin propuesta de la entidad pública cuando concurre alguna de las circunstancias legalmente tasadas. Ello sucede si el adoptando es huérfano y pariente del adoptante en tercer grado por consanguinidad o afinidad, si es hijo del cónyuge o de la persona unida al adoptante por relación de afectividad análoga a la conyugal, si lleva más de un año en guarda con fines de adopción o bajo tutela del adoptante, o si es mayor de edad o menor emancipado.

En los tres primeros casos, la adopción puede constituirse incluso aunque el adoptante haya fallecido, siempre que hubiera prestado ya su consentimiento ante el juez o en documento público o testamento, retrotrayéndose los efectos de la resolución judicial a la fecha de ese consentimiento. El texto destaca además la relevancia práctica de la adopción del hijo del cónyuge, especialmente en matrimonios del mismo sexo, aunque señala que esta vía perdió parte de su centralidad tras la reforma de la Ley 14/2006, que permitió a las esposas prestar consentimiento para la determinación de la filiación del menor.

3.3. El proceso de jurisdicción voluntaria

Tras la Ley 15/2015, el expediente de adopción pasa a regularse en la Ley de Jurisdicción Voluntaria, correspondiendo al juez de primera instancia de la sede de la entidad pública o, en su defecto, del domicilio del adoptante, dictar el auto con intervención del Ministerio Fiscal. Desde el punto de vista sustantivo, el art. 177 del Código Civil distingue entre consentimiento, asentimiento y audiencia de las personas relacionadas con la adopción.

Deben consentir la adopción, en presencia del juez, el adoptante o adoptantes y el adoptando mayor de doce años. Deben asentir el cónyuge o la persona unida al adoptante por relación análoga, salvo separación, divorcio o ruptura fehaciente, excepto si la adopción es conjunta, y también los progenitores del adoptando no emancipado, salvo que estén privados de la patria potestad por sentencia firme o incursos en causa legal para ello. Ese asentimiento no es necesario cuando quienes deban prestarlo estén imposibilitados, ni cuando los progenitores tengan suspendida la patria potestad y hayan transcurrido dos años desde la notificación de la declaración de desamparo sin oposición eficaz. En todo caso, el asentimiento de la madre no puede prestarse hasta seis semanas después del parto, y en las adopciones con propuesta previa no cabe que el asentimiento de los progenitores se refiera a adoptantes determinados.

Deben ser oídos por el juez los progenitores que no hayan sido privados de la patria potestad cuando su asentimiento no sea necesario, el tutor y, en su caso, la familia acogedora y los guardadores, así como el adoptando menor de doce años según su edad y madurez. El texto subraya que, si los padres conservan la patria potestad y no concurre causa legal de privación, su asentimiento es imprescindible y su oposición impide la adopción; en cambio, si están incursos en causa de privación, solo deben ser oídos y su oposición no vincula al juez.

La diferencia entre estas tres categorías es esencial. El consentimiento es un requisito constitutivo de la adopción, de modo que su ausencia o nulidad impide su existencia, y además debe prestarse personalmente antes de la decisión judicial. El asentimiento es una declaración favorable de determinadas personas ajenas a la relación adoptiva estricta, exigida solo en ciertos supuestos, mientras que la audiencia es un trámite obligatorio destinado a ilustrar al juez, pero sin eficacia vinculante. Todos los consentimientos y asentimientos deben otorgarse libremente, por escrito, en la forma legal exigida y previa información de sus consecuencias.

3.4. La constitución de la adopción

La adopción se constituye por resolución judicial, que ha de atender siempre al interés del adoptando y a la idoneidad del adoptante o adoptantes para el ejercicio de la patria potestad.

Mientras no exista auto judicial favorable, la adopción no se ha producido jurídicamente. De ahí que buena parte de la doctrina destaque el carácter constitutivo de la resolución judicial y considere que, tras la Ley 21/1987, la adopción ha dejado de ser un simple negocio jurídico de Derecho de familia para configurarse de manera decisiva a través de la autoridad judicial.

Sin embargo, el texto rechaza que el acto judicial pueda entenderse aisladamente como único elemento relevante, porque la adopción sigue descansando también en el consentimiento del adoptante y del adoptando mayor de doce años, junto con los asentimientos legalmente exigibles. Sin esas voluntades, ningún juez puede constituir válidamente la adopción, aunque, al mismo tiempo, sin resolución judicial tampoco puede entenderse perfeccionada. Una vez dictado el auto, este debe inscribirse en el Registro Civil al margen de la inscripción de nacimiento del hijo adoptivo, produciendo desde entonces el cierre registral frente a terceros, que no deberían poder conocer por esa vía la existencia de la adopción.

4. IRREVOCABILIDAD DE LA ADOPCIÓN

La adopción se caracteriza por su irrevocabilidad, como proclama el art. 180.1, porque la trascendencia del cambio de integración familiar que comporta exige dotar a la filiación adoptiva de la máxima estabilidad y sustraerla a cambios de voluntad o de ánimo de los interesados, especialmente del adoptante. Por ello, la posterior determinación de la filiación por naturaleza del adoptado no afecta a la adopción, de modo que quien ha sido adoptado mantiene su condición de hijo adoptivo aunque llegue a conocerse después su filiación biológica. La ley pretende así asegurar la continuidad de la filiación adoptiva y evitar conflictos posteriores sobre la persona del adoptado, que queda integrado familiarmente en la línea del adoptante como si fuera descendiente consanguíneo.

Como consecuencia de ello, se extinguen los vínculos jurídicos entre el adoptado y su familia biológica, sin que quepa posteriormente combatir la adopción ya declarada para recuperar efectos sucesorios o familiares respecto de esa familia de origen. Solo de manera excepcional, durante los dos años siguientes al auto judicial, la adopción válidamente constituida puede ser contradicha y quedar extinguida si el padre o la madre no prestaron el asentimiento exigido, siempre que esa falta de intervención se haya producido sin culpa suya, que la extinción no perjudique gravemente al menor y que, si el adoptado es mayor de edad, este preste su consentimiento expreso. Ese plazo tiene carácter de caducidad y se computa desde la firmeza del auto judicial, precisamente para evitar una situación de interinidad permanente en la adopción.

Distinta de la extinción es la exclusión del adoptante cuando incurra en causa de privación de la patria potestad, supuesto en el que el juez puede privarle de las funciones tuitivas y de los derechos legales correspondientes. Alcanzada la plena capacidad, esa exclusión solo puede ser solicitada por el propio adoptado dentro de los dos años siguientes, y las restricciones dejan de surtir efecto si así lo determina después el propio hijo ya capaz. En todo caso, la extinción de la adopción no implica pérdida de la nacionalidad ni de la vecindad civil adquiridas, ni afecta a los efectos patrimoniales ya producidos.

En el ámbito de la adopción internacional, las autoridades españolas deben comprobar que la adopción constituida por autoridad extranjera extinga los vínculos jurídicos sustanciales con la familia anterior, genere una filiación equivalente a la filiación por naturaleza y sea irrevocable por los adoptantes. Si la ley extranjera permite al adoptante revocar la adopción, resulta indispensable que este renuncie a esa facultad antes del traslado del menor a España, formalizando la renuncia en documento público o mediante comparecencia ante el encargado del Registro Civil.

5. EFECTOS DE LA ADOPCIÓN

5.1. Relaciones entre adoptante y adoptado

La adopción produce entre adoptante y adoptado una relación de filiación en condiciones de igualdad con la filiación por naturaleza, sea o no matrimonial. De ello resulta que el adoptante ejerce la patria potestad sobre el hijo adoptivo en los mismos términos que respecto de un hijo consanguíneo y le transmite sus apellidos conforme a las reglas generales. Del mismo modo, entre adoptante y adoptado rige la obligación legal de alimentos entre parientes y, en el ámbito sucesorio, el hijo adoptivo ocupa en la herencia del adoptante los mismos derechos que tendría si hubiera sido engendrado por él, tanto en la legítima como en la sucesión intestada, correspondiendo igualmente al adoptante los mismos derechos en la eventual herencia del hijo adoptivo.

5.2. El adoptado y su familia de origen

La integración del adoptado en la familia del adoptante implica como regla su desvinculación jurídica de la familia de origen, ya que sería incompatible mantener simultáneamente deberes familiares y derechos sucesorios plenos en ambas familias. Por ello, el art. 178 establece que la adopción extingue los vínculos jurídicos entre el adoptado y su familia de origen. Sin embargo, esa ruptura no opera de manera absoluta, pues la ley prevé excepciones en las que subsisten vínculos con la familia de uno de los progenitores. Ello ocurre cuando el adoptado es hijo del cónyuge o de la persona unida al adoptante por relación análoga a la conyugal, incluso si este ha fallecido, y también cuando solo uno de los progenitores haya sido legalmente determinado, siempre que lo soliciten el adoptante, el adoptado mayor de doce años y el progenitor cuyo vínculo deba subsistir.

La norma añade además que esta extinción de vínculos no afecta a los impedimentos matrimoniales, de modo que siguen operando entre el adoptado y su familia de origen. Junto a ello, la LPIA introduce la posibilidad de mantener alguna forma de relación o contacto entre el menor adoptado, determinados miembros de su familia de origen y la familia adoptiva cuando así lo aconseje el interés del menor, atendiendo a su situación familiar, edad u otras circunstancias significativas. El juez puede acordar ese mantenimiento al constituir la adopción, fijando su periodicidad, duración y condiciones, a propuesta de la entidad pública o del Ministerio Fiscal y con el consentimiento de la familia adoptiva y del adoptando si tiene suficiente madurez, y siempre si es mayor de doce años. La medida puede desarrollarse con intermediación de la entidad pública o de entidades acreditadas, puede ser modificada o finalizada por el juez en atención al interés superior del menor y está sometida a seguimiento mediante informes periódicos. También pueden solicitar su suspensión o supresión la entidad pública, la familia adoptiva, la familia de origen y el menor con suficiente madurez, y en todo caso si es mayor de doce años.

5.3. Los orígenes biológicos de las personas adoptadas

Aunque la adopción sea irrevocable y la determinación de la filiación biológica no la altere, la legislación ha reconocido a las personas adoptadas el derecho a conocer sus orígenes biológicos. Tras la reforma de 2015, las entidades públicas deben asegurar la conservación durante al menos cincuenta años de la información disponible sobre los orígenes del menor, especialmente la relativa a la identidad de sus progenitores y a la historia médica del menor y de su familia, con la finalidad de hacer posible el ejercicio de ese derecho. Las personas adoptadas, una vez alcanzada la mayoría de edad o durante su minoría a través de sus representantes legales, pueden acceder a esos datos, y las entidades públicas deben prestar el asesoramiento y la ayuda necesarios, previa notificación a las personas afectadas. Además, cualquier entidad pública o privada está obligada a facilitar a las entidades públicas y al Ministerio Fiscal los informes y antecedentes necesarios sobre el menor y su familia de origen cuando sean requeridos.

El texto destaca que esta apertura al conocimiento de los orígenes biológicos responde a una demanda social discutida, pues junto al derecho del hijo a conocer su identidad biológica concurren el derecho de los progenitores a mantener oculta su identidad y a proteger su intimidad personal y familiar. Por ello se presenta la mediación como una vía especialmente adecuada en este ámbito, dada la complejidad y delicadeza de los intereses en conflicto.

6. LA ADOPCIÓN INTERNACIONAL

La adopción internacional surge en un contexto en el que, en los países del entorno geográfico y cultural de referencia, la escasez de menores susceptibles de adopción, vinculada al descenso de la natalidad, llevó a muchas parejas y, en menor medida, a personas individuales, a buscar hijos adoptivos en países de muy diversas zonas del mundo, especialmente en Asia, Europa del Este, Iberoamérica y África. Ese escenario, especialmente problemático en algunos casos, motivó la aprobación de la Ley 54/2007, de adopción internacional, presentada como una norma orientada a ordenar la materia, aunque el texto subraya tanto su difícil aplicación práctica como la conveniencia de remitir su tratamiento técnico al Derecho internacional privado.

La valoración del texto sobre los resultados de la Ley 54/2007 es claramente negativa, pues sostiene que su éxito ha sido inexistente y que, al igual que otras normas semejantes en países occidentales, ha provocado un efecto de cierre de las adopciones en numerosos Estados de origen. Según esa interpretación, la ley habría contribuido a una caída muy intensa de las adopciones internacionales, hasta el punto de que entre 2009 y 2014 se habría pasado de 3006 a 798, lo que representa un descenso muy acusado. El texto considera por ello que la continuidad de la adopción internacional ha quedado gravemente afectada y que la disminución experimentada a lo largo de los años resulta especialmente alarmante.

El Anexo I refuerza esa idea general de retroceso. Las cifras totales pasan de 1669 adopciones en 2012 a 531 en 2017, y continúan descendiendo hasta 171 en 2021, con un leve repunte posterior hasta 179 en 2022 y 183 en 2023. Por continentes, Asia y Europa del Este concentraban inicialmente los volúmenes más altos, pero experimentan también una caída muy intensa; África desciende de forma especialmente brusca; y América Latina mantiene cifras más reducidas, igualmente decrecientes en el conjunto del periodo, aunque con una ligera recuperación final. El balance global que se desprende del texto y del anexo es, por tanto, el de una contracción muy profunda y sostenida de la adopción internacional, solo corregida muy modestamente en los últimos años.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
