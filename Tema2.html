    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. EL MATRIMONIO

Hasta la aprobación de la Ley 13/2005, de 1 de julio, el matrimonio ha sido concebido en nuestra sociedad como la unión estable entre hombre y mujer destinada a compartir la vida y sus avatares. En lo esencial, la idea contemporánea de matrimonio mantiene una notable continuidad con concepciones históricas anteriores.

Desde la perspectiva civil, el análisis del matrimonio prescinde de los aspectos religiosos o sacramentales, propios de la tradición romana y, especialmente, de la canónica, aunque debe reconocerse que el desarrollo del Derecho canónico ha influido de forma relevante en numerosos aspectos de la regulación jurídico-civil del matrimonio. En este epígrafe introductorio se atiende al matrimonio desde una óptica laica y estatal, destacando sus notas culturales y jurídicas fundamentales, sin establecer jerarquías ni menosprecio respecto de otras formas de convivencia.

1.1. Heterosexualidad y LGTBI

Hasta la aprobación de la Ley 13/2005, el matrimonio exigía la unión de un hombre y una mujer, quedando excluidas otras relaciones de pareja no compuestas por personas de distinto sexo, con independencia de que se tratara de parejas homosexuales masculinas o femeninas o de personas transexuales. Esta concepción tradicional fue considerada confirmada implícitamente por el art. 32 de la Constitución, al reconocer que el hombre y la mujer tienen derecho a contraer matrimonio.

Una parte minoritaria de la doctrina defendió la posibilidad del matrimonio de personas transexuales tras el reconocimiento judicial del cambio de sexo, posición respaldada por la Resolución de la Dirección General de los Registros y del Notariado de 24 de enero de 2005, aunque con argumentos discutidos. Posteriormente, la Ley 3/2007, sobre rectificación registral del sexo, introdujo nuevos criterios que han sido superados por la Ley 4/2023, para la igualdad real y efectiva de las personas trans y la garantía de los derechos de las personas LGTBI.

La Ley 4/2023 reconoce la autodeterminación de género, refuerza la igualdad real y efectiva de las personas LGTBI y establece mecanismos de protección frente a la discriminación. Su disposición adicional segunda modifica el art. 44 del Código Civil, proclamando que toda persona tiene derecho a contraer matrimonio conforme al Código Civil, quedando derogada la Ley 3/2007 y siendo aplicable el nuevo régimen de rectificación registral del sexo.

1.2. Monogamia

En la cultura occidental, el matrimonio ha implicado tradicionalmente la unión de un solo hombre con una sola mujer. Tras la admisión del matrimonio homosexual, el requisito de la monogamia se mantiene, de modo que el matrimonio debe celebrarse entre dos personas, y solo dos, con independencia de su sexo.

En el ámbito cultural y jurídico vigente, continúa afirmándose la exigencia de la monogamia, sin que otras fórmulas de colectivización de las relaciones afectivas tengan encaje en el Derecho positivo. No obstante, algunos autores contrarios al matrimonio homosexual sostienen que, eliminada la heterosexualidad como requisito y atendiendo a criterios sociológicos, podría plantearse en el futuro la superación de la monogamia, siguiendo modelos culturales distintos, como los que admiten la pluralidad de esposas, lo que obligaría a considerar también supuestos de poliandria.

1.3. Comunidad de vida y existencia

La celebración del matrimonio está orientada a constituir una relación íntima y estable que comprende los aspectos esenciales de la vida, afrontados en común por los cónyuges, sin que ninguno de ellos pierda su propia individualidad. Aunque esta nota resulte difícil de delimitar en sentido positivo, adquiere especial relevancia por sus consecuencias negativas.

El matrimonio no puede concebirse como una relación destinada a satisfacer necesidades afectivas o carnales pasajeras, ni como una unión momentánea o circunstancial, carente de la voluntad de formar una auténtica comunidad de vida y existencia. Tampoco responden a esta idea los matrimonios celebrados con la finalidad de obtener ventajas ajenas a la convivencia, como ocurre con los denominados matrimonios de complacencia, que no obedecen al propósito de constituir una verdadera comunidad de vida.

1.4. Estabilidad

La estabilidad o permanencia es una nota inherente a la unión matrimonial y se presenta como corolario de la comunidad de vida y existencia. En algunos sistemas normativos, esta estabilidad se concibe como perpetuidad vitalicia, al asentarse el matrimonio en el principio de indisolubilidad. No obstante, esta concepción no corresponde a la legislación española contemporánea, tras la promulgación de la Ley 30/1981.

1.5. Solemnidad: Referencia a las uniones de hecho

El consentimiento matrimonial es un acto solemne, revestido de formalidades legales que garantizan la concurrencia de los presupuestos exigidos por el ordenamiento. Cuando no se cumplen tales requisitos formales, aun existiendo convivencia y los restantes elementos del matrimonio, la relación debe calificarse como unión de hecho, denominada también unión libre, concubinato, convivencia more uxorio o pareja de hecho.

Existe un movimiento social favorable a las parejas de hecho, y diversas normas y resoluciones judiciales han asimilado en aspectos concretos estas uniones al matrimonio. No obstante, no existe una regulación estatal general, aunque varias Comunidades Autónomas han aprobado leyes propias y, en todo caso, existe un Registro de Parejas de Hecho para acreditar su existencia y duración a efectos concretos.

En algunas regulaciones autonómicas se exige la inscripción registral para acceder a determinados efectos legales, estableciéndose requisitos específicos. Los principales problemas jurídicos surgen en el momento de la ruptura, pues, en general, no procede la aplicación analógica del régimen matrimonial, debiendo acudirse a la normativa existente, a los pactos entre las partes o, en su defecto, a criterios como el enriquecimiento injusto u otras construcciones jurisprudenciales. Las obligaciones respecto de los hijos no se ven afectadas por la existencia o no de matrimonio o pareja de hecho.

2. EL MATRIMONIO HOMOSEXUAL O ENTRE PERSONAS DEL MISMO SEXO

La Ley 13/2005 supuso una ruptura histórica con la concepción secular del matrimonio, tradicionalmente presidida por la heterosexualidad y vinculada indirectamente a la reproducción.

Desde una perspectiva histórica, la reforma introdujo una idea inicialmente revolucionaria, aunque comparable a otras transformaciones jurídicas que con el tiempo se han consolidado como principios generalmente aceptados, como la igualdad entre hombre y mujer o la abolición de la esclavitud.

La incidencia real del matrimonio homosexual en España es estadísticamente reducida, pues no alcanza ni el uno por ciento del total de núcleos familiares, lo que pone de relieve la distancia entre la percepción social generada por la norma y la realidad demográfica.

En el Derecho comparado, numerosos países reconocen el matrimonio entre personas del mismo sexo o figuras equivalentes, mientras que en otros Estados la homosexualidad continúa siendo delito. En Estados Unidos, tras diversas regulaciones estatales, la sentencia del Tribunal Supremo de 26 de junio de 2015 declaró inconstitucionales las prohibiciones del matrimonio homosexual, imponiendo su validez en todos los Estados.

En el ámbito internacional privado, la Resolución de la DGRN de 7 de abril de 2006 reconoció la validez en España del matrimonio entre un español y un extranjero cuya ley nacional no admitía este tipo de matrimonio. Asimismo, la sentencia del TJUE de 5 de junio de 2018 (asunto Coman) interpretó el concepto de “cónyuge” de forma neutra desde el punto de vista del género a efectos de residencia, obligando a los Estados miembros a reconocer el matrimonio homosexual para tales fines, sin imponerles su regulación interna.

3. LA NATURALEZA DEL MATRIMONIO

Aunque la noción social de matrimonio ha sido clara durante siglos, los juristas han debatido históricamente sobre su calificación técnica, con independencia de la admisión del divorcio o del matrimonio homosexual. El problema no es definir qué es el matrimonio en términos sociales, sino cómo debe ser calificado jurídicamente.

3.1. La tesis contractual

Desde la recepción medieval del Derecho canónico, al incorporarse la aﬀectio maritalis romana como elemento consensual, se sostuvo la consideración del matrimonio como contrato, tesis especialmente atractiva para los canonistas, al permitir justificar el vínculo y la indisolubilidad mediante el principio pacta sunt servanda.

Sin embargo, esta concepción presenta graves dificultades, ya que los contratos civiles se basan en la autonomía privada, la libertad de estipulación y la posibilidad de ineficacia del contrato incumplido, elementos incompatibles con el esquema matrimonial, especialmente cuando rige el principio de indisolubilidad.

Para salvar estas objeciones, algunos autores calificaron el matrimonio como contrato sui generis, entendiendo que carece de las notas esenciales de los contratos, dado que su contenido y efectos están normativamente predeterminados. No obstante, esta solución resulta insatisfactoria, pues la relación matrimonial carece de patrimonialidad técnica, y la mera coincidencia de consentimientos no permite aplicar el régimen jurídico propio de los contratos.

3.2. El matrimonio como “negocio jurídico de Derecho de familia”

El desarrollo de la categoría del negocio jurídico llevó a algunos autores a calificar el matrimonio como un negocio jurídico complejo y típico del Derecho de familia, entendiendo que esta noción permitía explicar su singularidad. Sin embargo, esta calificación supone una mera abstracción conceptual que no mejora la comprensión de la institución.

La noción de negocio jurídico aplicada al matrimonio no aclara su régimen normativo, ni explica sus efectos materiales, que se encuentran predeterminados por el Derecho positivo, generando además indefinición y confusión conceptual.

3.3. La institución matrimonial

Aunque el consentimiento es imprescindible, no es suficiente para determinar la existencia del matrimonio, como demuestra la diferencia entre matrimonio y uniones de hecho. El llamado estatuto matrimonial queda sustraído a la voluntad de los contrayentes y es imperativamente fijado por la ley, salvo en aspectos concretos como el régimen económico.

Ello evidencia que el matrimonio constituye una institución jurídica propia y autónoma, dotada de un conjunto normativo específico, que regula tanto su nacimiento como su desarrollo y crisis. Esta concepción institucional ha sido reiteradamente respaldada por la jurisprudencia del Tribunal Supremo y del Tribunal Constitucional, así como por el propio legislador en las Exposiciones de Motivos de las Leyes 13/2005 y 15/2005.

4. LOS SISTEMAS MATRIMONIALES

4.1. La idea de “sistema matrimonial”

La expresión sistema matrimonial se ha utilizado tradicionalmente por la doctrina civilista para referirse a la ordenación que realiza el Estado sobre las formas o ritos matrimoniales a los que se reconoce eficacia y validez civil. Se trata, por tanto, del modo en que un ordenamiento jurídico decide qué matrimonios son válidos desde el punto de vista civil y bajo qué formas pueden celebrarse.

Autores clásicos como Sánchez Román y Lacruz Berdejo definieron los sistemas matrimoniales como los criterios legales adoptados por los distintos Estados para reputar válidamente celebrado el matrimonio, especialmente en relación con la forma de celebración civilmente eficaz.

El concepto tiene una función sistemática y comparada, pues permite identificar los elementos normativos esenciales de cada ordenamiento en materia matrimonial y comparar las distintas soluciones adoptadas por los Estados.

En Europa, y particularmente en España, la cuestión se ve condicionada por la precedencia histórica del matrimonio canónico, cuya regulación y jurisdicción por parte de la Iglesia Católica se adelantó durante siglos a la configuración del matrimonio civil por los Estados modernos. De ahí que el problema del sistema matrimonial esté ligado a la relación entre el poder civil y las confesiones religiosas.

Aunque la noción de sistema matrimonial es, desde el punto de vista teórico, una categoría expositiva, la decisión legislativa sobre el sistema adoptado constituye una opción política de gran relevancia, pues implica determinar si el Estado asume en exclusiva la potestad normativa y jurisdiccional sobre el matrimonio o si la comparte, en mayor o menor medida, con las confesiones religiosas.

4.2. Clasificación de los sistemas matrimoniales

La clasificación de los sistemas matrimoniales tiene un valor instrumental y propedéutico, y debe limitarse a los criterios fundamentales, evitando casuismos excesivos.

A) Forma o formas matrimoniales El primer criterio clasificatorio atiende a si el ordenamiento reconoce una sola forma de matrimonio o varias formas con eficacia civil. 1) Sistemas de matrimonio único Dentro de estos sistemas se distinguen dos opciones: a) Matrimonio exclusivamente religioso Característico de Estados confesionales o teocráticos. Históricamente fue el modelo vigente en España desde la Real Cédula de 1562 hasta la Ley de Matrimonio Civil de 1870. b) Reconocimiento exclusivo del matrimonio civil El Estado solo reconoce efectos civiles al matrimonio celebrado conforme a sus propias normas, dejando el matrimonio religioso como una cuestión de conciencia personal. Este modelo surge con la Revolución francesa y el Code Napoléon y se extendió a numerosos países europeos, rigiendo también en España durante un breve periodo. 2) Reconocimiento estatal de plurales formas de matrimonio El Estado reconoce varias formas matrimoniales con eficacia civil. Dentro de estos sistemas cabe distinguir: • Sistema de libertad de forma, en el que cualquier forma sería válida sin formalidades obligatorias, modelo que carece de relevancia práctica y doctrinal por razones de seguridad jurídica. • Sistemas electivos, en los que el Estado determina varias formas matrimoniales válidas y permite al ciudadano elegir entre ellas.

Dentro de los sistemas electivos se distinguen: a) Sistema electivo formal El Estado reconoce efectos civiles a los matrimonios religiosos, pero se reserva en exclusiva la regulación y jurisdicción matrimonial, incorporando las normas religiosas al ordenamiento estatal (caso de Inglaterra). b) Sistema electivo material El Estado respeta las normas propias de la confesión religiosa en el matrimonio religioso (forma, ritos, disolución), otorgándole efectos civiles, mientras regula la forma civil del matrimonio. Puede existir o no reserva de jurisdicción estatal, sin que ello altere la naturaleza del sistema.

B) Igualdad o subsidiariedad El segundo criterio atiende a si las distintas formas matrimoniales se reconocen en plano de igualdad o en relación de subordinación. 1) Sistemas facultativos Las distintas formas matrimoniales se reconocen en plano de igualdad, sin primacía del matrimonio civil ni del religioso. El ciudadano puede optar libremente por cualquiera. También se denominan sistemas puramente electivos. 2) Sistemas de subsidiariedad Se otorga primacía a una forma matrimonial, siendo las demás subsidiarias. Están vinculados a la confesionalidad estatal y suelen permitir una forma alternativa solo a quienes acrediten no profesar la confesión dominante.

5. LA CONSTITUCIÓN DE 1978 Y EL SISTEMA MATRIMONIAL

La Constitución de 1978 impuso un replanteamiento completo del sistema matrimonial, al consagrar los principios de aconfesionalidad del Estado (art. 16.3 CE), libertad religiosa y de creencias (art. 16 CE) y la recuperación del poder civil en materia matrimonial (art. 32.2 CE).

Estos principios resultan incompatibles con el sistema de matrimonio civil subsidiario, propio de Estados confesionales.

La primera manifestación de este nuevo marco constitucional fue la sustitución del Concordato de 1953 por el Acuerdo entre el Estado español y la Santa Sede de 3 de enero de 1979, que mantiene el reconocimiento de efectos civiles al matrimonio canónico, pero sin sometimiento del Derecho estatal a la normativa canónica, en coherencia con el principio de cooperación religiosa previsto en la Constitución.

Posteriormente, las Leyes 24/1992, 25/1992 y 26/1992 aprobaron los Acuerdos de Cooperación con las confesiones evangélica, judía e islámica, reconociendo efectos civiles a los matrimonios celebrados conforme a sus ritos, siempre que se inscriban en el Registro Civil. Estas normasfueron modificadas por la Ley 15/2015, que amplió los órganos competentes para tramitar el expediente previo matrimonial.

La reforma decisiva del sistema matrimonial vino dada por las Leyes 11/1981 y 30/1981, que transformaron el Derecho de familia del Código Civil conforme a los principios constitucionales. El sistema resultante es un sistema electivo formal y facultativo, definido como un sistema de forma múltiple y clase única (civil), en el que el Estado reconoce efectos civiles a matrimonios celebrados en distintas formas religiosas, pero se reserva la regulación jurídica del matrimonio.

Este carácter electivo formal se ve reforzado por la reforma del art. 60.2 CC, que amplía el reconocimiento de efectos civiles a matrimonios celebrados conforme a ritos de confesiones religiosas con notorio arraigo en España. En todo caso, el Estado mantiene la competencia exclusiva para legislar sobre las formas de matrimonio (art. 149.1.8 CE), quedando excluida cualquier intervención normativa autonómica en esta materia.

6. LOS ESPONSALES O PROMESA DE MATRIMONIO

6.1. Terminología y concepto

En la redacción vigente del Código Civil, la figura tradicionalmente conocida como esponsales recibe la denominación exclusiva de promesa de matrimonio. Con uno u otro nombre, la institución consiste en la promesa recíproca de contraer matrimonio realizada por los novios, que eventualmente llegarán a ser cónyuges si el matrimonio llega a celebrarse.

Los esponsales presentan una evolución histórica caracterizada por un pasado de gran relevancia jurídica, un presente de escasa aplicación práctica y un futuro incierto, en un contexto social marcado por el abandono de rituales y formalismos. Su importancia histórica se manifiesta en su regulación en el Derecho romano, en el Derecho canónico medieval y en las disposiciones de la Iglesia Católica, incluyendo el Codex iuris canonici. El Digesto los definía como sponsalia sunt mentio et repromissio nuptiarum futurarum, y el propio término procede del verbo latino spondere.

Hasta la Ley 30/1981, el Código Civil utilizaba también la denominación esponsales, pero el legislador optó por sustituirla por la expresión promesa de matrimonio, en un intento de secularización nominal y de alejamiento del lenguaje canónico. No obstante, desde el punto de vista semántico y jurídico, ambas expresiones designan la misma realidad, siendo la diferencia meramente terminológica.

En la práctica actual, la promesa de matrimonio carece de la relevancia que tuvo históricamente y no es equiparable a la convivencia marital ni al matrimonio. Así lo ha declarado la jurisprudencia, negando que la mera promesa de matrimonio pueda considerarse unión de hecho o arraigo familiar suficiente para producir determinados efectos jurídicos, como la suspensión de una orden de expulsión de extranjeros.

6.2. Libertad matrimonial y esponsales

Desde los precedentes del Derecho romano, la libertad matrimonial de los contrayentes se mantiene intacta hasta el mismo momento de la celebración del matrimonio, exista o no promesa previa. Este principio se basa en la incoercibilidad del consentimiento matrimonial, que impide obligar jurídicamente a contraer matrimonio.

El vigente art. 42 del Código Civil establece que la promesa de matrimonio no produce obligación de contraerlo, ni de cumplir lo pactado para el supuesto de su no celebración, y que no se admitirá demanda alguna que pretenda exigir su cumplimiento. Se prioriza así la libertad matrimonial hasta el instante mismo de la prestación del consentimiento.

El Código Civil mantiene la tradición histórica conforme a la cual la incoercibilidad del matrimonio no puede eludirse mediante cláusulas penales u otras estipulaciones vinculadas a la promesa dematrimonio. En consecuencia, los esponsales carecen de eficacia vinculante respecto de la celebración del matrimonio.

La promesa de matrimonio no tiene naturaleza contractual, ni puede calificarse como precontrato ni como acuerdo jurídico propiamente dicho. Se trata de un uso social reconocido por la ley, cuya relevancia jurídica se limita a la posible obligación legal de resarcir los gastos realizados en atención al matrimonio proyectado, configurándose dicha obligación ex lege, a partir de la existencia fáctica de la promesa.

6.3. La obligación de resarcimiento de los gastos asumidos

El art. 43.1 del Código Civil establece que el incumplimiento sin causa de la promesa cierta de matrimonio, realizada por persona mayor de edad o menor emancipado, solo produce la obligación de resarcir a la otra parte de los gastos hechos y de las obligaciones contraídas en consideración al matrimonio prometido. La consecuencia jurídica de la no celebración del matrimonio se limita, por tanto, al resarcimiento del perjuicio patrimonial sufrido por quien confió en la promesa.

El fundamento del resarcimiento radica en la quiebra de la confianza legítima generada por la promesa de matrimonio, evitando un empobrecimiento patrimonial carente de sentido al frustrarse el matrimonio proyectado. El resarcimiento comprende tanto los gastos efectivamente realizados como las obligaciones asumidas, aunque no se hayan hecho aún efectivas, siempre que estén directamente vinculadas al matrimonio previsto y sean debidamente probadas.

La responsabilidad derivada del art. 43 CC tiene un alcance limitado, circunscrito a las partidas expresamente previstas en el precepto. Cuando se producen daños patrimoniales distintos o superiores, la vía adecuada será la acción por enriquecimiento sin causa, quedando excluida la aplicación del art. 1902 CC.

El precepto exige que el incumplimiento sea “sin causa”, a diferencia de la redacción anterior, que exigía “justa causa”. La supresión del adjetivo implica que basta con que quien no desea contraer matrimonio alegue una causa suficiente para sí mismo, derivada del ejercicio de su libertad matrimonial, lo que actúa como circunstancia exoneradora del resarcimiento. De este modo, la exigencia legal de causa queda notablemente atenuada.

El art. 43.2 CC dispone que la acción de resarcimiento caduca al año, contado desde el día de la negativa a la celebración del matrimonio. Se trata, en términos literales, de un plazo de caducidad, no susceptible de interrupción, aunque la cuestión carece prácticamente de relevancia práctica por la escasa litigiosidad en esta materia.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

      const full = String(PDF_TEXTO);

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
