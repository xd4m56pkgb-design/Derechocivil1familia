  function showErr(msg){

    errBox.textContent = msg;
    errBox.classList.add("show");
  }

  window.addEventListener("error", (e)=>{
    showErr("Error JS: " + (e.message || "desconocido"));
  });

  try{
    /* =========================
       ✅ PUNTUACIÓN (UNA SOLA VEZ)
    ========================= */
    const SCORE_OK = 0.5;
    const SCORE_BAD = 0.20;   // resta
    const SCORE_BLANK = 0;    // no suma ni resta

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INTRODUCCIÓN

Tras la reforma de 1981, la disposición de los bienes gananciales se basa en la gestión conjunta de ambos cónyuges, sustituyendo el modelo anterior de administración unilateral del marido.

Antes de dicha reforma, la mujer casada carecía prácticamente de facultades dispositivas incluso sobre sus propios bienes privativos, ya que el Código Civil atribuía al marido la gestión exclusiva del patrimonio matrimonial.

El originario art. 1413 permitía al marido enajenar y gravar bienes gananciales a título oneroso sin consentimiento de la esposa, lo que generó graves abusos patrimoniales y situaciones de ruina familiar, al actuar el esposo sin control efectivo sobre el patrimonio común. Esta regulación fue ampliamente criticada y se convirtió en uno de los preceptos más cuestionados del Código Civil.

La Ley de 24 de abril de 1958 introdujo una primera corrección parcial, exigiendo el consentimiento de la mujer o, en su defecto, autorización judicial para disponer de inmuebles o establecimientos mercantiles gananciales. Sin embargo, la reforma mantuvo la posición del marido como administrador exclusivo de la sociedad de gananciales, permitiéndole seguir disponiendo por sí solo de los restantes bienes gananciales.

La propia Exposición de Motivos de la Ley de 1958 justificaba esta situación afirmando que, por exigencias de la unidad matrimonial, la potestad de dirección dentro de la sociedad conyugal correspondía al marido por razones de naturaleza, religión e historia.

2. LA GESTIÓN CONJUNTA

La justificación de la Ley de 1958, basada en naturaleza, religión e historia, duró hasta la igualdad conyugal establecida en la Constitución de 1978. Actualmente, el artículo 1375 establece que, en defecto de pacto en capitulaciones, la gestión y disposición de los bienes gananciales corresponde conjuntamente a los cónyuges. El inciso "sin perjuicio de lo que se determina en los artículos siguientes" no introduce excepciones a favor del marido, sino que advierte que la gestión conjunta no excluye la posibilidad de actuación individual en algunos supuestos.

2.1. Administración y disposición: el principio de actuación conjunta

El artículo 1375 abre la Sección 4ª, rúbrica "De la administración de la sociedad de gananciales", pero el conjunto normativo no contempla solo actos de administración, sino también de disposición. Por ello, doctrinalmente se emplea la expresión "gestión" para referirse a ambos tipos de actos. El principio de actuación conjunta se refiere tanto a las facultades de administración como a las de disposición, y el legislador los somete como regla al mismo régimen de exigencia de consentimiento de ambos cónyuges.

2.2. Actos de administración o de disposición a título oneroso

El artículo 1377.1 exige el consentimiento de ambos cónyuges para los actos de disposición onerosa sobre bienes gananciales, como mera concreción del principio de actuación conjunta. Si un cónyuge realiza un acto de disposición sin el consentimiento del otro, el supuesto se regula en el artículo 1322.1, que establece que los actos realizados sin consentimiento y no confirmados expresa o tácitamente podrán ser anulados a instancia del cónyuge cuyo consentimiento se omitió o de sus herederos. Procede, pues, el régimen de anulabilidad, cuya acción prescribe a los cuatro años desde la disolución de la sociedad conyugal o del matrimonio, salvo que antes se hubiese tenido conocimiento suficiente del acto.

2.3. Actos de disposición a título gratuito

En los actos de disposición a título gratuito, la falta de consentimiento de cualquier cónyuge produce nulidad radical, conforme a los artículos 1378 y 1322.2. Dada la imprescriptibilidad de la acción de nulidad, la impugnación es posible en cualquier momento, incluso décadas después, al llegar la disolución y liquidación de la sociedad de gananciales. No obstante, la restitución no será posible si los bienes han sido usucapidos por un tercero (seis años para muebles, treinta para inmuebles). En supuestos de negocios fraudulentos, si los bienes no pueden recuperarse, el artículo 1397.2 dispone que se comprenda en el activo ganancial el valor actualizado que tenían al ser enajenados, y además estas disposiciones pueden ser causa de disolución judicial según el artículo 1393.2. La diferencia de trato entre los actos onerosos (anulabilidad) y los gratuitos (nulidad) se justifica porque los adquirentes a título gratuito nada han sacrificado y no merecen la misma protección. Por disposición expresa del artículo 1378, las liberalidades de uso o regalos de costumbre son válidos y eficaces aunque los realice un solo cónyuge con cargo a los bienes gananciales, pues se consideran integrados en la potestad doméstica cuando son acordes con el nivel económico familiar.

2.4. El deber de información

Tras la reforma de 1981, el principio de actuación conjunta se completa con el deber de información del artículo 1383, que obliga a los cónyuges a informarse recíproca y periódicamente sobre la situación y rendimientos de cualquier actividad económica suya. Aunque este precepto pueda parecer retórico, el artículo 1393.4º considera causa de disolución judicial de la sociedad de gananciales el incumplimiento grave y reiterado del deber de informar sobre la marcha y rendimientos de las actividades económicas. El fundamento del deber es que los rendimientos de cualquier actividad económica de un cónyuge incrementan el activo ganancial que a ambos interesa, como aspecto de la comunidad de vida e intereses que el matrimonio y el régimen de gananciales presuponen.

2.5. La autorización judicial supletoria

La exigencia de actuación conjunta ha obligado al legislador a establecer un mecanismo mediador cuando, siendo necesario el consentimiento de ambos, uno no se aviene a prestarlo: la autorización judicial supletoria, que sustituye al consentimiento faltante y convierte al juez en protagonista de la decisión. El Código la contempla para actos de administración (artículo 1376: cuando uno esté impedido o se niegue injustificadamente, el juez puede suplirlo si halla fundada la petición) y para actos de disposición (artículo 1377.2: si uno niega o está impedido, el juez puede autorizar uno o varios actos dispositivos si lo considera de interés para la familia, pudiendo acordar limitaciones o cautelas). Ambos preceptos coinciden básicamente y deberían haberse refundido: el juez representa el desempate cuando uno niega injustificadamente el consentimiento o está impedido de forma provisional o pasajera, pues si el impedimento es permanente procede la transferencia judicial de la gestión del patrimonio ganancial.

2.6. Desacuerdos conyugales y expedientes de jurisdicción voluntaria

La Ley de jurisdicción voluntaria (Ley 15/2015) dedica su artículo 90 a la intervención judicial en casos de desacuerdo conyugal y administración de bienes gananciales. Los cónyuges, individual o conjuntamente, pueden solicitar intervención o autorización judicial para fijar el domicilio conyugal o disponer sobre la vivienda habitual y objetos de uso ordinario si hay desacuerdo, para fijar la contribución a las cargas del matrimonio cuando uno incumple, para realizar actos de administración o disposición onerosa cuando el otro está impedido o se niega injustificadamente, para conferir la administración de los bienes comunes por impedimento, abandono o separación de hecho, y para realizar actos de disposición sobre inmuebles, establecimientos mercantiles, objetos preciosos o valores mobiliarios cuando un cónyuge tenga la administración y disposición por ley o resolución judicial. En los expedientes sobre atribución de la administración y disposición a un solo cónyuge, el juez puede acordar cautelas y limitaciones de oficio o a instancia del Ministerio Fiscal. Es competente el Juzgado de Primera Instancia del último domicilio o residencia de los cónyuges. No es preceptiva la intervención de abogado ni procurador, salvo para actos patrimoniales superiores a 6.000 euros. El juez oirá en comparecencia al solicitante, al otro cónyuge y a los interesados, y se dará audiencia al Ministerio Fiscal cuando estén comprometidos intereses de menores o personas con discapacidad.

3. LA GESTIÓN INDIVIDUAL PACTADA CONVENCIONALMENTE

El artículo 1375 del Código Civil establece que la gestión y disposición de los bienes gananciales corresponde conjuntamente a los cónyuges, salvo pacto en contrario fijado en capitulaciones matrimoniales. Esta regla, en concordancia con el artículo 1315, reconoce que los cónyuges pueden conformar libremente sus relaciones patrimoniales sin quedar vinculados a los esquemas legales de los regímenes económicos del matrimonio. No obstante, el artículo 1315 precisa que la libertad capitular debe respetar las limitaciones establecidas en el propio Código, y el artículo 1328 declara nula cualquier estipulación que limite la igualdad de derechos de cada cónyuge. De esta tensión entre libertad de estipulación e igualdad conyugal surge la cuestión de si es admisible pactar en capitulaciones que solo uno de los cónyuges sea el administrador de la sociedad de gananciales.

La doctrina se encuentra muy enfrentada sobre esta admisibilidad, sin que exista jurisprudencia al respecto. Por un lado, autores como Álvarez-Sala, Díez-Picazo y Amorós consideran que tal pacto sería nulo por atentar contra la igualdad conyugal consagrada en el artículo 1328 del Código Civil y en el artículo 32 de la Constitución, salvo que se configurara como un poder revocable que permitiera al cónyuge no administrador recuperar su facultad mediante el desapoderamiento. Por otro lado, civilistas como Lacruz, Peña, De los Mozos y Pérez Sanz sostienen que el artículo 1375 autoriza expresamente modificar las reglas igualitarias de gestión, por lo que el pacto de administración por uno solo no atenta contra el principio de igualdad.

El autor del texto considera preferible esta última opción, pues en los escasos supuestos en que se otorgan tales capitulaciones, son los propios cónyuges quienes valoran si ejercen la administración conjunta o si uno queda exonerado de esa carga. Por último, la mayoría doctrinal considera que no presenta problemas de igualdad el pacto capitular por el que los cónyuges establecen que cualquiera de ellos, indistintamente, puede gestionar el patrimonio ganancial sin necesidad del consentimiento del otro, incluso en los casos en que el Código exige consentimiento de ambos, si bien este pacto es aún más infrecuente en la práctica que el de administración individual.

4. LOS SUPUESTOS LEGALES DE ACTUACIÓN INDIVIDUAL

La gestión conjunta es en muchos casos un ideal imposible o una regla excesiva para el funcionamiento cotidiano de la pareja sometida al régimen de gananciales, por lo que podría generar más inconvenientes que ventajas. Por ello, el Código regula numerosos supuestos en los que legitima la actuación individual de cualquiera de los cónyuges, aunque rija la gestión conjunta como principio. Algunos tratadistas consideran que la gestión conjunta es la regla y la actuación individual la excepción, aplicándose aquella a los actos más importantes y esta a los de menor trascendencia económica. Sin embargo, en la práctica cotidiana, la gestión individual no es una rareza, sino una constante en la mayoría de los matrimonios bajo gananciales.

4.1. La potestad doméstica

En el ámbito de la potestad doméstica, que atiende a las necesidades familiares y circunstancias de cada caso, la actuación individual de los cónyuges es no solo lícita y admisible, sino también un deber de ambos en lo relativo al sostenimiento, alimentos y educación de los hijos. Por tanto, cualquiera de ellos puede realizar actos de administración y disposición sobre bienes gananciales de forma individual, siempre que actúe conforme al artículo 1319.

4.2. La disposición de los frutos de los bienes privativos

El artículo 1381 establece que los frutos y ganancias de los patrimonios privativos forman parte del haber ganancial. Su primera parte reitera lo dispuesto en el artículo 1347, sin relación con la administración de la sociedad de gananciales. La segunda parte otorga a cada cónyuge la facultad de disponer de los frutos de sus bienes privativos al solo efecto de permitir la correcta administración de su patrimonio privativo, debiendo esos actos dirigirse a evitar el perjuicio de tales frutos, cuyo resultado patrimonial debe integrarse en la masa ganancial. Alguna autora propone extender esta facultad a las ganancias del trabajo, pero dicha propuesta es minoritaria y difícilmente compartible.

4.3. El anticipo de numerario ganancial

El artículo 1382 permite a cada cónyuge tomar, sin consentimiento del otro pero con su conocimiento, el numerario ganancial necesario, según los usos y circunstancias familiares, para el ejercicio de su profesión o la administración ordinaria de sus bienes. Esta norma no resulta extraña al sistema, pues el artículo 1362 declara que esos gastos son cargo de la sociedad de gananciales, y resulta natural recurrir al metálico ganancial para atender la continuidad de la profesión o la administración de los bienes privativos, ya que lo obtenido por el trabajo y los frutos del patrimonio privativo forman parte de la masa ganancial.

4.4. Bienes y derechos a nombre de uno de los cónyuges

Aunque la titularidad conjunta es la regla, no es infrecuente que ciertos bienes o derechos gananciales figuren formalmente a nombre de un solo cónyuge por razones prácticas. Pretender en estos casos la gestión conjunta atentaría contra el sentido común. Por ello, el artículo 1384 declara válidos los actos de administración de bienes y los de disposición de dinero o títulos valores realizados por el cónyuge a cuyo nombre figuren o en cuyo poder se encuentren. El artículo 1385.1 añade que los derechos de crédito, sean gananciales o privativos, serán ejercitados por el cónyuge a cuyo nombre aparezcan constituidos.

4.5. La defensa del patrimonio ganancial

El Código habilita a cualquier cónyuge para realizar actos necesarios para la defensa del patrimonio ganancial. El artículo 1385.2 lo plantea desde el prisma judicial, permitiendo ejercitar la defensa de bienes y derechos comunes por vía de acción o excepción, pero es obvio que quien puede lo más puede lo menos, por lo que también podrá realizar actos jurídicos o materiales no procesales que eviten perjuicios al patrimonio ganancial.

4.6. Los gastos urgentes

El artículo 1386 establece que para realizar gastos urgentes de carácter necesario, aunque sean extraordinarios, basta el consentimiento de uno solo de los cónyuges, tenga o no conocimiento el otro, atendiendo a la urgencia. La norma contempla supuestos diversos a los de la potestad doméstica, reconociendo un ámbito propio para las necesidades extraordinarias. No obstante, en numerosos casos resultará difícil deslindar ambos ámbitos, pues los gastos extraordinarios pueden incardinarse en la potestad doméstica, como ocurre con la atención médica urgente por accidente de un hijo o los gastos por inundación o incendio del hogar familiar.

5. LOS ACTOS INDIVIDUALES DE CARÁCTER LESIVO O FRAUDULENTO

El Código regula dos supuestos de actos individuales de un cónyuge que pueden perjudicar al otro. El artículo 1390 establece que si un cónyuge, mediante un acto de administración o disposición, obtiene un beneficio exclusivo para sí o causa dolosamente un daño a la sociedad de gananciales, será deudor a esta por el importe correspondiente, aunque el otro cónyuge no impugne la eficacia del acto. El artículo 1391 añade que, si el acto se realiza en fraude de los derechos del consorte, se aplica lo anterior y, además, si el adquirente actuó de mala fe, el acto será rescindible.

Estos preceptos se refieren exclusivamente a actos sobre bienes gananciales, pues sobre los bienes privativos cada cónyuge puede disponer libremente aunque ello perjudique a la sociedad (por ejemplo, cancelar un arrendamiento de una finca privativa cuyas rentas sí son gananciales).

La lesión o fraude se refieren única y exclusivamente al otro cónyuge o a la sociedad de gananciales, no a terceros. Además, la aplicación de los artículos 1390 y 1391 no queda circunscrita a los casos en que el cónyuge actuante contravenga las normas de gestión conjunta; son aplicables incluso si estaba legitimado para actuar individualmente, siempre que el resultado sea lesivo o fraudulento para el otro cónyuge. La finalidad es evitar el perjuicio patrimonial del cónyuge no actuante o proteger el patrimonio ganancial.

El perjuicio puede consistir en: a) beneficio o lucro exclusivo para el cónyuge agente, que supone un enriquecimiento injusto para él y privación para el otro; b) daño doloso a la sociedad mediante la asunción de deudas o gastos caprichosos que no sean cargas de la sociedad (juego, vicios); c) actos fraudulentos respecto del consorte no actuante, como ocultar beneficios o enajenar bienes gananciales a bajo precio. La consecuencia principal es que el cónyuge contratante se constituye en deudor de la sociedad por el importe correspondiente, aunque no se impugne el acto, pudiendo el perjudicado instar el reintegro en la liquidación. Desde el punto de vista de terceros, el acto transmisivo o la deuda mantienen su validez si no se impugnan. En caso de fraude, si el adquirente actuó de mala fe, el acto es además rescindible.

Esta regla del reintegro no es especialmente grave, lo que explica que el artículo 1393.2ª considere legitimado al cónyuge perjudicado para instar la disolución judicial de la sociedad cuando el otro cónyuge realice por sí solo actos dispositivos o de gestión que entrañen fraude, daño o peligro para los derechos del otro. La mayoría de la doctrina entiende que este precepto exige reiteración (actos continuados y repetitivos), pero los autores consideran que esa interpretación beneficia excesivamente al cónyuge ventajista y debería revisarse.

6. LA TRANSFERENCIA DE LA GESTIÓN A UN SOLO CONSORTE

La posibilidad de actuación individual de un cónyuge no quiebra el principio de gestión conjunta, sino que concreta sus excepciones. Para el resto, rige la regla de actuación conjunta. No obstante, cuando la gestión conjunta resulta inviable por imposibilidad o inconveniencia de que uno de los cónyuges actúe o preste su consentimiento, el ordenamiento transfiere a uno de ellos todas las facultades administrativas sobre el patrimonio ganancial. Doctrinalmente, estos casos se denominaban, con la normativa anterior a 1981, “supuestos de transferencia de la gestión” a la mujer cuando el marido estaba prófugo, rebelde o impedido. La Ley 11/1981 mantiene la denominación, pero en plano de igualdad para ambos cónyuges. Así, cabe transferir en bloque las facultades de administración y disposición, distinguiendo los artículos 1387 y 1388 entre transferencia ope legis y transferencia judicial.

6.1. Transferencia ope legis: la representación legal del consorte

El artículo 1387 regula la transferencia ope legis, según la cual la administración y disposición de los bienes gananciales se transferirá por ministerio de la ley al cónyuge que sea nombrado curador de su consorte con discapacidad, cuando se le hayan atribuido facultades de representación plena. Esta asunción presupone que el cónyuge administrador sea el curador de su consorte, regla general ex artículo 276 CC, y recibe tales poderes de forma automática, tanto de administración como de disposición. Si se nombra otro curador distinto o solo curador de la persona pero no de los bienes, el otro cónyuge no recibe las facultades de gestión.

6.2. La transferencia judicial

La transferencia judicial, regulada en el artículo 1388, permite a los Tribunales conferir la administración a un solo cónyuge cuando el otro se halle en imposibilidad de prestar consentimiento, haya abandonado la familia o exista separación de hecho. El abandono de la familia requiere escasa justificación. La separación de hecho parece referirse a la separación por abandono, pues en la convencional los cónyuges suelen pactar medidas patrimoniales. La imposibilidad de prestar consentimiento puede deberse a causas fácticas (secuestro, ingreso en UCI) o jurídicas (duda sobre capacidad de obrar, aunque no haya declaración de necesidad de apoyo). A diferencia del artículo 1387, el 1388 solo permite “conferir la administración”, por lo que para actos de disposición sería necesaria autorización judicial. No obstante, el artículo 1389 podría llevar a que solo los actos de disposición especialmente relevantes requieran dicha autorización, pues resulta impensable que el cónyuge administrador quede sometido a autorización judicial incluso para actos de disposición propios de la administración ordinaria.

6.3. Las facultades del cónyuge administrador

El artículo 1389.1 establece que el cónyuge administrador tendrá plenas facultades para ello, salvo que el juez establezca cautelas o limitaciones en interés de la familia. Sin embargo, esa plenitud es más aparente que real respecto de los actos de disposición sobre bienes valiosos, pues el apartado segundo exige autorización judicial para disponer de inmuebles, establecimientos mercantiles, objetos preciosos o valores mobiliarios, salvo el derecho de suscripción preferente. Cabe defender la anulabilidad de los actos realizados sin dicha autorización, pero quizá sea preferible predicar la nulidad radical por vulnerar una norma imperativa, dado que el otro cónyuge difícilmente podrá instar la anulación. Esto es aplicable tanto a la transferencia ope legis como a la judicial. En cambio, para los actos de disposición requeridos por la administración ordinaria, el primer párrafo del artículo 1389 (“tendrá para ello plenas facultades”) parece autorizar su admisibilidad como regla, si bien la resolución judicial puede establecer limitaciones concretas.

7. LA DISPOSICIÓN TESTAMENTARIA DE LOS BIENES GANANCIALES

El artículo 1379 permite que cada cónyuge disponga por testamento de la mitad de los bienes gananciales. Sin embargo, este precepto está mal ubicado sistemáticamente, porque la gestión de la sociedad de gananciales presupone su vigencia, mientras que la disposición testamentaria solo surte efecto tras la muerte del testador, momento en que la sociedad ya se ha disuelto. Su permanencia en el Código se debe a razones históricas: antes de la Ley 11/1981, el artículo 1414 establecía que el marido no podía disponer por testamento sino de su mitad de los gananciales.

La reforma de 1981 convirtió la norma en afirmativa y la extendió a ambos cónyuges, manteniendo un precepto superfluo y mal sistematizado. El artículo 1380 merece igual crítica: su contenido debería estar en las normas sobre legados, no en la gestión de gananciales. Este precepto señala que la disposición testamentaria de un bien ganancial produce todos sus efectos si el bien es adjudicado a la herencia del testador; en caso contrario, se entiende legado el valor que tenía al momento del fallecimiento.

8. ADMINISTRACIÓN Y DISPOSICIÓN DE LOS BIENES PROPIOS

En principio, cada cónyuge administra y dispone de sus propios bienes, y ninguno puede atribuirse la representación del otro sin que le haya sido conferida, según el artículo 71.

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();

function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }


    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }

    /* =========================
       PDF -> epígrafes
    ========================= */
    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
