       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LA DISOLUCIÓN DEL MATRIMONIO.

El Código Civil dedica el capítulo VIII a la disolución del matrimonio, estableciendo en el art. 85 que el matrimonio se disuelve, cualquiera que sea su forma y tiempo de celebración, por la muerte, la declaración de fallecimiento o el divorcio. La disolución supone la pérdida de eficacia de un matrimonio que hasta ese momento era plenamente válido.

El término disolución se utiliza también respecto de los regímenes económico-matrimoniales, y en ambos casos implica una ineficacia sobrevenida. A diferencia de la nulidad, que actúa por vicios originarios y produce efectos retroactivos (ex tunc), la disolución opera hacia el futuro, extinguiendo los efectos desde que concurre la causa legalmente prevista.

La precisión introducida por la Ley 30/1981 —“sea cual fuere la forma y el tiempo de su celebración”— garantiza que la disolución por divorcio afecta tanto a matrimonios civiles como religiosos, y tanto a los celebrados antes como después de la entrada en vigor de la ley.

2. LA MUERTE.

La muerte de uno de los cónyuges comporta automáticamente la disolución del matrimonio, pues la existencia de ambos constituye un presupuesto esencial de la institución matrimonial.

Desaparecido uno de sus miembros, cesa el vínculo jurídico.

Disuelto el matrimonio por fallecimiento, el cónyuge viudo recupera de inmediato la libertad para contraer nuevo matrimonio. La Ley 30/1981 derogó la antigua prohibición que impedía a la viuda volver a casarse durante trescientos un días o antes del parto si estaba encinta, norma que respondía a problemas históricos de determinación de la filiación.

La supresión de esta limitación se enmarca en el principio de igualdad entre hombres y mujeres, sin perjuicio de que la antigua regla estuviera vinculada a circunstancias biológicas específicas que hoy se consideran superadas por el sistema jurídico vigente.

3. LA DECLARACIÓN DE FALLECIMIENTO.

La declaración de fallecimiento supone que al ausente se le tiene por muerto, aunque no exista certeza absoluta sobre su fallecimiento. Se trata de una presunción iuris tantum, que admite prueba en contrario: mientras no reaparezca o no se acredite su existencia, se le considera fallecido a todos los efectos jurídicos.

Conforme al art. 85 CC, la declaración de fallecimiento es causa de disolución del matrimonio, equiparándose a la muerte real del cónyuge. La ineficacia del vínculo opera desde la firmeza de la declaración, con efectos hacia el futuro.

3.1. El matrimonio del declarado fallecido.

Hasta la Ley 30/1981, el art. 195.3 CC impedía al cónyuge presente contraer nuevo matrimonio pese a la declaración de fallecimiento, lo que generaba la paradoja de un cónyuge oficialmente viudo pero sin libertad matrimonial.

La reforma de 1981 suprimió esa incoherencia al establecer expresamente que el matrimonio se disuelve también por la declaración de fallecimiento. En consecuencia, una vez firme la declaración, el cónyuge presente puede contraer nuevo matrimonio sin requisito adicional alguno.

Esta solución resulta plenamente coherente con el sistema actual, especialmente tras la implantación del divorcio no causal, pues carecería de sentido mantener artificialmente un vínculo matrimonial cuando el propio ordenamiento permite su disolución por mera voluntad.

3.2. La reaparición del declarado fallecido.

Dado que la declaración de fallecimiento es una presunción, cabe la eventual reaparición del declarado fallecido. El art. 197 CC regula principalmente sus efectos patrimoniales, estableciendo que el reaparecido recupera sus bienes, aunque sin efectos retroactivos respecto de los actos válidamente realizados por quienes los hubieran adquirido durante su ausencia.

En el plano personal, puede recuperar su posición en determinadas relaciones jurídicas, como la patria potestad sobre hijos menores.

Sin embargo, no recupera automáticamente la condición de cónyuge. El matrimonio quedó disuelto por efecto de la declaración de fallecimiento y no revive con la reaparición. Si el cónyuge presente contrajo nuevo matrimonio, este será plenamente válido. Incluso si no lo hubiera hecho, el vínculo anterior no renace, siendo necesaria la celebración de un nuevo matrimonio si ambos desean reanudar la convivencia conyugal.

4. EL DIVORCIO CONFORME A LA REGULACIÓN ESTABLECIDA POR LA LEY 15/2005

El divorcio consiste en la disolución del matrimonio válido y eficaz a instancia de los cónyuges, provocando su ineficacia sobrevenida. A diferencia de la nulidad, no cuestiona la validez originaria del vínculo, sino que extingue sus efectos desde la resolución que lo declara.

En España, la admisión del divorcio ha estado históricamente vinculada a intensos debates sociales, especialmente por la profunda tradición católica del país. Tras la transición democrática, la Ley 30/1981 introdujo el divorcio en el ordenamiento civil, aunque bajo un sistema causalista.

Posteriormente, la Ley 15/2005 supuso una transformación radical al suprimir las causas legales de separación y divorcio, instaurando un modelo basado esencialmente en la voluntad de los cónyuges.

4.1. El establecimiento del divorcio

Históricamente, el Derecho español no admitió el divorcio como causa de disolución del matrimonio. La Ley de Matrimonio Civil de 1870 utilizaba el término “divorcio” para referirse a la separación, no a la ruptura del vínculo. La regulación canónica del matrimonio, que proclamaba su indisolubilidad, marcó durante siglos el sistema jurídico español.

La Constitución de 1931 reconoció por primera vez el divorcio con rango constitucional, permitiendo la disolución por mutuo disenso o por petición de uno de los cónyuges con justa causa, desarrollado por la Ley de Divorcio de 1932. Sin embargo, esta normativa fue suspendida en 1938 y definitivamente derogada en 1939, restableciéndose el principio de indisolubilidad durante el régimen franquista.

La Constitución de 1978 no impuso expresamente el divorcio, pero en su art. 32.2 remitió al legislador la regulación de las causas de separación y disolución. En este contexto, la Ley 30/1981 introdujo el divorcio en el Código Civil, marcando un cambio estructural en el sistema matrimonial español.

La Ley 15/2005 profundizó esta evolución al abandonar definitivamente el modelo causalista, configurando el divorcio como un derecho basado en la libertad individual, eliminando la necesidad de alegar causa y reforzando la idea de que la continuidad del vínculo matrimonial depende esencialmente de la voluntad de los cónyuges.

4.2. CARACTERÍSTICAS DEL DIVORCIO EN EL SISTEMA ESPAÑOL

La configuración del divorcio depende de las opciones legislativas adoptadas en cada ordenamiento. En Derecho comparado pueden distinguirse, en primer lugar, el divorcio consensual puro, basado exclusivamente en la voluntad concorde de los cónyuges sin intervención decisoria del Estado, y el divorcio judicial, que exige procedimiento y resolución formal. Dentro de este último pueden diferenciarse modelos como el divorcio-sanción, el divorcioremedio o el consensual judicializado.

En España, el sistema instaurado por la Ley 30/1981 fue claramente de divorcio judicial, pues la disolución requería sentencia firme, conforme al art. 89 CC. La mera voluntad de los cónyuges no bastaba. Sin embargo, la Ley 15/2005 amplió el ámbito de la autonomía privada y reformó el art. 89, estableciendo que los efectos del divorcio se producen desde la firmeza de la sentencia o decreto, o desde la manifestación del consentimiento en escritura pública conforme al art. 87, con eficacia frente a terceros desde su inscripción en el Registro Civil.

No existe en nuestro sistema el divorcio de hecho: la disolución requiere necesariamente sentencia, decreto o escritura pública, con carácter constitutivo. Tras la Ley 15/2015, de jurisdicción voluntaria, el divorcio de mutuo acuerdo puede formalizarse ante el letrado de la Administración de Justicia o ante notario, siempre que concurran los requisitos legales, excluyéndose la intervención de funcionarios consulares para autorizar escrituras de divorcio.

La LO 1/2025 ha reducido aún más la función jurisdiccional, introduciendo la exigencia de actividad negociadora previa como requisito de procedibilidad. Las partes pueden acudir a los Métodos Alternativos de Solución de Controversias (MASC), incluida la mediación regulada por la Ley 5/2012, pudiendo elevar a escritura pública el acuerdo alcanzado. No obstante, los supuestos de violencia de género o violencia sexual quedan excluidos de esta exigencia.

4.3. LA SOLICITUD DE DIVORCIO

La innovación esencial de la Ley 15/2005 radica en el abandono del sistema causalista. Bajo la Ley 30/1981 era necesario acreditar alguna de las causas legales de divorcio; hoy, conforme al art. 86 CC, se decretará el divorcio a petición de uno solo de los cónyuges, de ambos o de uno con el consentimiento del otro, cuando concurran los requisitos del art. 81.

En consecuencia, no es preciso alegar ni probar causa alguna. Basta el transcurso de tres meses desde la celebración del matrimonio y la presentación de la propuesta de medidas o del convenio regulador. La autoridad competente deberá decretar el divorcio si concurren tales requisitos.

Tras la LO 1/2025, para solicitar judicialmente el divorcio es imprescindible acreditar el cumplimiento del requisito de procedibilidad consistente en la actividad negociadora previa o, en su caso, justificar su imposibilidad. La mediación constituye uno de los instrumentos habilitados, pudiendo el acuerdo alcanzado elevarse a escritura pública si cumple los requisitos legales.

En definitiva, el sistema español actual configura el divorcio como un mecanismo basado en la libertad individual y la autonomía de la voluntad, sometido a control formal y garantista, pero desprovisto de exigencia causal.

5. LA ACCIÓN DE DIVORCIO

Tras la Ley 15/2005, la acción de divorcio corresponde a ambos cónyuges, ya actúen conjuntamente o por separado, conforme a la nueva redacción del art. 86 CC. Desaparecidas las restricciones excepcionales que contemplaba la Ley 30/1981, la legitimación activa se configura hoy con carácter amplio y simétrico.

La acción de divorcio tiene naturaleza personalísima, pues se extingue por la muerte de cualquiera de los cónyuges (art. 88.1), sin transmisión a los herederos. A estos efectos, se equiparan la muerte y la declaración de fallecimiento. Además, una vez transcurridos tres meses desde la celebración del matrimonio, puede ejercitarse en cualquier momento.

La jurisprudencia ha precisado que, cuando uno de los cónyuges no pueda actuar por sí mismo por razón de discapacidad, su representante legal puede ejercitar la acción si se acredita el interés de la persona afectada (STC 311/2000; STS 625/2011). Más recientemente, la STS 767/2024 ha reforzado el principio de autonomía personal, admitiendo que una persona con discapacidad cognitiva grave pueda interponer por sí misma la demanda si manifiesta de forma clara, persistente e inequívoca su voluntad de divorciarse.

El art. 88 CC dispone asimismo que la acción se extingue por la reconciliación, que deberá ser expresa cuando se produzca tras la interposición de la demanda. Ello exige su comunicación al órgano judicial, pues de lo contrario el proceso y las medidas provisionales continuarían su curso.

La reconciliación puede operar incluso en fase de recurso, conforme al art. 19 LEC.

Finalmente, la acción de divorcio no está sujeta a plazos de prescripción ni de caducidad, dada su naturaleza y la libertad reconocida a los cónyuges para instarla cuando lo estimen oportuno.

6. EL RÉGIMEN PROCESAL DE LA SEPARACIÓN O DIVORCIO DE MUTUO ACUERDO EN LA LEY DE ENJUICIAMIENTO CIVIL DE 2000 

La Ley de Enjuiciamiento Civil de 2000 derogó la regulación procedimental contenida en las disposiciones adicionales de la Ley 30/1981 y sistematizó la materia en el Título I del Libro IV, dedicado a los procesos sobre capacidad, filiación, matrimonio y menores. En él se establecen reglas generales comunes y, posteriormente, reglas específicas para los procesos matrimoniales (arts. 769 y ss.), modificadas en parte por la Ley 15/2015, de Jurisdicción Voluntaria.

Con carácter previo a la interposición de la demanda contenciosa, se exige la actividad negociadora previa, orientada a fomentar soluciones consensuadas mediante métodos alternativos de resolución de conflictos, como la mediación, reduciendo así la litigiosidad.

Las demandas se tramitan por los trámites del juicio verbal, siendo obligatoria la intervención de abogado y procurador. Cuando existan hijos menores no emancipados, hijos mayores con discapacidad con medidas de apoyo atribuidas a sus progenitores, o personas en situación de ausencia legal, es preceptiva la intervención del Ministerio Fiscal. Asimismo, deberá oírse a los menores con suficiente juicio y, en todo caso, a los mayores de doce años.

En los supuestos de separación o divorcio de mutuo acuerdo, el art. 777 LEC establece un procedimiento simplificado. Los cónyuges deben presentar junto con la demanda el convenio regulador, pudiendo actuar con una sola defensa y representación. Ratificada la solicitud por ambos por separado, el juez dictará sentencia —o el letrado de la Administración de Justicia decreto, cuando proceda— concediendo o denegando la separación o el divorcio y pronunciándose sobre el convenio. Si existen hijos menores, es necesario el informe del Ministerio Fiscal sobre las medidas que les afecten.

Si el letrado de la Administración de Justicia aprecia que el convenio puede resultar dañoso o gravemente perjudicial para uno de los cónyuges o para los hijos mayores o emancipados afectados, solo el juez podrá aprobarlo. De este modo, el sistema combina la facilitación del acuerdo con un control judicial mínimo orientado a la protección de los intereses familiares más vulnerables.

7. LA DISOLUCIÓN POR DIVORCIO

7.1. La sentencia, decreto o escritura de divorcio

Tradicionalmente, el art. 89 establecía que la disolución del matrimonio por divorcio solo podía tener lugar por sentencia judicial firme, lo que excluía cualquier forma de divorcio puramente fáctico o privado. La declaración judicial constituía el presupuesto indispensable, y sus efectos se producían ex nunc, es decir, desde la firmeza, sin retroactividad.

La reforma introducida por la Ley de Jurisdicción Voluntaria amplía los instrumentos formales, permitiendo que los efectos de la disolución se produzcan desde la firmeza de la sentencia o decreto, o desde la manifestación del consentimiento en escritura pública conforme al art. 87. Sin embargo, la inscripción en el Registro Civil es necesaria para que el divorcio despliegue efectos frente a terceros de buena fe.

Aunque doctrinalmente se discutió si la sentencia tenía carácter constitutivo y si el juez disponía de facultades discrecionales, el sistema vigente confirma que la autoridad competente se limita a comprobar la concurrencia de los requisitos legales y la voluntad de las partes, sin margen para valorar la oportunidad del divorcio.

7.2. Los efectos del divorcio

El efecto esencial del divorcio es la disolución definitiva del vínculo matrimonial. Desde ese momento, los cónyuges pasan a ser ex cónyuges y desaparecen los deberes del art. 68: convivencia, fidelidad, socorro mutuo y corresponsabilidad doméstica.

Se extinguen igualmente los derechos sucesorios entre ellos, recuperan plena libertad matrimonial y, en su caso, queda disuelto el régimen económico matrimonial de comunidad de ganancias. No cabe que el órgano competente module estos efectos estructurales, pues vienen directamente impuestos por la ley.

Respecto de los hijos, el divorcio es jurídicamente intrascendente en cuanto a las obligaciones parentales: la separación, nulidad o divorcio no eximen a los padres de sus deberes para con ellos. Frente a terceros, los efectos solo se despliegan plenamente desde la inscripción registral.

7.3. La modificación del régimen económico matrimonial y la inscripción en el Registro Civil

La disolución del matrimonio conlleva la alteración del régimen económico matrimonial. El art. 1333 exige que en la inscripción del matrimonio consten las capitulaciones y las resoluciones que modifiquen dicho régimen. Si afectan a inmuebles, deberá tomarse razón en el Registro de la Propiedad.

La inscripción en el Registro Civil es presupuesto necesario para que puedan practicarse las correspondientes inscripciones inmobiliarias cuando, por ejemplo, un bien ganancial pase a tener carácter privativo tras el divorcio. Sin esa constancia registral previa, no podrá accederse al Registro de la Propiedad.

7.4. La reconciliación de los divorciados

A diferencia de lo que ocurre en la separación, la reconciliación posterior al divorcio no produce efectos jurídicos restauradores del vínculo. El art. 88 dispone que la reconciliación no revive el matrimonio disuelto.

Si los antiguos cónyuges desean restablecer el vínculo, deberán celebrar un nuevo matrimonio.

La mera reanudación de la convivencia solo generará, en su caso, una situación de hecho sin efectos matrimoniales plenos.

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
