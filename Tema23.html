  try{

    const SCORE_BAD = 0.20;   // resta

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. CONCEPTO Y FUNDAMENTO

La patria potestad es el conjunto de deberes, atribuciones y derechos que corresponden a los progenitores respecto de los hijos menores de edad, por encontrarse estos bajo su guarda, protección y custodia. Aunque históricamente fue concebida, conforme al modelo romano, como un derecho subjetivo del paterfamilias sobre la persona de los hijos y sobre sus bienes, en la actualidad su configuración es la opuesta: no constituye un derecho subjetivo de los padres, sino una potestad en sentido técnico.

Esta potestad se entiende como un conjunto de facultades que el ordenamiento reconoce a los progenitores no para la satisfacción de sus intereses, sino como consecuencia de los deberes que les incumben en relación con la crianza, educación y formación de los hijos. Por ello, el elemento central de la institución no son los poderes de los padres, sino la protección y el desarrollo integral de los hijos. Las facultades atribuidas por el Código Civil a los progenitores solo se justifican en cuanto instrumentos para actuar en beneficio de los menores.

La regulación vigente está presidida por la idea del interés de los hijos, expresamente proclamada por el art. 154.2 del Código Civil al establecer que la patria potestad debe ejercerse siempre en interés de aquellos y de acuerdo con su personalidad. De este modo, los poderes parentales quedan subordinados a la formación integral de los hijos y la patria potestad pasa a presentarse como una responsabilidad parental caracterizada por la paciencia, la comprensión y la responsabilidad continuada de los progenitores. En esta línea, tras la reforma introducida por la LPIA, el art. 154 CC incorpora por primera vez en el Derecho común esa referencia expresa a la responsabilidad parental.

En la actualidad, la patria potestad corresponde por regla general a ambos progenitores conjuntamente, de forma inseparable, como consecuencia de la igualdad jurídica entre hombre y mujer y de la superación del modelo patriarcal que relegaba a la madre a un papel subsidiario.

Esta concepción fue incorporada fundamentalmente por las Leyes 11/1981 y 21/1987, posteriormente matizadas por reformas de detalle, y se proyecta igualmente sobre los matrimonios homosexuales. Por ello, la redacción originaria del art. 154.1, que aludía al padre y a la madre, fue sustituida por la fórmula actual según la cual los hijos no emancipados están bajo la potestad de sus progenitores.

Junto a la regulación del Código Civil, existen previsiones específicas en algunos Derechos civiles autonómicos. El Código Civil de Cataluña regula la potestad parental y el de Aragón la autoridad familiar, reconociendo ambos la intervención del cónyuge o pareja del progenitor biológico en los actos ordinarios de la vida del hijo durante la convivencia. En Aragón, además, se contempla la autoridad familiar de los abuelos y de los hermanos mayores del menor. También la Compilación navarra contiene reglas propias tras su reforma de 2019.

Al tratarse de una institución referida a menores de edad, resulta especialmente relevante la Ley Orgánica 1/1996, de protección jurídica del menor, que consagra como principio fundamental que el interés superior del menor debe constituir el criterio primordial en toda decisión o actuación que le afecte, tanto en el ámbito público como en el privado. La reforma operada por la Ley Orgánica 8/2015 ha precisado el contenido de ese concepto, incorporando criterios procedentes de la jurisprudencia interna y de disposiciones internacionales. A su vez, la Ley 26/2015 ha introducido cambios relevantes en esta materia, sustituyendo en numerosos preceptos la referencia al beneficio del menor por la de su interés, y la de juicio por la de madurez, en consonancia con la evolución doctrinal más reciente.

2. LOS SUJETOS DE LA PATRIA POTESTAD

2.1. Los hijos no emancipados

Quedan sometidos a la patria potestad, como regla general, los hijos e hijas menores de edad no emancipados, conforme al art. 154.1. Cuando un menor no puede quedar sujeto a patria potestad, como ocurre en supuestos de orfandad, privación de la patria potestad por motivos graves o situación de desamparo, debe constituirse la tutela para su protección. Tras la LO 8/2021, las referencias legales iniciales a los hijos han sido sustituidas por la expresión «hijos e hijas».

2.2. La patria potestad conjunta: titularidad y ejercicio de la patria potestad

La patria potestad corresponde conjuntamente a ambos progenitores. El art. 154.1 afirma que los hijos e hijas no emancipados están bajo la patria potestad de los progenitores, y el art. 156.1 parte de que esta debe ejercerse también conjuntamente. Así, la titularidad y el ejercicio compartidos constituyen el modelo legal ordinario y el ideal al que se orienta el sistema. Sin embargo, cuando existen desavenencias reiteradas o una situación de crisis entre los progenitores, la afirmación de ese principio general resulta más sencilla que su aplicación práctica, por lo que el art. 156 contempla los supuestos en que el ejercicio individual por uno de ellos puede ser válido.

2.3. El ejercicio coyuntural de la patria potestad por uno de los progenitores

El ejercicio individual de la patria potestad por uno de los progenitores se admite de forma coyuntural cuando actúa conforme al uso social, a las circunstancias o en situaciones de urgente necesidad, y también cuando actúa con el consentimiento expreso o tácito del otro. Además, en caso de desacuerdo, cualquiera de los progenitores puede acudir a la autoridad judicial, que, tras oír a ambos y al hijo si tiene suficiente madurez y, en todo caso, si es mayor de doce años, puede atribuir a uno de ellos la facultad de decidir. Si los desacuerdos son reiterados o existe otra causa que entorpezca gravemente el ejercicio de la patria potestad, puede atribuirse total o parcialmente a uno de los progenitores o distribuirse entre ellos sus funciones por un plazo máximo de dos años. En estos supuestos, respecto de terceros de buena fe, se presume que cada progenitor actúa en el ejercicio ordinario de la patria potestad con el consentimiento del otro. Cuando el desacuerdo es meramente ocasional, la titularidad y el ejercicio siguen siendo conjuntos, aunque el juez intervenga para resolver la cuestión concreta.

2.4. La atribución del ejercicio exclusivo de la patria potestad

Los desacuerdos reiterados pueden dar lugar a la atribución exclusiva del ejercicio de la patria potestad a uno de los progenitores, o solo de algunos de sus aspectos, por un plazo que no exceda de dos años. Durante ese tiempo, el otro progenitor queda excluido de la capacidad de decisión respecto de los hijos. También procede el ejercicio exclusivo cuando existe defecto, ausencia o imposibilidad de uno de los progenitores, siempre que no se trate de una dificultad momentánea, aunque tampoco se exija una previa declaración judicial de ausencia o incapacitación. Igualmente, si los progenitores viven separados, la patria potestad se ejerce por aquel con quien conviva el hijo, tanto si la separación deriva de resolución judicial como si responde a una situación de hecho. No obstante, el hecho de que la guarda y custodia cotidiana haya sido atribuida a uno solo de los progenitores no implica, por regla general, que la titularidad de la patria potestad deje de corresponder a ambos, por lo que los dos deben seguir participando en las decisiones importantes y continúan sujetos a las obligaciones derivadas de la función de guarda.

2.5. Desacuerdos parentales reiterados y expedientes de jurisdicción voluntaria

La Ley de jurisdicción voluntaria regula en sus arts. 85 a 89 los expedientes relacionados con los desacuerdos en el ejercicio de la patria potestad. Además, conforme al art. 5.3 de la LO 1/2025, para iniciar este tipo de expedientes es necesario haber acudido previamente a una actividad negociadora de solución de controversias.

2.6. Últimas modificaciones del art. 156 CC

El art. 156 CC fue objeto de controversia tras la incorporación por el Real Decreto-Ley 9/2018 de un párrafo relativo a la asistencia psicológica de los hijos menores en determinados supuestos.

Tras la reforma de la Ley 8/2021, se mantiene esa previsión y se añade la referencia a la falta de denuncia previa. Así, cuando exista sentencia condenatoria no extinguida o procedimiento penal iniciado contra uno de los progenitores por hechos graves cometidos contra los hijos menores comunes o contra el otro progenitor, basta el consentimiento de este último para la atención y asistencia psicológica de los hijos menores, debiendo informarse previamente al progenitor afectado. Esta misma regla se aplica aunque no se haya presentado denuncia si la mujer recibe asistencia en un servicio especializado de violencia de género y existe informe acreditativo de esa situación. Si la asistencia debe prestarse a hijos mayores de dieciséis años, es necesario en todo caso su consentimiento expreso. La constitucionalidad de la redacción inicial introducida en 2018 fue confirmada por la STC 106/2022, que desestimó el recurso interpuesto contra ella.

3. CONTENIDO PERSONAL DE LA PATRIA POTESTAD

3.1. La obediencia filial

Las relaciones entre progenitores e hijos se desenvuelven normalmente en un marco de afecto, por lo que rara vez requieren acudir al esquema legal de derechos y deberes. Desde el punto de vista personal, la relación paternofilial impone cargas mucho más intensas a los progenitores que a los hijos. Estos solo están obligados a obedecer a sus padres mientras permanezcan bajo patria potestad y a respetarlos siempre. El respeto no deriva propiamente de la patria potestad, sino de la relación paternofilial, por lo que subsiste incluso después de extinguida aquella y su incumplimiento grave puede tener consecuencias familiares como la desheredación o la negación de alimentos. La obediencia, en cambio, constituye la contrapartida específica de los deberes que pesan sobre los progenitores. Tras la reforma introducida en la LO 1/1996, también se recogen deberes de los menores en la vida familiar, entre ellos el respeto a progenitores, hermanos y otros familiares, así como la participación y corresponsabilidad en el cuidado del hogar y en las tareas domésticas conforme a su edad, autonomía y capacidad, sin distinción por razón de sexo.

3.2. Los deberes paternos

La patria potestad, como responsabilidad parental, debe ejercerse siempre en interés de los hijos, de acuerdo con su personalidad y con respeto a sus derechos y a su integridad física y mental.

Dentro de su contenido personal, comprende el deber de velar por ellos, tenerlos en su compañía, alimentarlos, educarlos y procurarles una formación integral. Aunque el precepto legal lo formule de manera breve, esos deberes tienen un alcance amplio y su concreción depende de las circunstancias familiares y de las características personales de los hijos, cuya opinión debe ser tenida en cuenta. Por eso, si tienen suficiente madurez, deben ser oídos antes de adoptar decisiones que les afecten, garantizándose que puedan expresar su parecer en condiciones adecuadas y con información comprensible y adaptada a sus circunstancias. Ese derecho a ser oídos no convierte su criterio en decisivo ni elimina el deber de obediencia, pero sí obliga a integrar su punto de vista en la vida familiar.

La formulación legal de los deberes paternos constituye un mínimo normativo que fija el estándar de conducta exigible a los progenitores, aunque en la realidad familiar muchas veces se sobrepase por la dedicación y abnegación de los padres. Frente a ello, cuando los progenitores incumplen sus responsabilidades, el Código exige que presten a los hijos asistencia, protección, compañía, alimentos, educación y formación integral, siempre atendiendo a las circunstancias concretas de cada familia. La expresión legal de velar por los hijos resume el conjunto de deberes parentales y supone proporcionarles la atención y protección que en cada momento requieran su crianza y formación.

Dentro de este contenido personal adquieren relevancia algunas previsiones recientes. La negativa del entorno familiar a respetar la orientación e identidad sexual, la expresión de género o las características sexuales de un menor debe valorarse a efectos de apreciar una situación de riesgo. También se ha planteado la incidencia de la libertad religiosa y de las divergencias entre progenitores en decisiones como la elección del centro escolar. Además, la reforma introducida por la LO 8/2021 aclara que decidir el lugar de residencia habitual del menor forma parte del contenido de la patria potestad, de modo que el traslado exige el consentimiento de ambos progenitores o, en su defecto, autorización judicial, con independencia del régimen de guarda y custodia. Para reforzar esta protección, el art. 158 contempla medidas judiciales dirigidas a evitar la sustracción del menor, como la prohibición de salida del territorio nacional, la limitación sobre el pasaporte y el sometimiento a autorización judicial de cualquier cambio de domicilio. En el ámbito catalán también se incorpora expresamente el deber de los progenitores de velar por la adecuada presencia de los hijos en entornos digitales y de promover medidas de protección frente a riesgos graves. Por su parte, la LO 1/2025 excluye de la exigencia de actividad negociadora previa los procesos dirigidos a adoptar las medidas protectoras del art. 158 del Código Civil.

3.3. La abrogación de la facultad de corrección por la Ley 54/2007

Tradicionalmente, el Código Civil reconocía a los progenitores la facultad de corregir razonable y moderadamente a los hijos, además de permitirles recabar el auxilio de la autoridad. La Ley 54/2007 suprimió la referencia expresa a esa facultad de corrección y dejó únicamente la posibilidad de acudir a la autoridad. Esta reforma se apoya en la idea de que la patria potestad debe ejercerse siempre en interés de los hijos y con respeto a su integridad física y mental, por lo que la corrección física o psicológica queda excluida como facultad legal expresa.

La supresión de esta previsión ha llevado a que, ante conductas desobedientes o conflictivas de los menores, el recurso formal previsto sea solicitar el auxilio de la autoridad. No obstante, en algunos Derechos civiles autonómicos sigue existiendo una referencia expresa a la facultad de corrección moderada. Además, una parte de la doctrina considera que, incluso en el Derecho común, dicha facultad no ha desaparecido por completo, sino que permanece implícita en el deber de educar a los hijos y procurarles una formación integral.

4. LA POTESTAD DE REPRESENTACIÓN

4.1. La representación legal

La atribución a los padres de la representación de los hijos menores no emancipados es consecuencia de la falta de capacidad de estos y constituye al mismo tiempo un derecho y un deber de asistencia mientras permanezcan bajo patria potestad. El art. 162 establece con carácter general que los progenitores que ostenten la patria potestad tienen la representación legal de sus hijos menores no emancipados, aunque excluye de ese ámbito los actos relativos a derechos de la personalidad que el hijo pueda realizar por sí mismo conforme a la ley y a su madurez, aquellos en que exista conflicto de intereses entre progenitores e hijo y los relativos a bienes sustraídos a la administración de los padres. También exige el consentimiento del menor con suficiente juicio para celebrar contratos que le obliguen a realizar prestaciones personales.

Fuera de esas excepciones, la representación legal se extiende en principio a todos los actos en que el menor no emancipado deba intervenir, pues su falta de capacidad exige la actuación de los progenitores en su nombre y por su cuenta. Sin embargo, esta regla general se ve matizada por leyes especiales y por una tendencia jurisprudencial que otorga creciente relevancia a la madurez del menor y le permite realizar por sí mismo determinadas actuaciones. En esa línea, la capacidad contractual del menor no emancipado comprende actualmente los contratos que la ley le permita celebrar por sí solo o con asistencia de sus representantes, así como los relativos a bienes y servicios de la vida corriente propios de su edad conforme a los usos sociales. El texto también destaca la regulación de la rectificación registral de la mención del sexo, que reconoce distintos grados de actuación autónoma o asistida del menor según su edad y prevé, en caso de desacuerdo con los representantes legales, el nombramiento de defensor judicial.

4.2. El conflicto de intereses: el defensor judicial

Cuando en un asunto exista conflicto de intereses entre los progenitores y el menor no emancipado, queda excluida la representación legal de aquellos. El art. 163 dispone que en tal caso se nombrará al menor un defensor judicial que lo represente dentro y fuera del juicio. La misma solución se aplica al menor emancipado cuando quienes deban completar su capacidad tengan un interés opuesto al suyo. Si el conflicto existe solo con uno de los progenitores, la representación corresponde legalmente al otro, sin necesidad de nombramiento especial.

Tras la reforma de la Ley 8/2021, el art. 235 regula el defensor judicial para los supuestos de conflicto de intereses entre menores y representantes legales, para los casos en que el tutor no desempeñe sus funciones y para aquellos en que el menor emancipado necesite complemento de capacidad y quien deba prestarlo no pueda hacerlo o mantenga con él conflicto de intereses.

No obstante, los arts. 162 y 163 no han sido modificados por esa reforma. Finalmente, con la entrada en vigor de la Ley 4/2023, las referencias del Código Civil al padre y la madre o a los padres han sido sustituidas por la expresión progenitores.

5. CONTENIDO PATRIMONIAL DE LA PATRIA POTESTAD

5.1. La administración de los bienes filiales

La evolución legislativa ha reducido progresivamente el contenido patrimonial de la patria potestad. Tras abandonarse el antiguo sistema de peculios, la regulación originaria del Código Civil limitó esas facultades a la administración y al usufructo de los bienes de los hijos menores no emancipados, mientras que la reforma de 1981 suprimió el usufructo paterno y restringió aún más las facultades patrimoniales de los progenitores. En la actualidad, estos administran los bienes de los hijos con la misma diligencia que los suyos propios y quedan sometidos a las obligaciones generales de todo administrador y a las especiales previstas en la legislación hipotecaria.

La administración de los bienes filiales constituye una carga derivada de la minoría de edad del hijo y se configura como una potestad sometida a deberes y ejercida gratuitamente. Los progenitores deben llevar cuentas y rendirlas al finalizar la patria potestad si los hijos lo exigen dentro del plazo legal. Además, deben administrar diligentemente, pues si su actuación pone en peligro el patrimonio del menor, el juez puede adoptar medidas de protección, exigir caución o incluso nombrar un administrador. Si se produce pérdida o deterioro de los bienes por dolo o culpa grave, los padres responden de los daños y perjuicios causados.

5.2. Bienes filiales excluidos de la administración de los progenitores

No todos los bienes de los hijos quedan sometidos a la administración de los progenitores.

Quedan excluidos los adquiridos a título gratuito cuando el disponente haya ordenado expresamente otra forma de administración y destino de sus frutos, debiendo respetarse estrictamente su voluntad. También se excluyen los adquiridos por sucesión cuando uno o ambos progenitores hayan sido justamente desheredados o no hayan podido heredar por causa de indignidad, pues en tal caso administrará la persona designada por el causante o, en su defecto, el otro progenitor o un administrador judicial. Igualmente quedan fuera de la administración paterna los bienes obtenidos por el hijo mayor de dieciséis años con su trabajo o industria, aunque en estos casos solo puede realizar por sí mismo los actos de administración ordinaria y necesita el consentimiento de los progenitores para los que excedan de ese ámbito.

5.3. Los frutos de los bienes filiales

Los frutos de los bienes del hijo no emancipado y todo lo que adquiera con su trabajo o industria le pertenecen siempre, como consecuencia de la desaparición del antiguo usufructo paterno y del principio general de que los frutos corresponden al propietario. Sin embargo, esta afirmación se matiza porque los progenitores pueden destinar los frutos del menor que conviva con ellos, en la parte que corresponda, al levantamiento de las cargas familiares, sin obligación de rendir cuentas sobre lo consumido con esa finalidad.

Esa misma posibilidad existe incluso respecto de bienes que los progenitores no administren, aunque con excepciones. No se incluyen los frutos de los bienes adquiridos a título gratuito con voluntad expresa del disponente ni los procedentes de bienes donados o dejados al hijo especialmente para su educación o carrera. Aun así, si los padres carecen de medios, pueden solicitar judicialmente la parte que en equidad proceda.

5.4. El control judicial de los actos de naturaleza dispositiva

La reforma de 1981 mantuvo el control judicial sobre la enajenación de inmuebles de los hijos y amplió esa exigencia a otros actos dispositivos relativos a establecimientos mercantiles o industriales, objetos preciosos y determinados valores mobiliarios. Para que tales actos sean válidos se requiere que concurran causas justificadas de utilidad o necesidad y la previa autorización judicial con audiencia del Ministerio Fiscal. También es necesaria esa autorización para repudiar la herencia o el legado deferidos al hijo.

No obstante, cuando el menor ha cumplido dieciséis años y presta su consentimiento en documento público, no se exige autorización judicial aunque se trate de inmuebles. Tampoco se exige respecto de la enajenación de valores mobiliarios si su importe se reinvierte en bienes o valores seguros.

5.5. Los actos ilícitos de los hijos: la responsabilidad civil de los padres

Los daños causados por los hijos sometidos a patria potestad generan la responsabilidad civil de los progenitores. Frente al antiguo modelo patriarcal, que atribuía esa responsabilidad prioritariamente al padre, la redacción actual coloca en pie de igualdad a ambos progenitores y los hace responsables de los daños causados por los hijos que se encuentren bajo su guarda.

Esta responsabilidad no constituye propiamente un efecto natural de la patria potestad, sino un supuesto específico de responsabilidad por hecho ajeno.

5.6. Los deberes patrimoniales de los hijos

Los hijos deben contribuir equitativamente, según sus posibilidades, al levantamiento de las cargas de la familia mientras convivan con ella. Esta obligación fue incorporada en la reforma de 1981 y se relaciona con la desaparición del usufructo paterno y con la facultad de los progenitores de aplicar a las cargas familiares los frutos de los bienes de los hijos convivientes.

Aunque en la mayoría de los casos los menores no pueden contribuir económicamente de forma relevante, sí pueden colaborar en el sostenimiento de la vida familiar mediante conductas y ayudas cotidianas que reduzcan necesidades y favorezcan su desarrollo armónico.

6. EXTINCIÓN Y SITUACIONES ANÓMALAS DE LA PATRIA POTESTAD

6.1. Extinción de la patria potestad

La patria potestad se extingue por la muerte o declaración de fallecimiento de los progenitores o del hijo, por la emancipación y por la adopción. La muerte y la declaración de fallecimiento no plantean especiales dificultades, mientras que en el caso de la adopción la extinción se produce respecto de los progenitores originarios, aunque la patria potestad pasa a corresponder a los adoptantes. La referencia a la emancipación exige, sin embargo, precisiones adicionales por su relación con la mayoría de edad.

6.2. Emancipación, mayoría de edad y patria potestad

El Código Civil ha generado cierta confusión al aproximar la emancipación y la mayoría de edad, al considerar esta última como la causa común de aquella. En la práctica, alcanzar la mayoría de edad suele implicar la extinción de la patria potestad, pero esa solución resultaba insatisfactoria en los supuestos en que los hijos judicialmente incapacitados seguían necesitando protección, pues obligaba a sustituir la patria potestad por la tutela. Para superar esa consecuencia, la reforma de 1981 introdujo la figura de la patria potestad prorrogada, aplicable tanto cuando la incapacitación se declaraba durante la minoría de edad como en ciertos casos posteriores. No obstante, esta construcción ha perdido relevancia tras la Ley 8/2021, que suprimió el régimen anterior de prórroga y rehabilitación de la patria potestad, de modo que, si al llegar la emancipación los hijos siguen necesitando apoyo, habrá de acudirse al sistema general de medidas de apoyo previsto en el Código Civil.

6.3. La privación de la patria potestad

La privación de la patria potestad solo puede acordarse judicialmente y puede ser total o parcial.

El art. 170 la vincula al incumplimiento de los deberes inherentes a la patria potestad o a su apreciación en causa criminal o matrimonial. No se trata de castigar al progenitor, sino de proteger al menor, por lo que la medida exige no solo la existencia de un incumplimiento grave, sino también que resulte conveniente para el interés del hijo. La ausencia de una tipificación cerrada obliga a una valoración casuística por parte de los tribunales.

La jurisprudencia ha considerado relevantes, entre otras circunstancias, la falta prolongada de contacto e interés por el hijo o el incumplimiento de sus necesidades pese a contar con medios económicos. También se contempla esta consecuencia en determinados delitos y en procesos matrimoniales cuando en ellos se revele causa suficiente. Sin embargo, no toda relación distante, residencia en el extranjero, actitud obstructiva del otro progenitor o pena privativa de libertad justifican por sí solas la privación. Debe tratarse de incumplimientos graves y reiterados, imputables al progenitor y de carácter personal o patrimonial. La medida puede recaer sobre uno o ambos progenitores y limitarse a ámbitos concretos, pudiendo redistribuirse o concentrarse funciones. Además, tiene especial relevancia en materia de adopción, ya que la privación influye en la necesidad o no de asentimiento de los progenitores.

6.4. La suspensión de la patria potestad

La suspensión de la patria potestad se utiliza para expresar situaciones de privación temporal o de limitación pasajera en su ejercicio, poniendo de relieve el carácter no definitivo de la medida.

Aunque no siempre aparece configurada de manera expresa, sirve para abarcar supuestos en que la función protectora respecto del menor es asumida temporalmente por otras personas sin desaparición plena de la titularidad. Así, puede ocurrir que la guarda y custodia se atribuya a otros familiares, como los abuelos, sin que ello implique necesariamente la suspensión de la patria potestad del progenitor, que conserva la titularidad salvo en el aspecto concreto de la guarda.

Tanto la privación como la suspensión responden a una finalidad de protección del menor y no de sanción del progenitor. Por ello, la decisión debe adoptarse siempre atendiendo al interés del hijo y a lo que resulte más conveniente para su protección, formación y educación. En ocasiones ello lleva a atribuir el ejercicio de la patria potestad al otro progenitor, a un familiar o incluso a un tercero, manteniendo sin embargo la titularidad y las obligaciones del progenitor afectado. Existe además un supuesto de suspensión legal cuando la entidad pública asume la tutela del menor en situación de desamparo, sin perjuicio de la validez de ciertos actos patrimoniales realizados por los progenitores en interés del menor.

6.5. La recuperación de la patria potestad

La recuperación de la patria potestad puede ser acordada por los tribunales cuando haya desaparecido la causa que motivó la privación y siempre que ello resulte beneficioso para el hijo.

Aunque la ley prevé esta posibilidad, la jurisprudencia muestra que no son frecuentes los casos en que la pretensión de recuperación tiene verdadero fundamento, tanto en el ámbito matrimonial como en las uniones extramatrimoniales.

6.6. La inscripción registral de la patria potestad y sus modificaciones

La legislación del Registro Civil establece la inscripción de las resoluciones judiciales que afecten a la titularidad, al ejercicio y a las modificaciones de la patria potestad en el registro individual del hijo y en el de su progenitor o progenitores. Se incluyen especialmente las resoluciones derivadas de nulidad, separación y divorcio, así como la extinción, privación, suspensión y recuperación de la patria potestad.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }
    
    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
