    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INCAPACITACIÓN Y APOYO PARA EL EJERCICIO DE LA CAPACIDAD JURÍDICA: VIEJO Y NUEVO SISTEMA

1.1. La redacción originaria del Código Civil y las primeras reformas: Leyes 13/1983 y 41/2003

La redacción originaria del Código Civil partía de un sistema en el que determinadas circunstancias legalmente tasadas permitían privar a una persona de la capacidad de obrar, dando lugar a la incapacitación. Esa privación nunca afectaba a la capacidad jurídica, pero exigía establecer mecanismos de representación y defensa mediante la tutela de familia, integrada por tutor, protutor y Consejo de familia. Los menores no emancipados quedaban sujetos a tutela cuando sus padres no podían ejercer la patria potestad y, en los supuestos de conflicto de intereses con ellos, procedía el nombramiento de defensor judicial.

La Ley 13/1983 transformó profundamente este esquema. Sustituyó la enumeración cerrada de causas de incapacitación por una fórmula general referida a enfermedades o deficiencias persistentes de carácter físico o psíquico que impidieran a la persona gobernarse por sí misma.

Introdujo la curatela junto a la tutela y al defensor judicial, aunque dejando poco claras las fronteras entre tutela y curatela y concediendo al juez un amplio margen de configuración.

Además, abandonó la tutela de familia y la reemplazó por una tutela sometida a la autoridad judicial. También permitió incapacitar a menores cuando fuese previsible la persistencia de la causa tras la mayoría de edad, lo que daba lugar a la patria potestad prorrogada o, en su defecto, a la tutela.

La Ley 41/2003 desplazó el foco hacia la protección patrimonial de las personas con discapacidad mediante la creación de un patrimonio especialmente protegido, vinculado a la satisfacción de sus necesidades vitales y favorecido por aportaciones gratuitas de bienes y derechos. Esta norma partía de que la discapacidad y la incapacitación judicial no coincidían necesariamente, porque podía existir discapacidad sin que procediera una declaración judicial de incapacitación. Por ello, los beneficiarios de este patrimonio podían ser personas con discapacidad con determinados grados de minusvalía, con independencia de que concurrieran o no causas de incapacitación y de que hubieran sido o no incapacitadas judicialmente.

1.2. La reforma normativa introducida por la Ley 8/2021, de 2 de junio, y la adaptación a la

Convención de Nueva York de 2006, sobre derechos de las personas con discapacidad La reforma española en esta materia deriva de la ratificación de la Convención de Nueva York de 2006 y se fue construyendo progresivamente mediante diversas modificaciones legislativas orientadas a adaptar el ordenamiento interno a los derechos de las personas con discapacidad.

Ese proceso culmina en el plano civil y procesal con la Ley 8/2021, en vigor desde el 3 de septiembre de 2021, que supone un cambio decisivo en la forma de entender la capacidad jurídica de estas personas.

La Convención proclama que las personas con discapacidad tienen capacidad jurídica en igualdad de condiciones con las demás en todos los aspectos de la vida y obliga a los Estados a proporcionarles los apoyos necesarios para su ejercicio. Las medidas que se adopten deben respetar los derechos, la voluntad y las preferencias de la persona, ser proporcionales, adaptadas a sus circunstancias, aplicarse durante el menor tiempo posible y someterse a revisión periódica por una autoridad competente, independiente e imparcial. Frente al modelo anterior, basado en la sustitución en la toma de decisiones, la nueva regulación se inspira en la dignidad de la persona, en la tutela de sus derechos fundamentales y en el respeto a su libre voluntad, de modo que la persona con discapacidad pasa a ser, con carácter general, quien toma sus propias decisiones.

En esta misma línea debe situarse la Ley 6/2022, que introduce como aspecto destacado la accesibilidad cognitiva, entendida como el conjunto de exigencias y pautas necesarias para garantizar la comprensión, la comunicación y la interacción de todas las personas con los entornos, bienes, servicios, procesos y procedimientos.

1.3. Los principales pilares de la reforma: de la tutela a la curatela y de la representación a los

apoyos La reforma abandona la lógica de sustitución de la voluntad y la sustituye por un sistema de asistencia en la toma de decisiones ajustado a las circunstancias concretas de cada persona.

Frente al modelo uniforme de la incapacitación judicial, se impone una respuesta individualizada, sometida a los principios de necesidad y proporcionalidad y objeto de revisión constante. Dentro de este nuevo enfoque se otorga preferencia a las medidas voluntarias adoptadas anticipadamente por la propia persona, como la autocuratela, los poderes preventivos, la escritura pública de autoayuda o las instrucciones previas sobre el cuidado de la salud.

Uno de los pilares esenciales es el fin de la incapacitación judicial como eje del sistema. El nuevo Título XI del Libro Primero del Código Civil pasa a centrarse en las medidas de apoyo a las personas con discapacidad para el ejercicio de su capacidad jurídica. El apoyo se concibe en sentido amplio, incluyendo acompañamiento, ayuda técnica en la comunicación, eliminación de barreras, consejo o incluso decisiones delegadas por la propia persona. Solo cuando el apoyo no pueda articularse de otro modo cabe la representación en la toma de decisiones. Además, cualquier persona que precise apoyo puede beneficiarse de estas medidas, aunque no tenga reconocimiento administrativo de discapacidad. El cambio no es solo terminológico, sino de enfoque, porque se asume que muchas limitaciones no proceden de la persona, sino del entorno físico, comunicacional, cognitivo, actitudinal y jurídico, lo que exige también una transformación social y profesional alejada del paternalismo.

Otro pilar es que la tutela queda reducida exclusivamente a los menores no emancipados no sujetos a patria potestad. En consecuencia, desaparecen en el ámbito de la discapacidad la tutela de adultos, la patria potestad prorrogada y la rehabilitada, por considerarse figuras rígidas e inadecuadas para promover la autonomía de la persona adulta con discapacidad. Al alcanzar la mayoría de edad, el menor con discapacidad pasará a recibir los apoyos que necesite en las mismas condiciones que cualquier otro adulto.

La figura central del nuevo sistema es la curatela, entendida como cuidado, asistencia y apoyo.

Puede ser asistencial y, solo en supuestos excepcionales en los que la persona no pueda decidir por sí misma, representativa. Cuando la necesidad de apoyo sea ocasional, aunque recurrente, podrá nombrarse un defensor judicial para actuar únicamente en esos momentos.

La reforma también potencia la guarda de hecho, porque en muchos casos la persona con discapacidad ya está atendida adecuadamente por alguien que la asiste sin necesidad de una investidura judicial formal. Cuando para actos concretos sea necesaria acreditación frente a terceros, podrá obtenerse una autorización judicial específica sin necesidad de incoar un procedimiento completo de nombramiento.

Por último, se crea un nuevo procedimiento de provisión de apoyos, de carácter preferentemente no contencioso y desligado de la lógica de la incapacitación. Se configura como un expediente judicial de prestación de apoyos basado en la participación activa de la propia persona y en la colaboración de profesionales especializados de los ámbitos jurídico, asistencial y sanitario, que orientarán sobre las medidas más adecuadas. Las medidas judiciales deberán revisarse periódicamente en un plazo máximo de tres años, ampliable excepcionalmente hasta seis, y podrán modificarse cuando cambie la situación de la persona. El sistema apuesta así por la jurisdicción voluntaria, sin excluir que el procedimiento se convierta en contradictorio, y remite el contenido de la sentencia a las normas civiles aplicables al tratarse de una cuestión sustantiva.

La aplicación judicial de esta normativa ya ha comenzado a consolidarse, incluso en la jurisprudencia del Tribunal Supremo, que insiste en que solo justifica la imposición de apoyos contra la voluntad de la persona aquella discapacidad que afecte realmente a su capacidad de tomar decisiones con efectos jurídicos en sus asuntos personales y patrimoniales. Además, la LO 1/2025 excluye estos procesos de la exigencia de actividad negociadora previa para acudir a la vía jurisdiccional.

2. LOS CARGOS TUITIVOS EN EL SISTEMA ANTERIOR A LA LAPCD O LEY 8/2021, DE 2 DE JUNIO 

El sistema anterior a la Ley 8/2021 preveía, conforme al art. 215 del Código Civil, tres cargos tuitivos para la guarda y protección de menores e incapacitados: tutela, curatela y defensor judicial. En términos generales, el tutor asumía la representación legal estable del menor o incapacitado, mientras que el curador tenía también carácter estable, pero su función consistía en complementar la capacidad del sometido a curatela sin sustituirlo. El defensor judicial presentaba un perfil próximo al del curador, aunque marcado por su carácter ocasional. Su régimen fue parcialmente modificado por la Ley 15/2015, que permitió al defensor judicial designado por el Letrado de la Administración de Justicia asumir la administración de los bienes de quien hubiera de ser sometido a tutela o curatela.

No obstante, la regulación introducida por la Ley 13/1983 se caracterizaba por una gran flexibilidad, que dificultaba cualquier esquema rígido. Podía haber uno o varios tutores, existían incapacitados sometidos a curatela y no a tutela, y las funciones del defensor judicial no estaban predeterminadas legalmente, sino que dependían de la decisión judicial. Por ello, más que una ordenación cerrada de figuras, el sistema ofrecía un marco dúctil en el que la concreción de funciones quedaba ampliamente abierta.

Dentro de ese régimen, los cargos tutelares tenían carácter obligatorio, aunque la ley admitía causas de excusa. El nombramiento del titular del cargo, salvo en el caso del defensor judicial, debía y solía recaer en un familiar cercano. Además, las resoluciones judiciales relativas a estos cargos debían inscribirse en el Registro Civil para hacer oponibles a terceros las condiciones de capacidad de la persona afectada. De este modo, si la declaración judicial no constaba inscrita, quien contratara con un incapacitado o con un pródigo no podía resultar perjudicado por esa falta de capacidad.

Una vez inscrita la resolución judicial sobre la capacidad, los actos realizados por la persona afectada producían consecuencias distintas según la medida establecida. Los contratos celebrados por personas sometidas a tutela eran nulos de pleno derecho, porque debían actuar por medio de su tutor. En cambio, los celebrados por quienes tenían asignado curador o defensor judicial eran anulables. También eran radicalmente nulos los actos y contratos realizados por el tutor sin la preceptiva autorización judicial cuando esta resultara exigible.

La Ley 8/2021 incorporó disposiciones transitorias para adaptar las situaciones existentes al nuevo sistema de apoyos. A los tutores de personas con discapacidad pasaron a aplicárseles las normas previstas para los curadores representativos. A determinados curadores de emancipados y menores beneficiados por la mayor edad se les aplicaron las normas del defensor judicial del menor. Los guardadores de hecho quedaron sometidos al nuevo régimen legal, y quienes ostentaban patria potestad prorrogada o rehabilitada continuaron ejerciéndola hasta la revisión prevista legalmente.

La revisión de las medidas ya acordadas quedó regulada en la disposición transitoria cuarta.

Podían solicitarla en cualquier momento las personas con capacidad modificada judicialmente, los declarados pródigos, los progenitores con patria potestad prorrogada o rehabilitada, los tutores, curadores, defensores judiciales y apoderados preventivos, con el fin de adaptar las medidas anteriores a la nueva ley. Esa revisión debía realizarse en el plazo máximo de un año desde la solicitud. Si no existía solicitud, la autoridad judicial debía revisar de oficio o a instancia del Ministerio Fiscal las medidas en un plazo máximo de tres años.

3. LA TUTELA EN EL SISTEMA INSTAURADO POR LA LAPCD O LEY 8/2021, DE 2 DE JUNIO

En el sistema instaurado por la Ley 8/2021, la tutela queda reducida a los menores no emancipados en situación de desamparo y a los menores no emancipados no sujetos a patria potestad. Desaparece así su aplicación a las personas adultas con discapacidad, para las que se reservan la curatela y las demás medidas de apoyo. Además, el régimen de la curatela se aplica supletoriamente a la tutela, al defensor judicial y al guardador de hecho.

Las funciones tutelares siguen configurándose como un deber, deben ejercerse en beneficio del tutelado y permanecen bajo la salvaguarda de la autoridad judicial. Para el nombramiento de tutor se da preferencia a la persona o personas designadas por los progenitores en testamento o documento público notarial y, en su defecto, al ascendiente o hermano que designe la autoridad judicial. No obstante, el juez puede alterar ese orden o prescindir de esas personas si el interés superior del menor lo exige, considerándose beneficiosa su integración en la vida familiar del tutor. A falta de las personas expresamente preferidas, la autoridad judicial designará a quien estime más idóneo por sus relaciones con el menor y atendiendo siempre a su interés superior.

Aunque la tutela debe ser objeto de estudio específico en el Derecho de familia, su tratamiento general conserva relevancia porque su régimen jurídico sigue proyectándose supletoriamente sobre otras instituciones. En el sistema anterior, el nombramiento del tutor respondía a un orden de preferencia más amplio, podía recaer en una o varias personas y también en personas jurídicas sin ánimo de lucro dedicadas a la protección de menores e incapacitados. Junto a ello, el Código Civil contemplaba numerosas causas de inhabilidad para ser tutor, que excluían a quienes hubieran sido privados de la patria potestad o de derechos de guarda, removidos de una tutela anterior, condenados a determinadas penas o delitos, incursos en imposibilidad de hecho, enemistad manifiesta, mala conducta, conflictos de intereses o determinadas situaciones concursales. También los progenitores podían excluir a ciertos parientes mediante testamento o documento notarial, aunque el juez podía apartarse de esa exclusión en beneficio del menor.

En el régimen anterior, pese a afirmarse el carácter obligatorio del cargo, las causas de excusa eran amplias, pues bastaban razones de edad, enfermedad, ocupaciones, falta de vínculo o cualquier otra circunstancia que hiciera excesivamente gravoso su ejercicio. Además, aunque la ley fijaba un breve plazo para alegarlas, podían invocarse en cualquier momento si eran sobrevenidas. También se distinguía entre la remoción del tutor, que suponía su cese por causas imputables a su conducta o situación personal, y la extinción de la tutela, que implicaba la desaparición de las circunstancias que justificaban la institución. La remoción podía fundarse en la concurrencia de causas de inhabilidad, en el mal desempeño del cargo o en graves problemas de convivencia con el pupilo.

En el nuevo sistema, pueden ser tutores las fundaciones y demás personas jurídicas sin ánimo de lucro, públicas o privadas, cuyos fines incluyan la protección y asistencia de menores. La ley diferencia entre causas de incapacidad absoluta para ser tutor y supuestos en que la autoridad judicial no puede efectuar el nombramiento. No podrán ser tutores quienes hayan sido privados o suspendidos judicialmente en el ejercicio de la patria potestad o de derechos de guarda y protección, ni quienes hayan sido legalmente removidos de una tutela, curatela o guarda anterior.

Tampoco podrá nombrarse tutor a quien haya sido excluido por los progenitores, condenado por delito que haga suponer un mal desempeño del cargo, sustituido en sus facultades de administración durante un procedimiento concursal, declarado culpable en un concurso, salvo tutela solo de la persona, o a quien tenga conflicto de intereses con la persona sujeta a tutela.

Las causas de excusa y de remoción de la tutela pasan a regirse por las normas de la curatela. La remoción no equivale a la extinción de la tutela, sino al cese del tutor por una causa imputable a su persona, mientras que en la excusa opera una causa ajena a su voluntad.

En relación con los menores en situación de desamparo, la tutela corresponde por ministerio de la ley a la entidad pública encargada en cada territorio de la protección de menores. Sin embargo, podrá nombrarse tutor conforme a las reglas ordinarias cuando existan personas físicas que puedan asumir la tutela en interés del menor. En tal caso, antes o al mismo tiempo deberá acordarse la suspensión o privación de la patria potestad o la remoción del tutor anterior. Están legitimados para promover estas actuaciones el Ministerio Fiscal, la entidad pública y quienes estén llamados al ejercicio de la tutela.

Cuando un menor se halla en situación de desamparo, la asunción de la tutela por la entidad pública implica la adopción de todas las medidas necesarias para su guarda y la suspensión de la patria potestad o de la tutela ordinaria, pudiendo promoverse, si procede, la privación de la patria potestad y la remoción de la tutela. La guarda debe realizarse preferentemente mediante acogimiento familiar, ya sea urgente, temporal o permanente, dentro de la familia extensa o en familia ajena. Solo cuando ello no sea posible o conveniente para el interés del menor se acudirá al acogimiento residencial. En todo caso, se busca el interés del menor, se prioriza su reintegración en la propia familia y se procura que los hermanos permanezcan unidos. El acogimiento cesa con la mayoría de edad o antes, si deja de ser necesario o conveniente.

4. LAS NUEVAS MEDIDAS DE APOYO A LAS PERSONAS CON DISCAPACIDAD PARA EL EJERCICIO DE SU CAPACIDAD JURÍDICA

Las nuevas medidas de apoyo para las personas mayores de edad o menores emancipados que las necesiten para el ejercicio de su capacidad jurídica son, junto a las de naturaleza voluntaria, la guarda de hecho, la curatela y el defensor judicial. Quienes presten ese apoyo deben actuar conforme a la voluntad, deseos y preferencias de la persona, procurando que esta desarrolle su propio proceso de toma de decisiones y que, incluso, pueda necesitar menos apoyo en el futuro.

Solo cuando, pese al esfuerzo realizado, no sea posible determinar esa voluntad, las medidas podrán incluir funciones representativas. Además, la ley impone límites a quienes desempeñen funciones de apoyo, prohibiéndoles recibir liberalidades no ordinarias mientras no se apruebe definitivamente su gestión, intervenir en actos con conflicto de intereses y adquirir o transmitir onerósamente bienes de la persona apoyada, salvo exclusión expresa en las medidas voluntarias.

4.1. Las medidas voluntarias

En el nuevo sistema adquieren especial protagonismo las medidas voluntarias, por las que la propia persona determina quién debe prestarle apoyo y con qué alcance. Entre ellas se encuentra la posibilidad de que, en los dos años anteriores a la mayoría de edad, cuando sea razonable prever que un menor sujeto a patria potestad o tutela precisará apoyo al llegar a la vida adulta, la autoridad judicial adopte la medida correspondiente a petición del menor, de sus progenitores, del tutor o del Ministerio Fiscal, siempre que el mayor de dieciséis años no haya hecho ya sus propias previsiones. En otro caso, el menor participa en el proceso conforme a su voluntad, deseos y preferencias.

También cualquier mayor de edad o menor emancipado puede prever o acordar en escritura pública medidas de apoyo relativas a su persona o bienes si aprecia o prevé circunstancias que dificulten el ejercicio de su capacidad jurídica. Dentro de estas medidas destacan los poderes y mandatos preventivos, pues quien los otorga puede establecer que subsistan si en el futuro necesita apoyo para ejercer su capacidad. Estos poderes deben otorgarse en escritura pública y el notario debe comunicarlos de oficio al Registro Civil. Solo cuando estas medidas sean inexistentes o insuficientes, y no exista guarda de hecho bastante, podrá la autoridad judicial adoptar medidas supletorias o complementarias.

4.2. La curatela conforme a la LAPCD

La curatela es una medida formal de apoyo para quienes necesiten apoyo de modo continuado.

Su alcance debe fijarse en la resolución judicial de acuerdo con la situación, circunstancias y necesidades de la persona. Como medida judicial, ha de revisarse periódicamente en un plazo máximo de tres años, salvo que excepcional y motivadamente se establezca otro superior que no podrá exceder de seis años. La curatela tiene carácter subsidiario respecto de las medidas voluntarias y solo procede cuando no exista otra medida de apoyo suficiente.

La nueva regulación distingue entre una curatela asistencial, centrada en el apoyo y el cuidado, y una curatela representativa, prevista solo para los casos excepcionales en que resulte imprescindible por las circunstancias de la persona. La autoridad judicial debe concretar los actos para los que la persona precisa asistencia del curador y, en su caso, los actos concretos en que este habrá de asumir su representación. En los supuestos de curatela representativa, el curador necesita autorización judicial para los actos determinados en la resolución y para otros de especial trascendencia patrimonial, personal o familiar. La resolución judicial no puede consistir en una mera privación de derechos.

Junto a ello, se regula la autocuratela, que permite a cualquier mayor de edad o menor emancipado proponer en escritura pública el nombramiento o la exclusión de determinadas personas para el ejercicio del cargo de curador. La autoridad judicial nombrará curador a quien haya sido propuesto por la persona que necesite apoyo o por quien ella haya designado para ello. A falta de propuesta, la ley establece un orden de preferencia en favor del cónyuge o pareja conviviente, descendientes, progenitores o ascendientes, personas designadas en testamento o documento público, guardador de hecho, hermanos, parientes o allegados convivientes, y personas jurídicas sin ánimo de lucro orientadas a la promoción de la autonomía y asistencia a personas con discapacidad. Ese orden puede alterarse por el juez, tras oír a la persona afectada, para nombrar a quien mejor comprenda e interprete su voluntad, deseos y preferencias.

La ley regula también las causas de inhabilidad, excusa y remoción del curador, aplicables supletoriamente a la tutela. No podrán ser curadores quienes hayan sido excluidos por la persona que precise apoyo, quienes estén privados o suspendidos judicialmente en la patria potestad y quienes hayan sido removidos legalmente de una tutela, curatela o guarda anterior. Tampoco podrá ser nombrado quien haya sido condenado por delito que haga suponer un mal desempeño del cargo, quien tenga conflicto de intereses, quien haya sido sustituido en sus facultades de administración durante un procedimiento concursal o a quien le sea imputable la calificación culpable del concurso. El desempeño del cargo será excusable cuando resulte excesivamente gravoso, y las personas jurídicas privadas podrán excusarse si carecen de medios suficientes o si la curatela no se ajusta a sus fines estatutarios, posibilidad que no se reconoce a las personas jurídicas públicas. La remoción procede cuando concurra causa legal de inhabilidad, cuando el curador incumpla sus deberes o actúe mal en el cargo, o cuando existan problemas graves y continuados de convivencia con la persona apoyada. Mientras se resuelve la excusa o la remoción, el juez puede nombrar un defensor judicial.

4.3. El defensor judicial conforme a la LAPCD

El nuevo sistema distingue entre el defensor judicial del menor y el de la persona con discapacidad, siendo la regulación de este último supletoria de la del primero en lo no previsto específicamente. En el caso del menor, procede cuando exista conflicto de intereses con sus representantes legales, cuando el tutor no desempeñe sus funciones hasta que cese la causa o se nombre a otra persona, y cuando el menor emancipado necesite complemento de capacidad y quienes deban prestarlo no puedan hacerlo o tengan conflicto de intereses.

Respecto de la persona con discapacidad, el defensor judicial actúa como medida de apoyo cuando la necesidad sea ocasional, aunque recurrente. Se nombra cuando quien deba prestar apoyo no pueda hacerlo temporalmente, cuando exista conflicto de intereses con la persona apoyada, cuando el juez lo considere necesario durante la tramitación de la excusa del curador, cuando se haya promovido la provisión judicial de apoyos y sea preciso administrar bienes hasta que recaiga resolución, o cuando la persona necesite medidas de apoyo de carácter ocasional, aunque repetidas en el tiempo.

4.4. La guarda de hecho

La ley diferencia entre el guardador de hecho del menor y el de la persona con discapacidad, aplicándose supletoriamente a este último la regulación del primero. Cuando la autoridad judicial conozca la existencia de un guardador de hecho de un menor, puede requerirle información sobre la situación personal y patrimonial del menor y sobre su actuación. Excepcionalmente, mientras subsista esa guarda y hasta que se constituya la medida adecuada, pueden atribuirse judicialmente facultades tutelares al guardador.

En relación con la persona con discapacidad, la guarda de hecho se configura como una medida informal de apoyo que puede mantenerse cuando no existan medidas voluntarias o judiciales eficaces. La Ley 8/2021 refuerza esta figura favoreciendo la continuidad de quien ya viene prestando adecuadamente ese apoyo, incluso si existen otras medidas que no se están aplicando de forma eficaz. Además, el guardador de hecho puede llegar a realizar actuaciones representativas, pero para ello necesita autorización obtenida mediante expediente de jurisdicción voluntaria, con audiencia de la persona con discapacidad. Esa autorización puede comprender uno o varios actos necesarios para el desarrollo de la función de apoyo y debe ejercerse de conformidad con la voluntad, deseos y preferencias de la persona. No obstante, no será necesaria autorización judicial para actos de menor trascendencia, como solicitar una prestación económica que no altere significativamente su forma de vida o realizar actos jurídicos sobre bienes de escasa relevancia económica y sin especial significado personal o familiar.

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
