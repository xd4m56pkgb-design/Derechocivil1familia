    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LAS CAPITULACIONES MATRIMONIALES

Las capitulaciones matrimoniales se configuran como el instrumento mediante el cual los cónyuges o futuros cónyuges establecen las normas patrimoniales aplicables a su matrimonio. La tradición jurídica española las identifica con una escritura pública o documento formal, y el Código Civil no ofrece una definición conceptual, sino que se limita a señalar su función práctica.

1.1. Noción inicial

El art. 1325 del Código Civil establece que en capitulaciones matrimoniales pueden estipularse, modificarse o sustituirse el régimen económico del matrimonio, así como incluir cualesquiera otras disposiciones por razón del mismo. Esta referencia no se limita al régimen económico, sino que se extiende al matrimonio en su conjunto, lo que permite incorporar pactos adicionales vinculados a la relación matrimonial. Así, junto a su función principal de organizar el régimen económico, pueden recoger otras disposiciones conexas, como donaciones por razón del matrimonio. De este modo, las capitulaciones presentan un contenido principal de carácter patrimonial y un contenido complementario vinculado al hecho matrimonial.

1.2. La naturaleza contractual de las capitulaciones

La doctrina mayoritaria considera que las capitulaciones matrimoniales tienen naturaleza contractual, apoyándose en el tenor del art. 1335 y en la tradición del Código Civil, que las vinculaba al contrato de bienes con ocasión del matrimonio. Aunque algunos autores defienden su consideración como acto complejo debido a la posible amplitud de su contenido, esta calificación resulta poco operativa, al carecer de un marco normativo específico que permita precisar sus efectos. Por ello, la caracterización contractual se impone como la opción más coherente y útil desde el punto de vista jurídico.

2. EL CONTENIDO DE LAS CAPITULACIONES

La regulación vigente distingue entre contenido típico y contenido atípico de las capitulaciones, distinción asumida por el art. 1325 tras la reforma de 1981. Este precepto reconoce tanto las estipulaciones relativas al régimen económico del matrimonio como otras disposiciones por razón del mismo, lo que justifica el análisis separado de ambos tipos de contenido.

2.1. Contenido típico

El contenido típico de las capitulaciones consiste en la determinación del régimen económicomatrimonial que regirá la vida conyugal. Los cónyuges, tanto antes como después del matrimonio, gozan de amplia libertad para establecer, modificar o sustituir dicho régimen, pudiendo crear uno nuevo, remitirse a modelos legales o introducir modificaciones parciales.

Incluso cabe excluir el régimen supletorio sin designar otro alternativo. Sin embargo, en la práctica lo habitual es optar por alguno de los regímenes previstos en la legislación aplicable, debido al asesoramiento notarial que acompaña al otorgamiento en escritura pública y que favorece soluciones seguras y claras.

2.2. Contenido atípico

El contenido atípico comprende las disposiciones distintas de la fijación del régimen económico, aunque vinculadas al matrimonio. Incluye pactos de naturaleza patrimonial, como donaciones por razón de matrimonio o acuerdos con efectos sucesorios, así como otros de carácter no necesariamente económico. Las capitulaciones, como documento público, permiten también incorporar actos como el reconocimiento de un hijo prematrimonial, lo que evidencia la amplitud funcional de este instrumento.

2.3. La eventual inexistencia del contenido típico

El art. 1325 permite que las capitulaciones se limiten exclusivamente a disposiciones atípicas, sin contener determinación alguna sobre el régimen económico. En tal caso, se aplicará el régimen legal supletorio correspondiente. Esta posibilidad supone un cambio respecto a la concepción tradicional, en la que el contenido atípico se entendía subordinado y complementario del contenido típico. Tras la reforma de 1981, ambos contenidos pueden existir de forma independiente.

2.4. La prohibición de estipulaciones ilícitas

La libertad de estipulación de los cónyuges encuentra límites en el ordenamiento jurídico. El art. 1328 declara nulas las cláusulas contrarias a las leyes, a las buenas costumbres o que limiten la igualdad de derechos entre los cónyuges, impidiendo así que las capitulaciones incluyan disposiciones ilícitas o discriminatorias.

3. EL MOMENTO TEMPORAL DEL OTORGAMIENTO

3.1. La redacción originaria del Código: la inmutabilidad del régimen económico del matrimonio

En la redacción originaria del Código Civil, el otorgamiento de capitulaciones matrimoniales solo era posible antes de la celebración del matrimonio, lo que implicaba la imposibilidad de modificar el régimen económico una vez iniciada la convivencia. Esta limitación respondía al temor de que los cambios pudieran realizarse en fraude o perjuicio de terceros, al afectar a las masas patrimoniales vinculadas a posibles deudas. De este modo, se configuraba el principio de inmutabilidad del régimen económico del matrimonio, que solo admitía excepciones muy concretas, como la condena con interdicción civil, la declaración de ausencia o la separación judicial, supuestos en los que cabía solicitar la separación de bienes.

3.2. Régimen vigente: la mutabilidad del régimen económico del matrimonio

La reforma introducida en 1975, y consolidada en 1981, eliminó el principio de inmutabilidad y permitió otorgar capitulaciones tanto antes como después del matrimonio, consagrando así la mutabilidad del régimen económico matrimonial. En el sistema vigente, los cónyuges pueden modificar o sustituir libremente su régimen económico en cualquier momento, lo que supone una ampliación significativa de su autonomía. Esta evolución ha sido valorada de forma diversa por la doctrina, ya que algunos destacan el riesgo de fraude a terceros, mientras que otros consideran positivo el aumento de libertad y su coherencia con otros sistemas jurídicos más flexibles.

Además, la posibilidad de modificar el régimen económico se vincula con la necesidad de adaptar las relaciones patrimoniales a las circunstancias reales del matrimonio y a situaciones de crisis, como la separación o el divorcio. No obstante, pese a esta amplia libertad, en la práctica no es habitual que los cónyuges recurran frecuentemente a cambios sucesivos de régimen económico.

4. LOS REQUISITOS DE CAPACIDAD

4.1. Los otorgantes de las capitulaciones

En el otorgamiento de capitulaciones pueden intervenir, además de los cónyuges o futuros cónyuges, otras personas como terceros, aunque su participación es eventual. El Código utiliza el término “otorgantes” para reflejar esta posibilidad, pero la intervención de ambos cónyuges es imprescindible y constituye un acto personalísimo que no puede realizarse por representación. La participación de terceros responde a la posibilidad de realizar atribuciones patrimoniales o pactos en favor de los esposos, aunque en la práctica actual es cada vez menos frecuente. En cuanto a la capacidad, salvo supuestos específicos, se rige por las normas generales de la contratación.

4.2. Los menores no emancipados

El art. 1329 permitía que el menor no emancipado que pudiera casarse otorgara capitulaciones con el consentimiento de sus padres o tutor, salvo en determinados casos. Sin embargo, este precepto ha quedado sin aplicación al haberse suprimido la posibilidad de contraer matrimonio siendo menor no emancipado, lo que hace innecesaria su vigencia práctica.

4.3. Las personas con discapacidad psíquica, intelectual o cognitiva

La regulación anterior exigía asistencia para el otorgamiento de capitulaciones por parte de personas incapacitadas judicialmente, pero esta previsión ha sido eliminada tras la reforma de 2021

Actualmente se parte del reconocimiento del derecho universal a contraer matrimonio, de modo que quienes pueden casarse pueden también otorgar capitulaciones en igualdad jurídica, sin necesidad de asistencia. Se reafirma así el carácter personalísimo del acto y la plena capacidad de las personas con discapacidad para intervenir en él.

5. LA FORMA DE LAS CAPITULACIONES

El art. 1327 establece que las capitulaciones matrimoniales deben constar en escritura pública para su validez, reforzando lo dispuesto en el art. 1280, que exige documento público para este tipo de actos. No obstante, la referencia expresa a la escritura pública implica que no basta cualquier documento público, sino que se requiere específicamente esta forma, lo que lleva a la doctrina a considerar que se trata de un requisito constitutivo. En consecuencia, las capitulaciones tienen carácter solemne y carecen de validez si no se formalizan en escritura pública, tanto entre las partes como frente a terceros.

Esta exigencia formal se refiere al contenido típico de las capitulaciones, relativo al régimen económico del matrimonio. Sin embargo, en relación con determinados contenidos atípicos, puede admitirse la validez de declaraciones realizadas en otros documentos públicos distintos de la escritura, como ocurre en supuestos de reconocimiento de un hijo o en actuaciones vinculadas a la liquidación de la sociedad de gananciales.

6. LA MODIFICACIÓN DEL RÉGIMEN ECONÓMICO-MATRIMONIAL CONSTANTE MATRIMONIO

Tras la celebración del matrimonio, los cónyuges pueden modificar en cualquier momento su régimen económico, ya sea mediante nuevas capitulaciones que sustituyan o alteren las anteriores, o mediante el otorgamiento de capitulaciones por primera vez para sustituir el régimen legal supletorio. En la práctica, es frecuente el paso del régimen de gananciales al de separación de bienes, con el objetivo de evitar las reglas de responsabilidad propias del primero.

6.1. La modificación de las capitulaciones preexistentes

El otorgamiento de nuevas capitulaciones no implica necesariamente la modificación del régimen económico, pues puede limitarse a aspectos atípicos. Sin embargo, lo habitual es que afecte también al contenido típico. El Código se centra en garantizar la intervención de los terceros que hubieran participado en las capitulaciones anteriores, exigiendo su consentimiento cuando la modificación afecte a derechos que les hubieran concedido. Esta exigencia se refiere exclusivamente a dichos terceros y no a los cónyuges, y deben respetarse en todo caso las reglas generales sobre capacidad, forma e ineficacia.

6.2. El otorgamiento de capitulaciones y el cambio del régimen económico-matrimonial

Cuando los cónyuges otorgan capitulaciones por primera vez durante el matrimonio para sustituir el régimen supletorio, no se produce una modificación de capitulaciones previas, pero sí un cambio del régimen económico aplicable. En este supuesto siguen siendo aplicables las mismas exigencias de capacidad y forma.

6.3. La protección de los terceros

La relevancia jurídica de la modificación radica en sus efectos frente a terceros, especialmente acreedores, que pueden ver alteradas sus garantías de cobro. Por ello, el art. 1317 establece que la modificación del régimen económico no puede perjudicar los derechos previamente adquiridos por terceros, de modo que la situación patrimonial relevante será la existente en el momento en que nacieron dichos derechos. En caso de actuación fraudulenta, las capitulaciones no son, por regla general, nulas, sino rescindibles, y la protección de los terceros se articula mediante la inoponibilidad de los cambios realizados frente a ellos.

7. LA PUBLICIDAD DE LAS CAPITULACIONES

La existencia de mecanismos de publicidad del régimen económico-matrimonial responde a la necesidad de proteger a terceros. Esta publicidad se refiere únicamente a los regímenes pactados mediante capitulaciones, no a los regímenes legales supletorios, y su eficacia es limitada, ya que la constancia en el Registro Civil depende de la solicitud del interesado. El art. 1333 establece que en la inscripción del matrimonio deben mencionarse las capitulaciones y sus modificaciones, así como los hechos que alteren el régimen económico, previendo además su reflejo en el Registro de la Propiedad cuando afecten a bienes inmuebles. Asimismo, el notario debe dejar constancia de las modificaciones en la escritura correspondiente.

7.1. El Registro Civil

Aunque el Código utiliza una formulación imperativa, la normativa reglamentaria configura la inscripción de las capitulaciones como facultativa, al depender de la petición del interesado. No obstante, las capitulaciones o sus modificaciones que no se inscriban no serán oponibles a terceros, lo que limita su eficacia externa.

7.2. El Registro de la Propiedad

La inscripción en el Registro de la Propiedad resulta esencial cuando las capitulaciones afectan a inmuebles, ya que los terceros de buena fe no quedan vinculados por capitulaciones no inscritas, incluso aunque consten en el Registro Civil. Por ello, la protección de terceros se articula principalmente a través de este registro.

7.3. El Registro Mercantil

En el ámbito mercantil, las capitulaciones matrimoniales deben inscribirse en la hoja correspondiente al empresario individual, junto con otros actos relevantes como consentimientos, oposiciones o resoluciones judiciales relativas a situaciones personales o patrimoniales del empresario. Esta inscripción permite dotar de publicidad a las relaciones económicas que puedan afectar a la actividad empresarial.

8. LA INEFICACIA DE LAS CAPITULACIONES MATRIMONIALES

El Código Civil establece que la invalidez de las capitulaciones matrimoniales se rige por las reglas generales de los contratos, lo que confirma su naturaleza contractual. En caso de falta o ineficacia de las capitulaciones, se aplicará el régimen de gananciales. La ineficacia se articula distinguiendo entre invalidez y supuestos de ineficacia en sentido estricto.

8.1. La invalidez de las capitulaciones

Las capitulaciones serán nulas cuando no se otorguen en la forma exigida de escritura pública o cuando vulneren las leyes, las buenas costumbres o la igualdad entre los cónyuges. Dada la intervención notarial, lo habitual es que la nulidad afecte solo a determinadas cláusulas y no al conjunto, aplicándose el régimen de nulidad parcial. Serán anulables cuando exista vicio del consentimiento o cuando no se haya cumplido el complemento de capacidad exigido, aunque la intervención notarial dificulta que estos supuestos se produzcan.

8.2. La ineficacia en sentido estricto

Las capitulaciones otorgadas en previsión de un matrimonio quedan sin efecto si este no se celebra en el plazo de un año, lo que implica la pérdida de eficacia de un acto inicialmente válido por falta de su presupuesto. Asimismo, pueden perder eficacia por acuerdo de los cónyuges, al amparo del principio de mutabilidad del régimen económico, o quedar sometidas a condición o término, lo que permite modular temporalmente su vigencia. También cabe su rescisión por fraude de acreedores, aunque la protección de estos se articula principalmente mediante la inoponibilidad de las capitulaciones, sin necesidad de declarar su ineficacia.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }
    
    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function textoPorId(id){

      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
