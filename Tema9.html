    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. EL RÉGIMEN ECONÓMICO DEL MATRIMONIO

El matrimonio no genera únicamente efectos personales, sino también efectos patrimoniales, pues la comunidad de vida entre los cónyuges implica necesariamente una comunidad de intereses económicos. Esa dimensión patrimonial puede organizarse de formas diversas, dependiendo de las circunstancias personales, familiares y económicas de los contrayentes.

En la práctica, muchos futuros cónyuges —especialmente cuando se trata de primeras nupcias— prestan escasa atención a la regulación económica de su convivencia, movidos por el entusiasmo inicial o por la falta de previsión. Sin embargo, en situaciones de desigualdad económica o en segundas nupcias, especialmente cuando existen hijos de relaciones anteriores, suele aparecer una mayor preocupación por fijar desde el inicio las reglas patrimoniales que regirán el matrimonio.

Frente a esa posible despreocupación inicial, el legislador ha actuado con carácter previsivo. Por un lado, ha estimulado la libertad de los cónyuges para pactar el régimen económico que consideren más adecuado. Por otro, ha establecido regímenes económicos supletorios, aplicables cuando los cónyuges no han dispuesto nada al respecto.

El conjunto de normas destinadas a regular las consecuencias patrimoniales de la convivencia matrimonial y de su eventual disolución —ya sea por crisis matrimonial o por fallecimiento— recibe la denominación técnica de régimen económico del matrimonio o régimen económicomatrimonial, con independencia de que su contenido provenga de la voluntad de los cónyuges o de una configuración legal establecida por el legislador.

2. DATOS HISTÓRICOS Y DE DERECHO COMPARADO: LOS SISTEMAS ECONÓMICOMATRIMONIALES

Los distintos ordenamientos jurídicos han configurado una pluralidad de sistemas económicomatrimoniales, que pueden clasificarse atendiendo a una idea básica: si predomina la separación de bienes o la comunidad de bienes entre los cónyuges. Dentro de cada modelo cabe, además, distinguir entre fórmulas absolutas o versiones mitigadas, en las que la separación o la comunidad se limita a determinados bienes o aspectos.

2.1. Los sistemas de separación

En los sistemas de separación rige la regla de que los patrimonios de los cónyuges permanecen diferenciados, sin formarse una masa común. Cada bien pertenece al cónyuge que ya era su titular antes del matrimonio o que lo adquiere durante el mismo.

Cuando cada cónyuge conserva plenamente las facultades de administración y disposición de sus propios bienes, se habla de separación absoluta. Este sistema actúa como régimen legal supletorio de primer grado en numerosos países de tradición anglosajona y también en determinados territorios españoles como Cataluña y las Islas Baleares. En el Código Civil común, la separación de bienes opera como régimen supletorio de segundo grado.

2.2. Los sistemas de comunidad

En el ámbito cultural de tradición continental europea son más frecuentes los sistemas de comunidad limitada, considerados más acordes con la comunidad de vida que implica el matrimonio. Frente a la rigidez de la separación, estos sistemas permiten una masa patrimonial común que facilita la atención a las cargas del matrimonio.

El modelo más extendido en Derecho comparado es el sistema de comunidad de ganancias, denominado en el Código Civil sociedad de gananciales. Su rasgo esencial consiste en la coexistencia de bienes privativos de cada cónyuge y una masa ganancial, integrada por los bienes adquiridos constante matrimonio a título oneroso, los obtenidos por el trabajo de los cónyuges y las rentas o intereses tanto de bienes comunes como privativos.

La sociedad de gananciales es el régimen legal supletorio de primer grado en el Código Civil común y también, con denominaciones propias, en otros territorios y países de nuestro entorno jurídico. Junto a él existen variantes próximas, como el régimen de consorcio conyugal en Aragón.

Más excepcional es la comunidad universal, en la que todos los bienes de los cónyuges — anteriores y posteriores al matrimonio, adquiridos a título oneroso o gratuito— pasan a ser comunes. Este modelo rige en determinados ámbitos territoriales españoles y se caracteriza por la total fusión patrimonial.

Finalmente, puede incluirse dentro de los sistemas de comunidad el régimen de participación en las ganancias, introducido en el Código Civil por la Ley 11/1981. Aunque durante el matrimonio funciona con separación de patrimonios, en el momento de su liquidación atribuye a cada cónyuge el derecho a participar en las ganancias obtenidas por el otro, integrando así una modalidad mixta entre separación y comunidad.

3. REGLAS BÁSICAS DEL RÉGIMEN ECONÓMICO-MATRIMONIAL EN DERECHO ESPAÑOL

3.1. Ubicación normativa

Tras la reforma de 1981, el Código Civil dedica los arts. 1315 a 1324, bajo la rúbrica de «Disposiciones generales», a un conjunto de normas de carácter imperativo que constituyen la base estructural del régimen económico-matrimonial. Estas reglas no dependen del régimen concreto elegido por los cónyuges, pues se aplican con independencia de que rija la sociedad de gananciales, la separación de bienes u otro sistema pactado.

Su finalidad esencial es garantizar el principio de igualdad conyugal proclamado en el art. 32.1 de la Constitución. No se trata de regular un modelo patrimonial específico, sino de fijar la arquitectura básica que ha de presidir cualquier sistema económico del matrimonio, sea legal o convencional. Por ello, estas normas operan como fundamento común sobre el que se asientan los distintos regímenes económico-matrimoniales y como límite a la autonomía de la voluntad de los cónyuges.

3.2. La denominación de «régimen matrimonial primario»

Parte de la doctrina ha denominado a este conjunto normativo «régimen matrimonial primario», expresión de origen francés difundida en España especialmente por el profesor Lacruz Berdejo.

Con esta denominación se pretende subrayar que dichas normas constituyen el núcleo básico e inderogable que precede y condiciona a los distintos regímenes patrimoniales.

Sin embargo, más que insistir en la etiqueta, lo relevante es destacar el carácter general y estructural de estas disposiciones, que actúan como marco común del sistema. La expresión «régimen matrimonial primario» pone el acento en su función fundacional, pero lo decisivo es comprender que estas normas garantizan la igualdad, cohesionan el sistema y delimitan el ámbito dentro del cual pueden configurarse los concretos regímenes económico-matrimoniales.

4. LA LIBERTAD DE CONFIGURACIÓN DEL RÉGIMEN ECONÓMICO-MATRIMONIAL

El art. 1315 del Código Civil establece que «el régimen económico del matrimonio será el que los cónyuges estipulen en capitulaciones matrimoniales, sin otras limitaciones que las establecidas en este Código». Este precepto consagra como principio básico la libertad de configuración del régimen económico-matrimonial, expresión directa de la autonomía privada en el ámbito patrimonial del matrimonio.

La norma parte de la idea de que la organización económica de la vida conyugal es una cuestión inter privatos, que corresponde decidir a los propios cónyuges según sus intereses, circunstancias personales y situación patrimonial. El legislador no impone un modelo obligatorio, sino que reconoce la primacía del pacto, siempre dentro de los límites legales.

Esta opción no constituye una novedad de la reforma de 1981. Ya estaba presente en las redacciones anteriores del precepto y responde a una decisión consciente del momento codificador. Al aprobarse el Código Civil se abandonó la tradición castellana que imponía imperativamente la sociedad de gananciales, optándose por un sistema que prioriza la libertad de estipulación. Con ello se buscó también una mayor coherencia con los territorios de Derecho foral, donde históricamente había mayor margen para el pacto.

La Base 22 de la Ley de 11 de mayo de 1888 refleja con claridad esta orientación: el contrato sobre bienes con ocasión del matrimonio debía asentarse sobre la libertad de estipulación, entendiéndose que, en defecto o insuficiencia de pacto, regiría supletoriamente la sociedad legal de gananciales. De este modo, el sistema combina autonomía de la voluntad y previsión legal supletoria, configurando un modelo flexible que articula libertad y seguridad jurídica.

5. LA IGUALDAD CONYUGAL

La libertad de configuración del régimen económico-matrimonial no es ilimitada. El art. 1315 permite a los cónyuges establecer el régimen que deseen, pero «sin otras limitaciones que las establecidas en este Código».

Entre esas limitaciones destaca el art. 1328, que declara nula cualquier estipulación que limite la igualdad de derechos de cada cónyuge. No se trata solo de una regla técnica sobre capitulaciones, sino de la proyección patrimonial del principio de igualdad interconyugal consagrado en el art. 32.1 de la Constitución.

En consecuencia, la autonomía privada en materia económica matrimonial encuentra su límite infranqueable en la igualdad jurídica entre los esposos, que no puede ser alterada por pacto.

6. EL LEVANTAMIENTO DE LAS CARGAS DEL MATRIMONIO

En cualquier régimen económico-matrimonial rige la regla del art. 1318.1 CC: los bienes de los cónyuges están sujetos al levantamiento de las cargas del matrimonio. Esto significa que ambos quedan obligados a contribuir a los gastos derivados del sostenimiento de la familia.

Las «cargas del matrimonio» comprenden el conjunto de gastos necesarios para la vida familiar: educación e instrucción de los hijos, asistencia sanitaria, atención del hogar y, en general, todo lo necesario para el mantenimiento del núcleo familiar conforme a sus circunstancias concretas.

Si uno de los cónyuges incumple su deber de contribución, el juez, a instancia del otro, puede adoptar medidas cautelares y ordenar anticipos para asegurar el cumplimiento (art. 1318.2).

La contribución no tiene por qué ser igualitaria. Puede pactarse libremente y, en defecto de convenio, será proporcional a los recursos económicos de cada cónyuge, como expresamente establece el art. 1438 para el régimen de separación y, por remisión del art. 1413, también para el de participación.

7. LA POTESTAD DOMÉSTICA

La potestad doméstica surge históricamente para permitir atender las necesidades familiares cuando la mujer carecía de plena capacidad jurídica. Hoy el art. 1319.1 reconoce que cualquiera de los cónyuges puede realizar actos dirigidos a cubrir las necesidades ordinarias de la familia, conforme al uso del lugar y a las circunstancias familiares. Es una manifestación directa del principio de igualdad conyugal.

Desde la perspectiva interna, ambos esposos están legitimados para comprometer los bienes familiares en la satisfacción de necesidades ordinarias.

Desde la perspectiva externa, el art. 1319.2 protege a los terceros que contratan con uno de los cónyuges: responden solidariamente los bienes comunes y los del cónyuge que contrajo la deuda y, subsidiariamente, los del otro. La norma es imperativa y se aplica cualquiera que sea el régimen económico-matrimonial.

En régimen de separación, al no existir bienes comunes, responderán primero los bienes del cónyuge contratante y, de forma subsidiaria, los del otro.

8. LA PROTECCIÓN DE LA VIVIENDA HABITUAL

El art. 1320.1 CC establece que para disponer de derechos sobre la vivienda habitual y los muebles de uso ordinario de la familia se requiere el consentimiento de ambos cónyuges, aunque la titularidad corresponda solo a uno de ellos.

La norma no se limita a la propiedad, sino que alcanza a cualquier derecho sobre la vivienda: venta, arrendamiento, usufructo, hipoteca o renuncia. Se protege así la función familiar de la vivienda por encima de la titularidad individual.

La exigencia de consentimiento dual se refiere únicamente a actos inter vivos, quedando fuera los actos mortis causa.

Para proteger al tercero adquirente, el art. 1320.2 dispone que la manifestación errónea o falsa del disponente sobre el carácter de la vivienda no perjudicará al adquirente de buena fe.

La protección opera cualquiera que sea el régimen económico-matrimonial. Desde el punto de vista registral, será necesario que el disponente declare que la vivienda no es habitual o que conste el consentimiento del otro cónyuge o autorización judicial.

La falta de consentimiento provoca nulidad radical si el acto es gratuito y anulabilidad durante cuatro años si es oneroso (art. 1322), admitiéndose confirmación posterior.

9. EL AJUAR CONYUGAL

El art. 1321 CC atribuye ex lege al cónyuge viudo las ropas, mobiliario y enseres que constituyan el ajuar de la vivienda habitual común, sin computarlo en su haber.

Quedan excluidas las alhajas, objetos artísticos, históricos u otros de extraordinario valor. El ajuar comprende, por tanto, los bienes que integraban el entorno doméstico ordinario del matrimonio, con independencia de su titularidad previa.

El supuesto parte necesariamente del fallecimiento de uno de los cónyuges y solo opera en caso de disolución del matrimonio por muerte, no en divorcio ni nulidad.

Se trata de una atribución mortis causa de origen legal que no forma parte del caudal hereditario ni se computa a efectos sucesorios, sino que actúa como consecuencia de la liquidación del régimen económico-matrimonial.

Doctrinalmente se denomina derecho de supervivencia o derecho de predetracción del cónyuge supérstite, siendo esta última expresión técnicamente más precisa.

10. LAS LITIS EXPENSAS O GASTOS DE LITIGIO

El art. 1318.3 CC regula las denominadas litis expensas, esto es, la cooperación interconyugal respecto de los gastos derivados de litigios que uno de los cónyuges deba sostener.

La norma distingue dos supuestos. Cuando el litigio se dirige contra el otro cónyuge, debe estar exento de mala fe o temeridad procesal. Cuando el litigio se dirige contra un tercero, solo procederán las litis expensas si el proceso redunda en beneficio de la familia.

El presupuesto esencial es que el cónyuge litigante carezca de bienes propios suficientes. En principio, los gastos pesan sobre sus bienes propios; solo si estos resultan insuficientes se activa el mecanismo legal.

En tal caso, los gastos recaerán primero sobre el caudal común, si existe, y subsidiariamente sobre los bienes propios del otro cónyuge cuando la posición económica de este impida al primero obtener justicia gratuita conforme a la Ley de Enjuiciamiento Civil.

Las litis expensas constituyen, por tanto, un derecho-deber conyugal aplicable cualquiera que sea el régimen económico-matrimonial, tanto en sistemas de comunidad como de separación.

11. LA SANCIÓN DE LA FALTA DE CONSENTIMIENTO DE AMBOS CÓNYUGES

El art. 1322 CC establece el régimen sancionador cuando la ley exige el consentimiento de ambos cónyuges para un acto de administración o disposición y este se realiza sin él.

Si el acto no ha sido confirmado expresa o tácitamente, podrá ser anulado a instancia del cónyuge cuyo consentimiento se omitió o de sus herederos.

La consecuencia varía según la naturaleza del acto. Si se trata de un acto a título gratuito sobre bienes comunes, la sanción es nulidad radical o absoluta, insubsanable e imprescriptible.

Si el acto es a título oneroso, la sanción es anulabilidad durante cuatro años, computados desde la disolución del matrimonio o desde que se tuvo conocimiento suficiente del acto. En estos casos cabe confirmación expresa o tácita, pudiendo el consentimiento deducirse de las circunstancias, incluso de la pasividad o del silencio revelador.

La norma es aplicable a todos los regímenes económicos, aunque su incidencia práctica es especialmente relevante en la sociedad de gananciales, donde la disposición de bienes comunes exige consentimiento conjunto.

B) Que el proceso haya sido autorizado judicialmente con carácter previo.
C) Que el litigio tenga contenido exclusivamente patrimonial.
OK: A
EXP: Cuando el pleito se plantea entre cónyuges, la norma solo ampara el gasto procesal si no concurre mala fe ni temeridad.

// [34]
Q: ¿Qué condición exige el art. 1318.3 del Código Civil para que procedan las litis expensas cuando el litigio se dirige contra un tercero?
A) Que el tercero sea deudor de ambos cónyuges.
B) Que el proceso redunde en beneficio de la familia.
C) Que el litigio afecte directamente a la vivienda habitual.
OK: B
EXP: En los litigios frente a terceros, las litis expensas solo se justifican si el proceso beneficia a la familia.

// [35]
Q: ¿Cuál es el orden de imputación de los gastos en las litis expensas cuando faltan bienes propios suficientes del cónyuge litigante?
A) Recaen primero sobre el caudal común, si existe, y subsidiariamente sobre los bienes propios del otro cónyuge en los casos legalmente previstos.
B) Recaen directamente y en todo caso sobre los bienes propios del otro cónyuge.
C) Se imputan exclusivamente al patrimonio futuro del cónyuge litigante.
OK: A
EXP: La norma establece una imputación escalonada: primero el caudal común y, en su caso, después los bienes del otro cónyuge.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
