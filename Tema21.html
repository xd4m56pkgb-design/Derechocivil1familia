  try{

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. PLANTEAMIENTO GENERAL

Los avances científicos y tecnológicos de las últimas décadas, especialmente en Biomedicina y Biotecnología, han permitido el desarrollo de técnicas de reproducción distintas de las naturales para afrontar los problemas de infertilidad de la pareja humana. La intervención sobre estructuras biológicas humanas que tales técnicas implican ha evidenciado la necesidad de un marco jurídico capaz de resolver los problemas concretos que suscitan, favoreciendo la investigación científica y su progreso, pero sometiéndolos al mismo tiempo a límites fijados según las prioridades sociales.

La admisión o rechazo de estas técnicas ha de regirse por una ética civil apoyada en el sentir mayoritario, en los contenidos constitucionales, en la racionalidad y en el servicio al interés general.

La primera regulación española sobre la materia fue la Ley 35/1988, de Reproducción Asistida Humana, junto con la Ley 42/1988, relativa a la donación y utilización de embriones y fetos humanos o de sus células, tejidos u órganos. Ambas normas fueron impugnadas ante el Tribunal Constitucional, que confirmó sustancialmente su constitucionalidad, salvo pequeños apartados, consolidando así los criterios legislativos adoptados, muchos de los cuales continúan vigentes.

Estas leyes han provocado un importante debate doctrinal y suscitan numerosas dudas sobre la oportunidad de algunas de sus soluciones. Desde la perspectiva civil, uno de los principales problemas jurídicos derivados de la reproducción asistida consiste en determinar la filiación del nacido, es decir, establecer de quién es hijo en sentido legal, ya que de ello depende la atribución de los derechos que puedan corresponderle.

La intervención legislativa resulta necesaria porque estas técnicas obligan a afrontar situaciones no previstas antes por el sistema normativo. Mientras que la paternidad biológica continúa siendo exclusivamente genética, la maternidad biológica puede desdoblarse, pues puede coincidir en una sola mujer la aportación del óvulo y la gestación, o separarse entre una maternidad de gestación y una maternidad genética. Además, la maternidad y la paternidad pueden fundarse no en un vínculo biológico, sino en la voluntad o en el consentimiento prestado para el nacimiento del hijo, lo que obliga a valorar cuál de esas formas de vinculación resulta más profunda y humanizada en relación con el niño.

El criterio básico debe ser que la situación jurídica del nacido mediante fecundación asistida sea, si no completamente idéntica, sí lo más próxima posible a la del nacido por procreación natural.

Así lo exigen los principios constitucionales de no discriminación por razón de nacimiento y de dignidad de la persona, así como razones de justicia y equidad. En consecuencia, una vez producido el nacimiento y determinada la filiación, no deben existir diferencias en derechos y obligaciones por razón del tipo de filiación, ni por haberse originado antes o después de la muerte del progenitor, ni por su carácter matrimonial o no matrimonial.

2. LA LEY 14/2006, SOBRE TÉCNICAS DE REPRODUCCIÓN HUMANA ASISTIDA

La regulación básica vigente en España sobre reproducción asistida se contiene en la Ley 14/2006, de 26 de mayo, modificada en varias ocasiones. Esta norma se complementa con la Ley 14/2007, de Investigación Biomédica, con diversa normativa administrativa relativa, entre otras materias, al estudio de donantes y usuarios, a las exigencias de calidad y seguridad, y al régimen de autorizaciones, licencias, control e inspección de los centros, sin perjuicio de que determinadas conductas puedan además recibir sanción penal conforme al Código Penal.

Desde la perspectiva del Derecho Civil, la Ley 14/2006 constituye por ahora el punto final de la evolución normativa en esta materia. Sin embargo, en lo que se refiere a la determinación de la filiación, que es la cuestión central en este ámbito, la ley introduce escasas novedades, pues en esta materia mantiene sustancialmente los criterios normativos ya establecidos por la anterior Ley 35/1988.

Con posterioridad se han incorporado adaptaciones legales destinadas a resolver problemas concretos. Entre ellas destaca la exigencia de que la información y el consentimiento relativos a los actos de reproducción asistida se presten en formatos adecuados y accesibles para las personas con discapacidad, conforme al principio de diseño para todos, así como el recordatorio legal de la posibilidad de matrimonio entre dos mujeres, además de otras precisiones de detalle.

Debe añadirse que en Cataluña existe legislación específica sobre la materia. No obstante, en el Derecho común el precepto básico en relación con la filiación sigue siendo el artículo 7 de la Ley 14/2006, según el cual la filiación de los nacidos mediante técnicas de reproducción asistida se rige por las leyes civiles, con las especificaciones establecidas en los artículos siguientes, y la inscripción en el Registro Civil no puede reflejar datos que permitan inferir el carácter de la generación.

A partir de estas bases normativas han de desarrollarse los distintos aspectos relativos a la determinación de la filiación.

3. FILIACIÓN RESPECTO DE LA MUJER USUARIA DE ESTAS TÉCNICAS

Puede ser usuaria o receptora de las técnicas de reproducción asistida toda mujer mayor de edad y con plena capacidad de obrar que haya prestado de forma libre, consciente, expresa y por escrito su consentimiento. La Ley 14/2006 subraya como novedad que el acceso a estas técnicas es posible con independencia del estado civil y de la orientación sexual de la mujer, lo que confirma que su finalidad no es solo remediar la esterilidad, sino también facilitar la descendencia a quienes no pueden obtenerla por medios tradicionales.

Estas técnicas solo pueden utilizarse cuando existan posibilidades razonables de éxito, no impliquen un riesgo grave para la salud física o psíquica de la mujer o de la futura descendencia y la mujer, siendo mayor de edad y con buen estado de salud psicofísica, las haya solicitado y aceptado libre y conscientemente. Esa aceptación debe constar en un consentimiento informado referido a las circunstancias concretas del caso, tras haber recibido información suficiente sobre las posibilidades de éxito, los riesgos del tratamiento y del embarazo, las consecuencias para la descendencia y los aspectos biológicos, jurídicos y éticos relacionados con estas técnicas. De forma expresa, además, debe informarse de los riesgos que puede implicar la maternidad a una edad clínicamente inadecuada.

Prestado válidamente ese consentimiento, la filiación respecto del hijo nacido queda determinada a favor de la mujer usuaria sobre esa base, unida al hecho de ser la gestante y quien da a luz, igual que ocurre en la filiación natural. Aunque el Código Civil no contiene una regla expresa sobre determinación de la filiación materna, la Ley 35/1988 introdujo formalmente en nuestro ordenamiento el criterio de que la filiación materna viene determinada por el parto, criterio que en Cataluña también aparece expresamente recogido en su Código Civil.

En consecuencia, aunque se haya utilizado el óvulo de una donante y, por ello, las pruebas genéticas revelen que la mujer usuaria no es la madre biológica, la filiación determinada en su favor no puede ser impugnada por esa razón, porque prevalecen el consentimiento previamente prestado y el hecho del parto.

4. FILIACIÓN RESPECTO DEL/LA CÓNYUGE O PAREJA DE LA MUJER USUARIA (MATRIMONIO HETEROSEXUAL U HOMOSEXUAL, PAREJA HETEROSEXUAL U HOMOSEXUAL) 

La mujer usuaria de las técnicas de reproducción asistida puede encontrarse sola, casada o integrada en una pareja de hecho, tanto con un varón como con otra mujer, y en cada supuesto la determinación de la filiación respecto de la persona vinculada con ella exige precisiones distintas.

En todos los casos, la filiación de la mujer usuaria queda determinada por el parto, mientras que la del otro miembro de la pareja depende de la aportación genética, del consentimiento prestado o, en su caso, de la presunción legal de paternidad.

Si la mujer usuaria está casada con un varón, la filiación respecto de este se determina con facilidad mediante la presunción de paternidad del marido. Si además ha aportado su propio material genético, la filiación se apoya también en la realidad biológica, pero, aunque no lo haya hecho, queda igualmente determinada por el consentimiento informado que debió prestar para la utilización de estas técnicas por su esposa. Solo si la mujer se sometiera a ellas sin dicho consentimiento podría el esposo destruir la presunción civil de paternidad.

Si la mujer usuaria está casada con otra mujer, no puede operar la presunción de paternidad, por lo que la ley exige que la esposa manifieste su consentimiento para que la filiación se determine a su favor respecto del hijo nacido de su cónyuge. La reforma de 2015 flexibilizó este régimen al permitir que el consentimiento pueda prestarse después del nacimiento y en el formulario que se remite al Registro Civil, eliminando además la necesidad de acudir a la adopción del hijo de la consorte, que fue inicialmente la vía necesaria para atribuir esa filiación.

Si la mujer usuaria convive con un varón sin estar casada, la ley permite determinar la filiación a favor de este cuando haya prestado previamente su consentimiento a la fecundación con material de donante en documento formalizado ante el centro o servicio autorizado, sin perjuicio de la posible reclamación judicial de paternidad. Si además hubiera aportado su propio material genético, la determinación sería aún más sencilla. El texto destaca, además, que no se exige convivencia more uxorio ni una relación afectiva análoga para que ese consentimiento sea eficaz.

En cambio, cuando la mujer usuaria forma pareja no matrimonial con otra mujer, la ley estatal no prevé que el simple consentimiento previo permita determinar a favor de la no usuaria una filiación no matrimonial, a diferencia de lo que sucede en las parejas heterosexuales no casadas.

Por ello, al exigirse matrimonio entre ambas, la posibilidad de reclamar esa filiación fuera del matrimonio resulta muy discutida, de modo que, en principio, la vía que quedaría sería la adopción. Frente a ello, la legislación catalana sí admite expresamente que los hijos nacidos por fecundación asistida sean también hijos del hombre o de la mujer que haya prestado su consentimiento expreso en documento adecuado.

En definitiva, la filiación materna se determina por el parto y la filiación del otro progenitor o de la otra madre se apoya en la aportación genética, en el consentimiento o, en el caso del marido, en la presunción legal de paternidad. Cuando la pareja de la mujer usuaria es otra mujer, la filiación a su favor requiere matrimonio y consentimiento específico, sin que baste este último si no están casadas. En todo caso, aunque pudiera llegar a conocerse la identidad del donante de gametos o de óvulos, ello nunca determinaría por sí solo la filiación legal. Una vez fijada esta, sus efectos son iguales en todos los supuestos.

5. USO DE MATERIAL DE DONANTE: EL PROBLEMA DEL ANONIMATO

Uno de los pilares del sistema de reproducción asistida es el principio de anonimato del donante.

La donación de semen u óvulos se configura como un contrato gratuito, aunque con posibilidad de ciertas compensaciones económicas, formalizado por escrito, con información previa suficiente y sometido a estricta confidencialidad, cuya garantía corresponde a los bancos de gametos y a los registros de donantes y de actividad de los centros autorizados.

La revelación de la identidad del donante tiene carácter claramente excepcional y, aun cuando llegue a producirse en los supuestos legalmente previstos, nunca determina por sí misma la filiación. El donante no puede ser considerado legalmente padre o madre del nacido, aunque exista correspondencia genética, porque su intervención se limita a una donación gratuita de gametos o preembriones sin voluntad de asumir trascendencia filiativa. Con este refuerzo del anonimato, el legislador pretende favorecer la práctica de estas técnicas y facilitar que quienes lo deseen puedan superar la esterilidad y lograr descendencia.

Sin embargo, este principio ha sido discutido doctrinalmente, e incluso algunos autores lo consideran inconstitucional, al entender que entra en tensión con el mandato constitucional de posibilitar la investigación de la paternidad. Esa tensión resulta aún más visible si se compara con la adopción, donde el ordenamiento reconoce precisamente el derecho a conocer la identidad biológica.

Para conciliar ambas exigencias, la Ley 14/2006 reconoce a los nacidos el derecho a obtener información general sobre los donantes sin identificar su identidad, y solo permite revelar esta de forma excepcional cuando concurran circunstancias extraordinarias que supongan un peligro cierto para la vida o la salud del hijo o cuando así proceda conforme a las leyes procesales penales. Incluso en estos casos, la revelación debe ser indispensable para evitar el peligro o alcanzar el fin legal y tiene siempre carácter restringido, sin que pueda dar lugar a publicidad sobre la identidad del donante.

6. LA FECUNDACIÓN ASISTIDA EN LOS SUPUESTOS DE INEXISTENCIA DE PAREJA: USO DE ESTAS TÉCNICAS POR MUJERES Y HOMBRES SOLOS 

Inicialmente, el empleo de las técnicas de reproducción asistida aparecía vinculado a la esterilidad de la pareja, estuviera o no casada y formada originariamente por hombre y mujer, de modo que su finalidad fundamental era actuar médicamente ante la infertilidad humana para facilitar la procreación cuando otras terapias fueran inadecuadas o ineficaces. Sin embargo, la Ley 14/2006 adopta una formulación más amplia, al referirse con carácter general a las técnicas de reproducción humana asistida acreditadas científicamente y clínicamente indicadas, así como a la prevención y tratamiento de enfermedades de origen genético, con lo que la infertilidad deja de ser el objetivo principal y se abre paso a otros supuestos.

Entre esos supuestos se encuentra el recurso a estas técnicas por parte de la mujer individualmente considerada, sin necesidad de contar con pareja masculina ni de acreditar una infertilidad de pareja. El propio tenor legal confirma que toda mujer puede ser usuaria o receptora de estas técnicas siempre que haya prestado su consentimiento escrito de forma libre, consciente y expresa. La utilización de la expresión toda mujer pone de manifiesto que no es necesario estar casada, convivir en pareja ni encontrarse en una determinada situación personal, bastando con ser mujer y cumplir las exigencias legales. Esta posibilidad queda además reforzada expresamente cuando la ley afirma que la mujer puede acceder a estas técnicas con independencia de su estado civil y de su orientación sexual.

A partir de ahí, la doctrina ha planteado si, de forma paralela a la maternidad en solitario, cabría también admitir una paternidad en solitario, sobre la base del derecho del hombre al libre desarrollo de la personalidad y a la paternidad. Sin embargo, el obstáculo decisivo radica en que el varón, por razones fisiológicas, necesitaría recurrir a una gestación de sustitución, y el ordenamiento considera madre legal a la mujer que da a luz. Al rechazarse la gestación por sustitución, queda excluida la posibilidad de que el varón pueda ser padre solo, de manera que el sistema permite la maternidad en solitario, pero no la paternidad en solitario.

7. LA FECUNDACIÓN POST MORTEM

La fecundación post mortem se refiere al supuesto en que una mujer viva es inseminada con semen de un varón ya fallecido en el momento de practicarse la fecundación. Su admisibilidad ha sido muy discutida, pues para algunos autores resulta inconstitucional al suponer que el hijo nace y vive sin padre, cuando se considera preferible una familia estable integrada por padre y madre como marco adecuado para su desarrollo.

La Ley 14/2006 regula expresamente esta materia en el artículo 9 y parte de un criterio general restrictivo, pues excluye su utilización con carácter general, aunque la admite excepcionalmente en determinadas condiciones. Como regla general, no puede determinarse legalmente la filiación ni producirse efectos jurídicos entre el hijo nacido mediante estas técnicas y el marido fallecido cuando, al tiempo de la muerte del varón, su material reproductor no se hallaba ya en el útero de la mujer. De este modo, el supuesto se aproxima al de los hijos póstumos, nacidos tras la muerte del padre pero concebidos antes de ella.

No obstante, la ley permite excepcionalmente la fecundación post mortem dentro de los doce meses siguientes al fallecimiento, siempre que el marido hubiera prestado su consentimiento para que su material reproductor pudiera ser utilizado con esa finalidad. Ese consentimiento puede constar en el documento previsto para el uso de las técnicas, en escritura pública, en testamento o en documento de instrucciones previas, produce los efectos propios de la filiación matrimonial y puede ser revocado antes de la realización de la técnica. Además, se presume otorgado cuando el cónyuge supérstite ya estuviera sometido a un proceso de reproducción asistida iniciado para la transferencia de preembriones constituidos antes del fallecimiento del marido.

La Ley 14/2006 amplió el plazo inicialmente previsto y flexibilizó las formas de prestar el consentimiento, admitiendo vías más amplias e incluso un supuesto de consentimiento presunto, con el fin de evitar problemas prácticos derivados de exigencias formales o de la paralización de procedimientos ya iniciados por la muerte del marido. Pese a ello, los tribunales han declarado en numerosas ocasiones que no cabe suplir judicialmente la voluntad de un incapaz en una cuestión de esta naturaleza.

Estas mismas reglas resultan aplicables también a las parejas no casadas.

8. LA GESTACIÓN SUBROGADA

La gestación subrogada consiste en que una persona sola o una pareja encarga a una mujer que geste un hijo para entregarlo tras el nacimiento, renunciando ella a la filiación materna a favor de los comitentes. Esta posibilidad ha suscitado un debate muy intenso. Desde una posición crítica, se subraya el riesgo de instrumentalización de la mujer gestante, especialmente cuando media una motivación económica, así como la cosificación del niño y la mercantilización tanto del cuerpo de la mujer como de la filiación, todo ello contrario a la dignidad humana. En esa línea, se destaca también que la normativa europea sobre trata de seres humanos incluye la maternidad subrogada dentro de ese ámbito cuando existan coacción o engaño sobre las mujeres gestantes.

Frente a ello, otros planteamientos insisten en que no toda gestación subrogada responde a fines mercantiles, pues también puede apoyarse en conductas de altruismo o solidaridad, y entienden que una solución permisiva podría resultar más razonable siempre que se excluyeran los contratos onerosos.

Pese a esa discusión, el Derecho español no define la figura ni distingue entre sus diversas modalidades, sino que se limita a negar eficacia al contrato de gestación por sustitución. La ley declara nulo de pleno derecho el contrato, exista o no precio, cuando una mujer se compromete a gestar renunciando a la filiación materna en favor del contratante o de un tercero. En consecuencia, la filiación de los hijos nacidos mediante esta práctica se determina por el parto, de modo que la madre legal es siempre la gestante, sin perjuicio de la posible reclamación de la paternidad respecto del padre biológico conforme a las reglas generales. Así, aunque pudiera existir madre genética distinta de la gestante, la ley atribuye directamente la maternidad legal a quien ha dado a luz.

La dificultad aparece porque otros países sí permiten esta práctica y ello ha dado lugar a contratos celebrados en el extranjero cuyos efectos se pretenden hacer valer en España. Cuando el nacimiento se produce en España, la certificación médica del parto sigue siendo decisiva para fijar la filiación materna, por lo que no puede atribuirse la maternidad a la madre comitente.

Durante un tiempo, si españoles acudían a países donde la gestación subrogada estaba permitida y obtenían una resolución judicial firme extranjera que declaraba la filiación a su favor, los Registros Civiles españoles venían inscribiendo esa filiación, atendiendo a la protección del menor, de las partes y de la madre gestante. Sin embargo, el Tribunal Supremo ha reiterado en resoluciones recientes que el interés del menor no puede confundirse con el del padre comitente y ha mantenido la aplicación del criterio legal que atribuye la maternidad a la gestante.

La jurisprudencia del Tribunal Supremo ha sostenido además que, si esas inscripciones obtenidas a partir de contratos de gestación por sustitución celebrados en el extranjero son impugnadas ante los tribunales españoles, es muy probable que sean anuladas. El Alto Tribunal considera que, aunque el interés superior del menor tiene valor primordial, debe ponderarse junto con otros bienes jurídicos, en particular la dignidad e integridad moral de la mujer gestante, la necesidad de evitar la explotación de mujeres vulnerables y la prohibición de la mercantilización de la gestación y de la filiación. La protección del menor no puede descansar en un contrato radicalmente prohibido en España, sino que debe reconducirse a las vías ordinarias del ordenamiento, como la determinación de la filiación biológica cuando proceda o la utilización de figuras como el acogimiento o la adopción para dar cobertura jurídica a una situación familiar de hecho.

Esta situación ha desembocado en un sistema calificado como incoherente, porque la filiación derivada de una gestación subrogada celebrada en el extranjero puede subsistir si nadie la impugna, pero puede ser anulada si se cuestiona judicialmente, lo que genera inseguridad jurídica y desigualdad práctica entre quienes pueden acudir a otros países y quienes no disponen de medios para ello. En línea con la interpretación del Tribunal Supremo, una Instrucción de 2025 ha dejado sin efecto las anteriores directrices administrativas y ha establecido que en ningún caso podrán utilizarse como título apto para inscribir en el Registro Civil español el nacimiento y la filiación de menores nacidos mediante gestación subrogada ni certificaciones registrales extranjeras, ni simples declaraciones acompañadas de certificación médica, ni siquiera sentencias firmes extranjeras. Las solicitudes pendientes tampoco se practicarán y la determinación de la filiación deberá reconducirse en España a los medios ordinarios, esto es, a la filiación biológica respecto de alguno de los progenitores de intención, en su caso, y a la posterior filiación adoptiva cuando exista un núcleo familiar con garantías suficientes.

La reciente jurisprudencia constitucional pone además de relieve los problemas concretos que estas situaciones generan. En un caso de un menor nacido en Ucrania mediante gestación por sustitución, inscrito inicialmente con filiación respecto del varón español y de la madre gestante ucraniana, la esposa del padre solicitó su adopción y esta fue concedida en primera instancia, aunque posteriormente revocada por la Audiencia Provincial a instancia del Ministerio Fiscal. El Tribunal Constitucional anuló esa revocación por entender insuficientemente justificada la valoración del interés del menor y por haberse introducido cuestiones no planteadas, con lo que declaró firme la adopción. El propio caso evidenciaba, además, una diferencia jurídica entre dos hermanos nacidos en condiciones sustancialmente iguales, pues respecto del segundo hijo la adopción por la esposa no fue recurrida y quedó firme desde el principio. El resultado final muestra las contradicciones del sistema vigente y la necesidad de una reforma que aporte coherencia y seguridad jurídica.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }


    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }

    /* =========================
       PDF -> epígrafes
    ========================= */
    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
