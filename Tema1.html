    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LA FAMILIA Y EL PARENTESCO EN GENERAL

La familia es un dato prenormativo, anterior al Derecho, que existe como institución social antes de su regulación jurídica. El Derecho de familia no crea la familia, sino que la regula, convirtiéndola en institución jurídica.

La configuración de la familia ha sido históricamente variable, condicionada por factores sociales, morales, históricos y culturales, lo que ha dado lugar a formas familiares diversas según cada época. La concepción contemporánea se apoya esencialmente en vínculos conyugales o de parentesco, sin que la mera convivencia sea suficiente para atribuir la condición de familia.

La idea de familia puede modificarse rápidamente por cambios normativos, como demuestra la equiparación constitucional entre hijos matrimoniales y extramatrimoniales (art. 39.2 CE), que obligó a la reforma del sistema de filiación del Código Civil en 1981.

Por ello, no existe una definición jurídica general de familia en la Constitución ni en la legislación ordinaria, siendo válidas múltiples realidades familiares, salvo a efectos de normas concretas. Las distinciones entre distintos tipos de familia pertenecen al ámbito sociológico, ya que el Derecho carece de pautas generales al respecto.

2. EL DERECHO DE FAMILIA

Al Derecho le interesa la familia por razones de organización social y de tutela de las personas necesitadas de protección, especialmente menores de edad y personas con discapacidad, cuya atención ha de procurarse mediante mecanismos sustitutivos cuando la familia no existe o no resulta suficiente. La solidaridad y el socorro mutuo entre los cónyuges y los miembros de la familia resuelven de hecho no pocas tensiones sociales, permitiendo que la estructura política y administrativa pueda desentenderse de ellas.

La convivencia familiar puede originar numerosos conflictos que requieren una regla de mediación jurídica, a los que el Estado no puede permanecer ajeno. El Derecho de familia es el conjunto de reglas de intermediación y organización familiar de carácter estructural y comprende la regulación del matrimonio y sus situaciones de crisis, las relaciones entre padres o progenitores e hijos y las instituciones tutelares en función sustitutiva de la patria potestad.

3. MODERNAS ORIENTACIONES DEL DERECHO DE FAMILIA

El Derecho de familia es el sector del Derecho civil que ha sido objeto de reformas más profundas en tiempos contemporáneos, siendo notoria la abundancia de innovaciones legislativas producidas en los últimos años y el sentido básico de dichas reformas. Este fenómeno resulta especialmente visible en España como consecuencia de dos factores técnicos fundamentales.

Por un lado, la conservación prolongada de la redacción originaria del Código Civil de 1889, inspirado en criterios propios del momento codificador, caracterizados por el carácter patriarcal de la familia, la sumisión de la mujer a la autoridad del marido y la discriminación radical entre hijos legítimos e ilegítimos. Por otro lado, la aprobación de la Constitución de 1978, que, partiendo de conquistas sociológicas ya asumidas, consagra principios relativos a la dinámica familiar absolutamente contradictorios con los inspiradores de los Códigos decimonónicos.

3.1. Principios constitucionales en relación con el derecho de familia.

La Constitución establece como principios básicos en materia de familia la absoluta igualdadentre hombre y mujer respecto del matrimonio (art. 32.1). Al proclamar la aconfesionalidad del Estado (art. 16.3), presupone la recuperación del poder civil en la regulación del matrimonio, delegando en el legislador ordinario la posibilidad de existencia del divorcio.

Asimismo, la Constitución consagra la absoluta igualdad ante la ley de los hijos matrimoniales y extramatrimoniales, así como los deberes de los padres en ambos casos (art. 39.2 y 3). A efectos de la determinación de la filiación, ordena al legislador ordinario la regulación de la investigación de la paternidad (art. 39.2, último inciso).

3.2. La legislación reformadora del Código civil

Los principios constitucionales en materia de familia se han plasmado fundamentalmente mediante las reformas del Código Civil operadas en 1981 por dos leyes de especial relevancia.

La Ley 11/1981, de 13 de mayo, modificó el Código Civil en materia de filiación, patria potestad y régimen económico del matrimonio, y la Ley 30/1981, de 7 de julio, reformó la regulación del matrimonio y estableció el procedimiento en las causas de nulidad, separación y divorcio. Ambas leyes instauraron el sistema familiar posconstitucional.

Con posterioridad se han dictado otras leyes que han incidido en aspectos concretos del Derecho de familia, aunque sin alterar el sistema instaurado en 1981, relativas a la tutela, la adopción, la no discriminación por razón de sexo, la celebración del matrimonio civil, la protección jurídica del menor, los nombres y apellidos, la protección patrimonial de las personas con discapacidad y las relaciones familiares entre nietos y abuelos.

Asumen una significación comparable a la reforma de 1981 las Leyes 13/2005 y 15/2005, la primera al reconocer el matrimonio entre personas del mismo sexo, y la segunda al reformar profundamente la crisis matrimonial, suprimiendo el sistema causal y la necesidad de separación previa al divorcio.

Otras reformas posteriores han afectado a la adopción internacional, al Registro Civil, a la jurisdicción voluntaria, a la protección de la infancia y la adolescencia, al apoyo a las personas con discapacidad en el ejercicio de su capacidad jurídica, a la filiación en relación con las personas trans y LGTBI, y a la organización de la Administración de Justicia, destacando la Ley Orgánica 1/2025, que introduce los Tribunales de Instancia, exige la actividad negociadora previa como requisito de procedibilidad en numerosos procesos civiles y de familia y modifica diversos preceptos del Código Civil en materia matrimonial.

3.3. Referencia a la legislación foral o especial

La exposición del Derecho de familia se centra en las disposiciones legislativas de ámbito estatal, consideradas como Derecho de familia de aplicación general en España, sin abordar de forma sistemática las disposiciones autonómicas vigentes. No obstante, la legislación foral o especial ha tenido una gran relevancia en materia de régimen económico del matrimonio, por lo que se apuntan sus aspectos básicos en las Comunidades Autónomas de índole foral.

Tras la aprobación de la Constitución de 1978 y la instauración del Estado autonómico, algunas Comunidades Autónomas han regulado otros aspectos del Derecho de familia, especialmente en materia de adopción y protección de los menores, mediante diversas leyes autonómicas. En este contexto, destaca el caso de Cataluña, que ha seguido una política legislativa propia en materia familiar, integrando su normativa en un Código de Familia y posteriormente en un Código Civil propio, cuyo libro segundo se dedica a la persona y la familia.

Pese a estas particularidades, el Derecho de familia ha sido adscrito tradicionalmente en España al Derecho civil, considerándose en términos sistemáticos Derecho privado, al igual que las restantes instituciones civiles relativas a la persona, la familia y el patrimonio.

4. NATURALEZA DE LAS NORMAS Y CARACTERES DEL DERECHO DE FAMILIA

4.1. La imperatividad de las normas del Derecho de familia

La mayoría de las normas del Derecho de familia son imperativas (ius cogens), lo que significa que prevalecen sobre la voluntad de las personas. La autonomía privada existe, pero en un ámbito muy limitado.

Los miembros de la familia no pueden decidir libremente el contenido jurídico del matrimonio ni los deberes hacia los hijos si contradicen la ley. Por tanto, el ordenamiento protege el interés familiar y social por encima de acuerdos particulares

4.2. El debate sobre la ubicación sistemática del Derecho de familia

Tradicionalmente se ha destacado el carácter imperativo del Derecho de familia frente al predominio de normas dispositivas en el resto del Derecho civil y privado. Esto ha generado debates doctrinales sobre si debería pertenecer al Derecho civil, al Derecho público o a una categoría intermedia.

Sin embargo, en España el Derecho de familia se integra sistemáticamente dentro del Derecho civil, considerándose Derecho privado. Esto se justifica porque el Derecho civil regula las realidades sociales básicas: persona, familia y patrimonio.

4.3. Los acuerdos familiares

La existencia de normas imperativas en el Derecho de familia no supone la eliminación de la autonomía privada de las personas unidas por relaciones familiares. En numerosos supuestos conflictivos, las propias normas legales presuponen y reclaman acuerdos o convenios entre los interesados, especialmente entre cónyuges, tanto en la vida familiar ordinaria como en situaciones de separación o divorcio, incluidas las relativas al domicilio familiar y a las pensiones.

La autonomía privada ha desempeñado un papel particularmente relevante en las relaciones patrimoniales entre los cónyuges, pues el principio básico en materia de régimen económico del matrimonio es la libertad de elección del sistema aplicable o incluso la elaboración del régimen que consideren oportuno. En las últimas décadas, esta capacidad de autorregulación ha adquirido mayor relevancia, especialmente tras las reformas de 1981, hasta el punto de que no resulta adecuado explicar el sistema afirmando que la imperatividad es la regla y la autonomía privada la excepción.

Algunos autores han propuesto agrupar estos supuestos bajo la categoría del negocio jurídico de Derecho de familia, pero dicha construcción conceptual es considerada dudosa, al no facilitar la explicación de las instituciones familiares ni proporcionar un régimen normativo general, además de alterar el esquema general del negocio jurídico, incluso en relación con el matrimonio.

4.4. El sentido ético del derecho de familia

El Derecho de familia, aun siendo imperativo, no puede pretender regular los aspectos más íntimos y entrañables de las relaciones familiares, ni intervenir de forma constante en la vida cotidiana de la familia. Tampoco pueden los miembros de la familia exigir que todas sus desavenencias encuentren siempre una respuesta jurídica directa o una intervención continuada del juez.

La profundidad y cotidianeidad de las relaciones familiares dificultan concebir el Derecho de familia como un sistema de reglas mecánicas, pues tanto su configuración normativa como su aplicación práctica presuponen una concordia familiar y la aceptación común de principios morales o éticos, lo que permite destacar el contenido ético del Derecho de familia.

Este carácter ético se manifiesta, en primer lugar, en la especial influencia de los principios morales y de las convenciones sociales en este sector del ordenamiento, especialmente en la regulación del matrimonio y de las relaciones entre padres e hijos, lo que exige al legislador cautela y prudencia. En segundo lugar, implica que la regulación jurídica de la familia y las pautas de conducta habitualmente seguidas por los grupos familiares suelen ser coincidentes.

Aunque la mayor parte de las vivencias familiares se desarrollan sin necesidad de acudir al Derecho, ello no convierte al Derecho de familia en superfluo, pues el ordenamiento debe ofrecer vías de solución para los supuestos de crisis familiar, momento en el que el Derecho de familia adquiere su verdadera relevancia y significación.

5. LOS DERECHOS SUBJETIVOS FAMILIARES: EL CONCEPTO DE POTESTAD

Los llamados derechos de familia, entendidos como derechos subjetivos propios del Derecho de familia, se caracterizan tradicionalmente por ser indisponibles, intransmisibles, irrenunciables e imprescriptibles. Su especial naturaleza impide que su ejercicio quede sometido a condición o término, que puedan ejercitarse mediante representante, o que opere la representación en las relaciones entre cónyuges o entre padres e hijos, tratándose de derechos especialmente personalísimos, derivados directamente de los lazos familiares.

No obstante, debe revisarse si los poderes o facultades que las normas atribuyen a algunos familiares respecto de otros pueden calificarse técnicamente como derechos subjetivos o si, por el contrario, deben entenderse como potestades. Cuando tales poderes no atienden al interés particular de quien los ejerce, sino que implican el cuidado, la vigilancia o la consideración de los intereses de otra u otras personas, resulta más preciso hablar de potestad, siendo el Derecho de familia el ámbito propio de esta categoría en el Derecho privado.

6. FAMILIA, GRUPOS FAMILIARES Y MEDIACIÓN FAMILIAR

La pluralidad de las formas de los grupos familiares y la complejidad de las relaciones actuales han provocado que determinadas situaciones fácticas hayan alcanzado en los últimos años una cierta consagración normativa o, al menos, una necesidad de comprensión y apoyo por los poderes públicos. Esta realidad exige que, junto a las normas tradicionales de regulación de los problemas familiares, se recurra al auxilio de otros instrumentos.

En este contexto, destaca la regulación proyectada en el Proyecto de Ley de Familias, orientada a garantizar los derechos y la igualdad jurídica en las distintas situaciones familiares, otorgando protección a todas ellas con pleno respeto a la diversidad familiar.

6.1. Legislación autonómica sobre mediación

Al amparo del título competencial de la protección social de la familia, la primera década del siglo XXI se ha caracterizado por una intensa actividad normativa de las Comunidades Autónomas orientada a regular la mediación familiar en sus respectivos territorios. Se parte de la idea de que las técnicas de mediación pueden contribuir a la solución de diversos conflictos surgidos en el seno de los grupos familiares.

En este marco, numerosas Comunidades Autónomas han aprobado leyes específicas de mediación familiar, desarrolladas por sus correspondientes reglamentos y disposiciones complementarias. No obstante, en el momento de cierre de la obra, algunos territorios carecen de ley específica, sin que ello implique la inexistencia de servicios o centros especializados en mediación familiar.

6.2. La ampliación del ámbito objetivo: la mediación en asuntos civiles y mercantiles (ley

5/12) Fue aprobada la Ley 5/2012, de 6 de julio, de mediación en asuntos civiles y mercantiles, desarrollada parcialmente por el Real Decreto 980/2013, que regula la formación de los mediadores, crea el Registro de Mediadores, establece la obligación de aseguramiento de su responsabilidad civil y fija las bases del procedimiento simplificado de mediación por medios electrónicos.

La Ley define la mediación como un medio adecuado de solución de controversias en el que dos o más partes intentan voluntariamente alcanzar un acuerdo mediante un procedimiento estructurado con la intervención de un mediador. Su ámbito de aplicación comprende los asuntos civiles y mercantiles, incluidos los conflictos transfronterizos, siempre que afecten a derechos y obligaciones disponibles, quedando excluidas la mediación penal, con las Administraciones públicas, la laboral y la de consumo.

La mediación se rige por los principios de voluntariedad, igualdad y equilibrio entre las partes, imparcialidad y neutralidad del mediador y confidencialidad, así como por las reglas de buena fe, respeto mutuo, colaboración y apoyo al mediador. La Ley establece un estatuto mínimo del mediador y regula un procedimiento flexible, en el que alcanzar un acuerdo no es obligatorio. No obstante, cuando se alcanza, el acuerdo de mediación puede adquirir fuerza ejecutiva mediante homologación judicial o elevación a escritura pública.

La Ley 5/2012 es una ley general, no limitada a los conflictos familiares, aunque estos se encuentren incluidos cuando versen sobre derechos disponibles. Ha sido objeto de diversas reformas, destacando las introducidas por la Ley Orgánica 1/2025, que modifica aspectos relativos a la confidencialidad, al procedimiento y a la duración de la mediación cuando constituye requisito de procedibilidad, así como al régimen de presentación y homologación del acuerdo de mediación.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }

    /* =========================

    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
