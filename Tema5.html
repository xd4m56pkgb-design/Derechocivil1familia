    ========================================================= */
const PDF_TEXTO = `
1. LAS CRISIS MATRIMONIALES: NULIDAD, SEPARACIÓN Y DIVORCIO

La expresión crisis matrimoniales se utiliza en la doctrina para agrupar los supuestos en los que el matrimonio pierde eficacia y se quiebra la unidad de vida y convivencia que lo caracteriza. No es un término legal, sino sistemático.

Su consolidación doctrinal se produce especialmente tras la admisión del divorcio, entendido como remedio jurídico frente a una ruptura previa de la convivencia, en un contexto histórico donde su introducción generó resistencia social.

Dentro de esta categoría se incluyen tres figuras claramente diferenciadas: • Nulidad • Separación • Divorcio Aunque se estudian conjuntamente por razones sistemáticas, presentan profundas diferencias jurídicas. Por ello, su análisis exige examinar el régimen propio de cada una, así como los efectos comunes derivados de estas situaciones de ineficacia matrimonial.

2. LA NULIDAD DEL MATRIMONIO

La nulidad matrimonial constituye el supuesto de máxima ineficacia del matrimonio. Supone que el vínculo nunca fue válido jurídicamente, porque existía una causa invalidante desde el mismo momento de su celebración.

Se asemeja, en su estructura conceptual, a la nulidad de los contratos: • Debe existir una causa coetánea a la celebración. • La declaración judicial produce efectos retroactivos (ex tunc).

Esto significa que el matrimonio se considera inválido desde su origen, como si nunca hubiera existido válidamente, sin perjuicio de los efectos que la ley pueda reconocer en determinados supuestos (por ejemplo, protección de buena fe).

En definitiva, la nulidad no disuelve un matrimonio válido, sino que declara que nunca existió jurídicamente de forma válida desde su inicio.

3. LAS CAUSAS DE NULIDAD

3.1. Planteamiento general

El art. 73 CC recoge el elenco de causas de nulidad matrimonial y declara nulo el matrimonio, cualquiera que sea su forma de celebración, en los siguientes supuestos: 1) Falta de consentimiento matrimonial. 2) Celebración entre personas comprendidas en los arts. 46 y 47 CC, salvo dispensa conforme al art. 48. 3) Falta de intervención de la autoridad competente o de los testigos (redacción actualizada por la LO 1/2025). 4) Error en la identidad o en cualidades personales determinantes del consentimiento. 5) Coacción o miedo grave.

El precepto carece de una sistemática clara, ya que agrupa causas de distinta naturaleza. Desde un punto de vista didáctico, pueden clasificarse en tres grandes bloques: • Defectos de forma (art. 73.3.º). • Inexistencia o vicios del consentimiento (art. 73.1.º, 4.º y 5.º). • Preexistencia de impedimentos (art. 73.2.º), sean no dispensables o no efectivamente dispensados.

Esta clasificación permite comprender mejor la lógica interna de la nulidad matrimonial: o bien falta un requisito esencial del matrimonio, o bien existe una causa invalidante anterior o coetánea a su celebración.

3.2. El defecto de forma

El matrimonio es un acto esencialmente formal (art. 49 CC). Por ello, la ausencia de la forma legalmente exigida puede determinar su nulidad.

El art. 73.3.º declara nulo el matrimonio celebrado sin la intervención de la autoridad competente (alcalde o concejal, letrado o letrada de la Administración de Justicia, notario o notaria, funcionario competente) o sin la presencia de testigos.

Sin embargo, la nulidad por defecto de forma está notablemente restringida por el propio Código: • El art. 53 CC establece que la validez del matrimonio no queda afectada por la incompetencia o falta de nombramiento de la autoridad, siempre que: 1) Al menos uno de los cónyuges haya actuado de buena fe. 2) La autoridad ejerciera públicamente sus funciones.

En estos casos, el matrimonio se mantiene válido pese a la irregularidad formal.

Además, el art. 78 CC limita la declaración judicial de nulidad por defecto de forma cuando exista buena fe de al menos uno de los contrayentes, reforzando así la protección del vínculo y la seguridad jurídica.

En consecuencia, aunque la forma es requisito esencial del matrimonio, el legislador ha configurado un sistema que favorece la conservación del vínculo cuando concurren buena fe y apariencia de legalidad.

3.3. La ausencia de consentimiento

La nulidad matrimonial puede fundarse en la ausencia de consentimiento, que puede presentarse en dos modalidades: inexistencia absoluta o consentimiento viciado.

Existe inexistencia de consentimiento cuando falta la seriedad o conciencia en la emisión del consentimiento matrimonial. Ello sucede, por ejemplo, en casos de simulación absoluta (matrimonios iocandi causa), o cuando el contrayente se encuentra en situaciones físicas o psíquicas incompatibles con una voluntad consciente (enfermedad mental grave, embriaguez, deterioro cognitivo, etc.).

Por su parte, el consentimiento puede estar viciado por error, coacción o miedo grave (art. 73.4.º y 5.º CC). El error ha de recaer sobre la identidad o sobre cualidades personales esenciales y preexistentes a la celebración del matrimonio. La jurisprudencia ha tratado supuestos relativos a error sobre cualidades personales, matrimonios simulados e incluso situaciones llamativas, aunque el error solo es relevante cuando afecta de forma determinante al consentimiento.

Debe recordarse que el Código Civil no define fines esenciales del matrimonio cuya exclusión provoque nulidad. Solo regula deberes recíprocos cuyo incumplimiento posterior puede dar lugar a separación o divorcio, pero no a nulidad, ya que esta exige una causa existente en el momento de la celebración.

Tanto la inexistencia como el consentimiento viciado generan nulidad; sin embargo, en los casos de vicios cabe la convalidación si se cumplen los requisitos legales. La jurisprudencia reciente ha reiterado que, salvo los supuestos expresamente previstos, la acción de nulidad no está sometida a un plazo general de caducidad.

3.4. La existencia de impedimentos

El art. 73.2.º CC declara nulo el matrimonio celebrado entre personas comprendidas en los arts. 46 y 47 CC. Se trata de los supuestos de impedimentos matrimoniales, ya analizados previamente.

La existencia de un impedimento determina la nulidad del matrimonio, salvo que el impedimento sea dispensable y se haya obtenido dispensa efectiva conforme al art. 48 CC.

Por tanto, la nulidad en estos casos deriva de la infracción de los límites legales a la aptitud matrimonial, siempre que no exista dispensa válida.

3.5. La convalidación

Aunque la nulidad matrimonial tiene carácter radical, el Código Civil admite ciertos supuestos de convalidación, en los que el matrimonio inicialmente inválido deviene válido.

Los principales casos son: 1) Dispensa de impedimentos dispensables (art. 48 CC): si la dispensa se obtiene incluso después de celebrado el matrimonio, pero antes de que se inste judicialmente la nulidad, el matrimonio queda convalidado desde su celebración, con efectos retroactivos. 2) Matrimonio celebrado por menor no emancipado (art. 75.2 CC): si, al alcanzar la mayoría de edad, los cónyuges han convivido durante un año sin ejercitar la acción de nulidad, esta caduca y el matrimonio se considera válido desde su origen. 3) Vicios del consentimiento (art. 76.2 CC): si los cónyuges conviven durante un año después de desaparecer el error, la fuerza o el miedo, la acción caduca y el matrimonio queda convalidado.

En estos supuestos, la ley opta por la conservación del vínculo cuando la conducta posterior de los cónyuges revela aceptación y consolidación de la relación matrimonial.

4. LA ACCIÓN DE NULIDAD

La acción de nulidad matrimonial tiene por objeto obtener la declaración judicial de ineficacia radical del matrimonio. El Código Civil regula fundamentalmente dos aspectos: la legitimación activa y, en determinados supuestos, el plazo de ejercicio. ⸻ Legitimación activa: regla general El art. 74 CC establece que la acción corresponde a: 1) Los cónyuges. 2) El Ministerio Fiscal. 3) Cualquier persona con interés directo y legítimo.

Esta amplitud de legitimación ha llevado a calificar la acción como pública o semipública, pues permite la intervención de terceros con interés directo (parientes, hijos de anteriores matrimonios, acreedores, etc.).

La intervención del Ministerio Fiscal es obligatoria en los procesos de nulidad matrimonial, conforme al art. 749 LEC, incluso cuando no haya promovido la acción.

Supuesto especial: matrimonio del menor Cuando la causa de nulidad sea la falta de edad, el art. 75.1 CC dispone que, mientras el contrayente sea menor, solo podrán ejercitar la acción: 1) Sus padres. 2) Sus tutores o guardadores. 3) El Ministerio Fiscal.

Al alcanzar la mayoría de edad, la acción solo podrá ejercitarla el propio contrayente menor (art. 75.2 CC).

Supuestos de legitimación restringida En determinados casos la acción deja de tener carácter público y solo puede ejercitarla uno de los cónyuges: 1) En caso de falta de edad, una vez alcanzada la mayoría, solo el contrayente menor puede ejercitarla. 2) En los supuestos de error, coacción o miedo grave, únicamente el cónyuge que sufrió el vicio del consentimiento (art. 76.1 CC).

Plazo de ejercicio En los supuestos de error, coacción, miedo grave o falta de edad, la acción está sujeta a un plazo de caducidad de un año, contado desde: 1) La mayoría de edad. 2) El cese del error, la coacción o el miedo.

En cambio, la acción de nulidad en sentido estricto es imprescriptible, al no estar sometida a plazo legal de ejercicio.

Requisitos procesales Tras la reforma introducida por la LO 1/2025, la demanda de nulidad exige acreditar el cumplimiento del requisito de procedibilidad, consistente en haber acudido previamente a un medio adecuado de solución de controversias o haber intentado la negociación previa, salvo supuestos exceptuados legalmente.

La falta de acreditación impide la admisión de la demanda (arts. 403 y 399 LEC).

Derecho aplicable El art. 107 CC dispone que la nulidad del matrimonio y sus efectos se determinarán conforme a la ley aplicable a su celebración.

En cambio, la separación y el divorcio se rigen por las normas de la Unión Europea o por las normas españolas de Derecho internacional privado.

En síntesis, la acción de nulidad presenta un régimen mixto: amplia legitimación en la regla general, restricciones en determinados supuestos y, como principio, imprescriptibilidad, salvo en los casos específicos de vicios del consentimiento o falta de edad.

5. EL MATRIMONIO PUTATIVO

5.1. Concepto y antecedentes

El matrimonio putativo surge en el Derecho canónico medieval para proteger a los hijos nacidos de matrimonios celebrados válidamente en apariencia pero posteriormente declarados nulos, especialmente por impedimentos de parentesco difíciles de determinar en la época.

Con posterioridad, la institución se amplía a cualquier causa de nulidad y también a la protección del cónyuge que hubiera actuado de buena fe. Esta formulación fue acogida por el Código Civil español, primero en su redacción originaria y después, con depuración técnica, en el vigente art. 79 CC tras la reforma de 1981.

Actualmente, el art. 79 CC establece que la declaración de nulidad no invalida los efectos ya producidos respecto de los hijos y del contrayente o contrayentes de buena fe, presumiéndose esta buena fe.

El matrimonio putativo es, por tanto, un matrimonio declarado nulo que mantiene determinados efectos en protección de los hijos y, en su caso, del cónyuge de buena fe.

5.2. Presupuestos del matrimonio putativo

A) La buena fe La buena fe se refiere a los cónyuges y ha de existir en el momento de la celebración del matrimonio. Se presume salvo prueba en contrario.

No obstante, respecto de los hijos, la protección opera incluso aunque ambos cónyuges hayan actuado de mala fe. La buena fe es relevante para la conservación de efectos en favor del cónyuge, pero no condiciona la protección de los hijos.

B) La apariencia matrimonial Es necesario que haya existido un matrimonio celebrado conforme a alguna forma legalmente prevista, al menos en apariencia.

Debe haber consentimiento matrimonial y cumplimiento mínimo de las reglas formales. La unión de hecho no puede equipararse al matrimonio putativo.

La institución se aplica cualquiera que sea la causa de nulidad, siempre que exista apariencia jurídica de matrimonio.

C) La declaración de nulidad Para que opere el matrimonio putativo es imprescindible que exista declaración judicial de nulidad.

Mientras no se declare la nulidad, el matrimonio produce efectos como válido.

5.3. Efectos del matrimonio putativo

Respecto de los hijos, la nulidad no altera la filiación ya determinada. Conservan todos los derechos derivados de ella: patria potestad, alimentos, apellidos y derechos sucesorios.

Respecto del cónyuge de buena fe, se mantienen únicamente los efectos ya producidos hasta la declaración de nulidad. Sin embargo, desde la sentencia deja de existir vínculo matrimonial y no pueden reclamarse derechos futuros derivados del matrimonio, como alimentos o derechos sucesorios.

6. EFICACIA CIVIL DE LA NULIDAD O INEFICACIA DEL MATRIMONIO CANÓNICO

El Código Civil regula exclusivamente la eficacia civil de las resoluciones relativas al matrimonio canónico, conforme a nuestra tradición legislativa. 1) Fundamento normativo El art. 80 CC establece que: • Las resoluciones de los Tribunales eclesiásticos sobre nulidad. • Las decisiones pontificias sobre matrimonio rato y no consumado.

Tendrán eficacia en el orden civil, siempre que: • Lo solicite alguna de las partes. • Se declaren ajustadas al Derecho del Estado mediante resolución del juez civil competente.

No existe eficacia automática. 2) Procedimiento procesal Tras la Ley 1/2000 (LEC) y la reforma de la Ley 15/2015: • Se aplica el Título I del Libro IV LEC (procesos especiales). • El art. 778 LEC regula específicamente el reconocimiento de eficacia civil. • Se distingue según se soliciten o no medidas civiles (custodia, alimentos, vivienda, pensión compensatoria), que los tribunales eclesiásticos no pueden acordar.

Además, la LO 1/2025 introduce exigencias de procedibilidad (proceso previo de negociación). 3) Derecho de la Unión Europea Resulta aplicable el Reglamento (UE) 2019/1111: • Establece normas uniformes sobre competencia, reconocimiento y ejecución en materia matrimonial. • Sustituye al Reglamento 2201/2003 (salvo supuestos transitorios). • Es directamente aplicable en los Estados miembros.

Ello implica que resoluciones canónicas que hayan adquirido eficacia civil en España pueden circular en el ámbito de la UE. 4) Control judicial civil El juez civil realiza un control atenuado: • Verifica el ajuste a la legalidad estatal. • No revisa el fondo de la causa canónica. • No puede desautorizar el contenido doctrinal o religioso.

No existe automatismo, pues ello vulneraría: • Art. 117.3 CE (potestad jurisdiccional). • Art. 2 LOPJ.

El sistema es electivo: quien contrajo matrimonio canónico puede acudir a jurisdicción civil o eclesiástica. 5) Límites del reconocimiento El reconocimiento: • No permite revisar las causas canónicas. • No exige identidad literal entre causas civiles y canónicas. • No puede amparar pretensiones abusivas.

La jurisprudencia ha afirmado que: • No puede utilizarse la nulidad canónica para eliminar pensiones compensatorias ya reconocidas. sola nulidad eclesiástica. • No puede privarse automáticamente a un cónyuge de derechos económicos por la 6) Incidencia de la Ley 15/2005 Al suprimirse las causas de separación y divorcio: • La homologación de causas canónicas pierde su antiguo sentido causal. • En principio, cualquier causa canónica de nulidad puede producir ineficacia civil.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")

        .replace(/"/g,"&quot;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }

    /* =========================

    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
