    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INTRODUCCIÓN

1.1. Consideraciones sistemáticas

El estudio del pasivo ganancial se refiere al conjunto de cargas y deudas de la sociedad de gananciales y a las reglas que determinan su imputación al patrimonio común o a los patrimonios privativos de los cónyuges. Aunque el Código Civil da prioridad sistemática a esta materia y la regula antes que la administración de la sociedad de gananciales, el autor considera más claro invertir ese orden, porque la comprensión de las cargas y obligaciones exige conocer previamente las reglas de gestión conjunta y los supuestos en que la actuación individual de cualquiera de los cónyuges vincula a la sociedad.

1.2. La carencia de personalidad de la sociedad de gananciales

Que la sociedad de gananciales quede obligada frente a terceros no significa que tenga personalidad jurídica propia, pese a que el Código emplee expresiones que podrían sugerirlo. En realidad, carece de personalidad jurídica y solo actúan en el tráfico los cónyuges, que son quienes pueden resultar acreedores o deudores frente a terceros o entre sí, también a efectos de reintegros o reembolsos entre el patrimonio ganancial y los patrimonios privativos. La sociedad de gananciales funciona así como un punto de referencia ligado a la existencia de patrimonios separados.

Cuando los actos realizados por los cónyuges se sitúan dentro del ámbito de gestión de los bienes gananciales, corresponde al patrimonio común soportar los gastos o deudas, tanto en la relación interna entre cónyuges como frente a terceros acreedores. En cambio, si la deuda no guarda relación con la sociedad de gananciales, la responsabilidad debe recaer sobre el patrimonio privativo del cónyuge que la originó. Sin embargo, esta lógica no se refleja de forma pura en la normativa vigente, que para proteger el tráfico económico y evitar fraudes a los acreedores establece vías de comunicación de responsabilidad entre patrimonios privativos y patrimonio común en favor de terceros, sin perjuicio de los reintegros posteriores entre los cónyuges.

2. LAS CARGAS DE LA SOCIEDAD DE GANANCIALES

2.1. El elenco del art. 1362

El art. 1362 considera cargas de la sociedad de gananciales ciertos gastos vinculados a la vida familiar, a los bienes comunes, a la administración ordinaria de bienes privativos y a la actividad profesional de los cónyuges. En el sostenimiento de la familia se incluyen la alimentación y educación de los hijos comunes y las atenciones de previsión ajustadas a los usos y circunstancias familiares, comprendiendo no solo lo indispensable para subsistir, sino también cualesquiera atenciones adecuadas a esa situación.

La alimentación y educación de los hijos de uno solo de los cónyuges tienen carácter ganancial cuando conviven en el hogar familiar. Si no conviven, esos gastos son sufragados por la sociedad de gananciales, pero generan derecho de reintegro en la liquidación, de modo que su imputación definitiva corresponde al patrimonio privativo del progenitor. El texto destaca además las críticas doctrinales al criterio de la convivencia, porque puede no depender de una decisión voluntaria y producir un tratamiento desigual entre los hijos de uno y otro cónyuge.

También son de cargo de la sociedad los gastos derivados de la adquisición, tenencia y disfrute de los bienes comunes, incluidos los de reparación, conservación y administración. No obstante, se recuerda que las cuotas del préstamo hipotecario destinado a adquirir la vivienda familiar deben ser abonadas por los adquirentes en proporción a su cuota cuando el bien pertenece a ambos.

En relación con los bienes privativos, solo tienen carácter ganancial los gastos derivados de su administración ordinaria. Del mismo modo, se consideran gananciales los gastos de la explotación regular de los negocios o del ejercicio de la profesión, arte u oficio de cada cónyuge, en coherencia con el carácter ganancial de las ganancias obtenidas mediante tales actividades.

2.2. Las donaciones de común acuerdo

Son también de cargo de la sociedad de gananciales las cantidades donadas o prometidas por ambos cónyuges de común acuerdo, salvo que hayan pactado que deban satisfacerse total o parcialmente con bienes privativos de uno de ellos.

2.3. Obligaciones extracontractuales de uno de los cónyuges

Las obligaciones extracontractuales de uno de los cónyuges tienen carácter ganancial cuando proceden de una actuación realizada en beneficio de la sociedad conyugal o en el ámbito de la administración de los bienes. Sin embargo, esta regla cede cuando la obligación deriva de dolo o culpa grave del cónyuge deudor.

2.4. Las deudas de juego pagadas constante matrimonio

También pueden constituir carga de la sociedad de gananciales las deudas de juego pagadas durante el matrimonio por cualquiera de los cónyuges, siempre que su importe pueda considerarse moderado según el uso y las circunstancias de la familia. El carácter ganancial exige, por tanto, tanto la moderación de la pérdida como su efectivo pago, ya que las deudas de juego impagadas son deudas propias del cónyuge que las contrajo.

3. LA RESPONSABILIDAD DE LOS BIENES GANANCIALES

La existencia de tres patrimonios separados en el régimen de gananciales no se traduce de forma automática en unas reglas simples y uniformes, por lo que es necesario distinguir entre varios tipos de deudas. Deben diferenciarse las deudas comunes contraídas por ambos cónyuges o por uno con el consentimiento del otro, las deudas comunes asumidas por un solo cónyuge pero de manera lícita y dentro del ámbito imputable a la sociedad de gananciales, y las deudas propias o privativas de cada cónyuge.

En las deudas comunes, los bienes gananciales quedan siempre afectos solidariamente junto con el patrimonio privativo del cónyuge o cónyuges a quienes pueda atribuirse técnicamente la condición de deudor, ya que la sociedad de gananciales no puede ser por sí misma deudora. En cambio, respecto de las deudas propias o privativas, los bienes gananciales también responden, pero solo de forma subsidiaria respecto del patrimonio privativo del cónyuge deudor o, excepcionalmente, de ambos en la proporción que corresponda o, en su defecto, por mitad.

4. DEUDAS COMUNES CONTRAÍDAS POR AMBOS CÓNYUGES

El artículo 1367 establece que los bienes gananciales responderán en todo caso de las obligaciones contraídas conjuntamente por ambos cónyuges o por uno de ellos con el consentimiento expreso del otro. Por tanto, tanto la actuación conjunta como la actuación individual consentida vinculan en todo caso al patrimonio ganancial frente a los créditos de terceros.

Sin embargo, esa equiparación no puede extenderse al patrimonio privativo de cada cónyuge.

Cuando ambos actúan conjuntamente, también quedan afectados los patrimonios privativos de los dos. Pero cuando solo uno de ellos asume la deuda, aunque el otro haya prestado su consentimiento al acto, el cónyuge que no es propiamente deudor no ve afectado su patrimonio privativo, porque el consentimiento no basta para atribuirle esa condición.

5. DEUDAS COMUNES CONTRAÍDAS POR UNO SOLO DE LOS CÓNYUGES

La actuación individual de uno de los cónyuges no implica necesariamente la atención de intereses propios, pues con frecuencia se desarrolla dentro del ámbito de necesidades de la sociedad de gananciales. Por ello, el Código contempla varios supuestos en los que, aun habiendo sido contraída la deuda por un solo cónyuge, la sociedad de gananciales queda vinculada. La regla general la establece el artículo 1369, según el cual, cuando la deuda de un cónyuge sea además deuda de la sociedad, los bienes gananciales responden solidariamente.

Esa solidaridad debe entenderse respecto de los bienes privativos del cónyuge deudor, no como solidaridad entre deudores en sentido técnico, sino como colocación de ambas masas patrimoniales en el mismo plano de responsabilidad, de modo que el acreedor puede dirigirse indistintamente contra los bienes gananciales o contra los privativos del cónyuge deudor sin necesidad de excusión previa.

5.1. Ejercicio de la potestad doméstica o actuación individual

El artículo 1365 dispone que los bienes gananciales responderán directamente frente al acreedor de las deudas contraídas por un cónyuge en el ejercicio de la potestad doméstica o en la gestión o disposición de gananciales que le corresponda por ley o por capítulos. Además de la potestad doméstica, quedan comprendidos todos los supuestos en que la actuación individual de uno de los cónyuges sea lícita y vinculante, ya sea porque así lo permita la ley, porque se haya transferido la gestión a un solo consorte o porque exista pacto convencional.

5.2. Actividad profesional o gastos de administración del patrimonio de cualquiera de los

cónyuges También responden los bienes gananciales de las deudas contraídas por un cónyuge en el ejercicio ordinario de su profesión, arte u oficio o en la administración ordinaria de sus bienes propios. Esta solución es coherente con que tales gastos constituyen cargas de la sociedad de gananciales y con que, a su vez, las ganancias obtenidas por esas actividades pasan a integrar el patrimonio ganancial.

5.3. Régimen propio de comerciantes y empresarios

Antes existía una remisión específica al Código de Comercio para el caso del cónyuge comerciante. Sin embargo, la Ley 16/2022 suprimió esa referencia y derogó los preceptos del Código de Comercio que regulaban esta materia, sin sustituirlos por otros. Desde el 26 de septiembre de 2022, todos los bienes gananciales quedan afectos a las deudas derivadas del ejercicio del comercio por el cónyuge comerciante, y ya no es posible la oposición del cónyuge no comerciante. La reforma responde al objetivo de unificar el régimen de responsabilidad de los bienes conyugales por las deudas contraídas en el ejercicio de la profesión de cualquiera de los cónyuges, eliminando la distinción entre empresario y no empresario.

5.4. Atención de los hijos en caso de separación de hecho

La separación de hecho no disuelve por sí misma la sociedad de gananciales, sino que solo puede dar lugar a su disolución judicial a instancia de parte cuando haya transcurrido más de un año. Mientras tanto, la sociedad sigue vigente. Por ello, el artículo 1368 establece que los bienes gananciales responderán de las obligaciones contraídas por uno solo de los cónyuges para atender al sostenimiento, previsión y educación de los hijos a cargo de la sociedad de gananciales. Aunque esta regla reitera el carácter ganancial de esas cargas familiares, conserva utilidad desde la perspectiva de los terceros acreedores, al reforzar la afección del patrimonio ganancial mientras la sociedad no se haya disuelto.

5.5. Adquisiciones por uno de los cónyuges de bienes gananciales mediante precio aplazado

El artículo 1370 regula el supuesto en que uno de los cónyuges adquiere a plazos, sin consentimiento del otro, un bien ganancial. Se parte de que el bien tiene carácter ganancial conforme al artículo 1356, cuando el primer desembolso tiene tal naturaleza. Aunque parecería natural que los bienes gananciales respondieran de la deuda aplazada, el precepto establece de forma oscura que por el precio aplazado responderá siempre el bien adquirido, sin perjuicio de la responsabilidad de otros bienes según las reglas del Código.

Frente a la interpretación que entiende que esta norma deroga la regla general del artículo 1369, el texto sostiene que su sentido principal es declarar la afección especial del bien adquirido mientras queden plazos pendientes. Así, el acreedor debería dirigirse en primer término contra ese bien, mediante los mecanismos propios de las ventas a plazos o mediante su embargo o ejecución, siempre que ello baste para satisfacer el crédito. Si no fuera suficiente, continuarían aplicándose las reglas generales, con afección de los bienes privativos del cónyuge contratante y responsabilidad solidaria de los bienes gananciales en los casos en que proceda.

La sentencia del Tribunal Supremo 586/2008 se mueve en esa línea al afirmar que el artículo 1370 resuelve especialmente el problema de los supuestos en que la obligación de pagar el precio aplazado no es deuda de la sociedad, declarando que el bien responde siempre aunque sea ganancial y no lo sea la obligación de pago. En consecuencia, puede ocurrir que el bien adquirido sea ganancial y, sin embargo, la deuda no lo sea. En tal caso, no responderían de ella los bienes gananciales, pero sí al menos el bien adquirido por aplicación del artículo 1370, sin perjuicio de que puedan responder otros bienes comunes cuando resulten aplicables las reglas correspondientes.

6. LAS DEUDAS PROPIAS DE CADA UNO DE LOS CÓNYUGES

6.1. La noción de deuda propia

La deuda propia es la obligación contraída por cualquiera de los cónyuges que no puede considerarse a cargo de la sociedad de gananciales. Se trata, por tanto, de una noción de carácter negativo, pues quedan comprendidas en ella todas las deudas que no deban calificarse como gananciales. Su ámbito se reduce notablemente porque el Código considera gananciales las deudas derivadas de la administración ordinaria de los patrimonios privativos y del ejercicio de la profesión u oficio de cualquiera de los cónyuges. Aun así, el propio Código identifica como deudas propias las deudas de juego pendientes de pago, las obligaciones extracontractuales que no reúnan los requisitos exigidos para ser consideradas gananciales, los gastos de alimentación y educación de los hijos no comunes que no residan en el hogar familiar y, además, las deudas asumidas por uno de los cónyuges antes de comenzar la sociedad de gananciales.

6.2. La responsabilidad por las deudas propias

La regla general establece que cada cónyuge responde con su patrimonio personal de sus deudas propias. Solo cuando sus bienes privativos no basten para hacerlas efectivas podrá el acreedor pedir el embargo de bienes gananciales, de manera que la responsabilidad de estos tiene carácter subsidiario. En relación con las deudas de juego pendientes de pago, el artículo 1372 afirma que responden exclusivamente los bienes privativos del deudor, lo que parece excluir la responsabilidad subsidiaria de los bienes gananciales. Sin embargo, también cabe interpretar que esa exclusividad se formula por contraste con otro precepto y que, en consecuencia, la regla general de responsabilidad subsidiaria de los bienes gananciales podría aplicarse igualmente a dichas deudas.

6.3. El embargo de bienes gananciales

Cuando el patrimonio privativo del cónyuge deudor resulte insuficiente, el acreedor puede pedir el embargo de bienes gananciales. Ese embargo debe notificarse de inmediato al otro cónyuge, que puede exigir que los bienes comunes trabados se sustituyan por la parte que corresponde al cónyuge deudor en la sociedad conyugal. Si el cónyuge no deudor consiente que la ejecución recaiga sobre bienes gananciales, el valor de esos bienes se imputará al cónyuge deudor como anticipo de su participación, de modo que después habrá un mero ajuste contable o derecho de reintegro. Si, por el contrario, opta por sustituir el embargo por la parte del deudor en la sociedad conyugal, ello implica la disolución y liquidación de la sociedad de gananciales, y el acreedor deberá esperar a que se adjudiquen al deudor los bienes sobre los que podrá dirigirse. Tras esa disolución, se aplicará el régimen de separación de bienes, salvo que en el plazo de tres meses el cónyuge del deudor opte en documento público por iniciar una nueva sociedad de gananciales.

7. REINTEGROS INTERCONYUGALES

El artículo 1364 reconoce el derecho del cónyuge que haya aportado bienes privativos para atender gastos o pagos que correspondían a la sociedad de gananciales a ser reintegrado con cargo al patrimonio común. La norma constituye una manifestación más de la técnica del reintegro o reembolso entre las distintas masas patrimoniales del régimen de gananciales, ahora en favor del patrimonio privativo que ha soportado una obligación de la sociedad. Al mismo tiempo, su formulación permite entenderla también en sentido inverso, de manera que proceda igualmente el reintegro en favor del patrimonio ganancial cuando sea este el que haya soportado cargas que no le correspondían.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")

        .replace(/"/g,"&quot;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);

      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
