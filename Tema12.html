    ========================================================= */
    const PDF_TEXTO = `
1. LA SOCIEDAD DE GANANCIALES

1.1. Concepto

La sociedad de gananciales es un sistema de comunidad de ganancias ampliamente extendido en el Derecho común español, de profunda raigambre histórica, que opera como régimen económico-matrimonial legal supletorio de primer grado cuando no existen capitulaciones o estas son ineficaces, conforme al art. 1316 del Código Civil, precepto integrado en las disposiciones comunes y de carácter fundamental para los matrimonios sometidos al Derecho común, sin aplicación en los regidos por derechos forales o especiales.

Según el art. 1344, mediante este régimen se hacen comunes para ambos cónyuges las ganancias o beneficios obtenidos indistintamente por cualquiera de ellos, atribuyéndose por mitad al disolverse la sociedad. Durante su vigencia no se produce reparto, siendo irrelevante que las ganancias procedan del trabajo de uno o ambos cónyuges o de los frutos de bienes comunes o privativos, pues en todo caso tienen carácter ganancial.

1.2. Denominación y naturaleza jurídica

El Código Civil mantiene la denominación de sociedad de gananciales, lo que ha llevado a parte de la doctrina a considerarla una sociedad en sentido técnico, apoyándose en la antigua remisión del art. 1395 a las normas del contrato de sociedad. Sin embargo, la posición mayoritaria entiende que, pese a dicha denominación, se trata de una comunidad de tipo germánico o en mano común, concebida como un modelo teórico histórico y no como una categoría normativa autónoma.

La sociedad de gananciales constituye así una institución con regulación propia, detallada y suficiente, lo que hace innecesario acudir a regímenes supletorios externos y diluye en gran medida la relevancia de la discusión sobre su naturaleza jurídica. No obstante, en caso de necesidad, debe considerarse un subtipo de comunidad en mano común, especialmente tras la reforma de 1981, que eliminó la remisión al contrato de sociedad y reforzó la idea de comunidad de ganancias atribuibles por mitad al disolverse el régimen. La persistencia de su denominación responde a su tradición histórica.

1.3. Nacimiento de la sociedad de gananciales

El art. 1345 establece que la sociedad de gananciales nace en el momento de la celebración del matrimonio o posteriormente si así se pacta en capitulaciones. En defecto de estas, el régimen se aplica automáticamente desde el inicio del matrimonio, evidenciando que todo matrimonio debe quedar sometido a un régimen económico.

Asimismo, puede iniciarse con posterioridad en virtud del principio de mutabilidad del régimen económico-matrimonial, mediante capitulaciones que sustituyan un régimen previo por el de gananciales.

2. EL ACTIVO DE LA SOCIEDAD DE GANANCIALES

2.1. La sistemática del Código

Desde la reforma de 1981 se ha consolidado la expresión activo de la sociedad de gananciales para aludir, en términos contables, al conjunto de bienes de los cónyuges, distinguiéndose entre bienes privativos de cada uno y bienes comunes o gananciales, lo que permite hablar de patrimonio privativo y de patrimonio ganancial. La determinación del carácter privativo o ganancial de los bienes familiares tiene una importancia central en este régimen, y el Código regula esta materia en los arts. 1346 a 1361 con una sistemática discutible, aunque comprensible por la complejidad y matización del tema. Los primeros preceptos enumeran, por separado, los bienes privativos y los gananciales, mientras que los restantes abordan supuestos más complejos y algunas reglas generales de especial importancia, entre las que destaca la presunción de ganancialidad. Sin embargo, esta presunción no constituye por sí sola la clave del sistema, pues el legislador determina el carácter de los bienes de forma fundamentalmente casuística.

2.2. La presunción de ganancialidad y la confesión de privatividad

Ante la frecuente dificultad de probar si un bien es privativo o ganancial, el Código establece una regla general destinada a evitar los numerosos problemas que surgirían al tiempo de la disolución de la sociedad de gananciales. Esa regla consiste en la presunción de ganancialidad del art. 1361, según la cual se presumen gananciales los bienes existentes en el matrimonio mientras no se pruebe su pertenencia privativa a uno de los cónyuges. En relación con los inmuebles, el Reglamento Hipotecario dispone además que los adquiridos a título oneroso por uno solo de los cónyuges se inscribirán a nombre del adquirente con carácter presuntivamente ganancial cuando no se haga constar que adquiere para la sociedad de gananciales.

La presunción establecida por el art. 1361 tiene gran importancia práctica y constituye una presunción iuris tantum, pero puede quedar desvirtuada entre los cónyuges por la llamada confesión de privatividad prevista en el art. 1324. Conforme a este precepto, para probar entre cónyuges que determinados bienes son propios de uno de ellos basta la confesión del otro, aunque esa declaración por sí sola no perjudica a herederos forzosos ni a acreedores, ya sean de la comunidad o de cualquiera de los cónyuges. De ello resulta que la confesión es eficaz en el ámbito interno de la relación conyugal, pero frente a terceros necesita apoyarse en otros medios probatorios para evitar posibles fraudes. Esta vía tiene especial trascendencia tras el fallecimiento del cónyuge confesante, pues el cónyuge favorecido por la confesión necesitará, para inscribir actos de disposición sobre tales bienes, el consentimiento de los herederos forzosos del confesante.

2.3. La atribución de ganancialidad

La primacía práctica de los bienes gananciales también se manifiesta en la atribución de ganancialidad regulada en el art. 1355, que permite a los cónyuges, de común acuerdo, atribuir carácter ganancial a los bienes adquiridos a título oneroso durante el matrimonio, cualquiera que sea la procedencia del precio o contraprestación y la forma en que se satisfaga. Además, cuando la adquisición se realiza conjuntamente y sin atribución de cuotas, se presume la voluntad favorable al carácter ganancial del bien.

Aunque el precepto se refiere a supuestos en que un bien adquirido durante el matrimonio no tendría, conforme a las reglas generales, naturaleza ganancial, su regulación es coherente tanto con la libertad de contratación entre cónyuges como con la realidad ordinaria de muchas economías domésticas, en las que, una vez consolidada la convivencia, se prefiere abandonar el cálculo exacto de cuotas de privatividad en favor de la integración del bien en el patrimonio ganancial. Por ello, en la práctica resulta frecuente que los cónyuges adquieran para la sociedad de gananciales y que opere la atribución presunta de ganancialidad, sin perjuicio de la posible aplicación posterior del derecho de reembolso.

3. EL ELENCO DE LOS BIENES PRIVATIVOS

3.1. Concepto

El art. 1346 del Código Civil establece la relación de bienes privativos de cada cónyuge, incluyendo bienes, animales y derechos que les pertenecieran al comenzar la sociedad de gananciales, lo que resulta coherente con el carácter de comunidad de ganancias del régimen.

Estos bienes comprenden cualquier derecho o facultad patrimonial individualizable, con independencia de su naturaleza.

También tienen carácter privativo los bienes adquiridos con posterioridad a la constitución de la sociedad a título gratuito, como los obtenidos por donación o herencia, dado que este tipo de adquisición no implica carga alguna para la sociedad de gananciales.

Igualmente son privativos los bienes adquiridos a costa o en sustitución de otros bienes privativos, en aplicación del principio de subrogación real, que mantiene la naturaleza del patrimonio originario en las transformaciones que este experimente.

3.2. Supuestos específicos de privatividad

El carácter privativo se extiende a los bienes adquiridos mediante el ejercicio de un derecho de retracto perteneciente a uno solo de los cónyuges, ya que la adquisición tiene su causa en un derecho exclusivo. Incluso cuando el precio se satisface con bienes gananciales, el bien conserva su carácter privativo, si bien la sociedad tendrá derecho de crédito frente al cónyuge titular por el importe abonado.

También son privativos los bienes y derechos inherentes a la persona o intransmisibles inter vivos, al tratarse de derechos personalísimos vinculados al titular. Del mismo modo, tienen carácter privativo las indemnizaciones por daños causados a la persona de uno de los cónyuges o a sus bienes privativos, manteniéndose en este último caso la subrogación del bien dañado.

Asimismo, se consideran privativos por destino las ropas y objetos de uso personal que no tengan un valor extraordinario, incluso si se han adquirido con fondos comunes, sin que proceda derecho de reintegro a favor de la sociedad por tratarse de cargas familiares. En cambio, los instrumentos necesarios para el ejercicio de la profesión u oficio son también privativos por destino, pero si han sido adquiridos con dinero ganancial, la sociedad tiene derecho a ser reembolsada, especialmente para evitar que se carguen sobre el patrimonio común gastos excesivos vinculados a la actividad profesional.

4. EL ELENCO DE LOS BIENES GANANCIALES

4.1. Concepto

El art. 1347 del Código Civil establece la relación de bienes gananciales, siguiendo un criterio basado en la obtención de beneficios durante la vigencia del matrimonio. En primer lugar, tienen carácter ganancial los bienes obtenidos por el trabajo o la industria de cualquiera de los cónyuges, de modo que todos los ingresos derivados de su actividad laboral o profesional se integran en el patrimonio común.

Asimismo, son gananciales los frutos, rentas o intereses que produzcan tanto los bienes privativos como los gananciales, de manera que, aunque la titularidad de los bienes originarios se mantenga, todo lo que estos generen constante matrimonio se considera ganancia común atribuible por mitad a ambos cónyuges.

También se consideran gananciales los bienes adquiridos a título oneroso a costa del caudal común, ya se realice la adquisición para la comunidad o para uno solo de los cónyuges, aplicándose aquí el principio de subrogación real, por el que los bienes adquiridos sustituyen al capital común empleado.

4.2. Supuestos específicos de ganancialidad

El carácter ganancial se extiende a los bienes adquiridos mediante el ejercicio de un derecho de retracto de naturaleza ganancial, incluso cuando se utilicen fondos privativos para su adquisición, en cuyo caso la sociedad será deudora del cónyuge por el valor satisfecho.

Igualmente, son gananciales las empresas y establecimientos fundados durante la vigencia de la sociedad con bienes comunes, sin que esta naturaleza se altere por el hecho de que la titularidad formal corresponda a uno solo de los cónyuges o de que únicamente uno de ellos desarrolle la actividad. Cuando en su constitución concurran capital privativo y común, se aplicará el régimen correspondiente a dicha concurrencia.

En relación con los bienes inmuebles, la normativa hipotecaria regula su inscripción atendiendo a su carácter ganancial o privativo, estableciendo criterios específicos según la forma de adquisición y la intervención de uno o ambos cónyuges, así como la posible existencia de una atribución expresa o presunta de ganancialidad.

5. REGLAS PARTICULARES SOBRE EL CARÁCTER PRIVATIVO O GANANCIAL DE LOS BIENES

5.1. Los créditos aplazados

El art. 1348 establece que cuando un crédito o cantidad pertenece privativamente a uno de los cónyuges, las cantidades percibidas durante el matrimonio en concepto de pagos aplazados mantienen carácter privativo, al no poder considerarse rentas o intereses. Esta regla no altera el sistema general, sino que se integra en él al precisar la naturaleza de tales cobros.

5.2. Los derechos de pensión y usufructo

El art. 1349 dispone que el derecho de usufructo o de pensión pertenece privativamente al cónyuge titular, mientras que los frutos, pensiones o intereses devengados durante el matrimonio tienen carácter ganancial, en coherencia con la regla general sobre los rendimientos de los bienes. La jurisprudencia ha precisado que, en prestaciones vinculadas a ingresos laborales, el carácter ganancial o privativo depende del momento de percepción y de la distinción entre el derecho mismo, que es privativo por su carácter personal, y los rendimientos generados durante la vigencia de la sociedad, que son comunes.

5.3. Las cabezas de ganado

El art. 1350 establece que las cabezas de ganado que excedan, al disolverse la sociedad, del número aportado privativamente por cada cónyuge tendrán carácter ganancial.

5.4. Ganancias procedentes del juego

Según el art. 1351, las ganancias obtenidas por cualquiera de los cónyuges en el juego o por causas que eximan de restitución se integran en la sociedad de gananciales, al considerarse en sentido amplio fruto de la actividad o habilidad del cónyuge.

5.5. Acciones y participaciones sociales

El art. 1352 atribuye carácter privativo a las nuevas acciones o participaciones adquiridas en virtud de derechos derivados de títulos privativos, incluso si se adquieren con fondos gananciales, reconociéndose a la sociedad un derecho de reembolso por las cantidades empleadas.

5.6. Donaciones o atribuciones sucesorias en favor de ambos cónyuges

Cuando bienes son atribuidos conjuntamente a ambos cónyuges a título gratuito sin designación de partes, el art. 1353 establece que tendrán carácter ganancial si la liberalidad es aceptada por ambos y no se dispone lo contrario, aunque en otro caso cabría su consideración como bienes en proindiviso ordinario integrados en los patrimonios privativos.

5.7. Adquisiciones mixtas

El art. 1354 regula los supuestos en que se emplean fondos privativos y gananciales para adquirir un bien, estableciendo una copropiedad proporcional entre el patrimonio común y el cónyuge o cónyuges aportantes, sin perjuicio de las críticas doctrinales a esta solución frente a otras alternativas basadas en la atribución íntegra y el posterior reembolso. Este régimen se aplica también a empresas y a la vivienda y ajuar familiares.

5.8. Bienes adquiridos mediante precio aplazado

Cuando la adquisición se realiza antes del inicio de la sociedad, el bien es siempre privativo, aunque el precio se pague con fondos gananciales. Si la adquisición es posterior, el carácter del bien viene determinado por la naturaleza del primer desembolso, siendo ganancial o privativo según este, sin perjuicio de los reembolsos correspondientes. La adquisición de la vivienda y ajuar familiares queda sometida a la regla de las adquisiciones mixtas.

5.9. Mejoras e incrementos patrimoniales

Las mejoras o incrementos de valor siguen, con carácter general, la naturaleza del bien al que afectan, pero si se producen en bienes privativos mediante fondos comunes o el trabajo de los cónyuges, la sociedad no solo tiene derecho de reembolso, sino a participar en el aumento de valor generado, lo que refuerza la tendencia expansiva del patrimonio ganancial.

6. LA OBLIGACIÓN DE REEMBOLSO

6.1. La obligación de reembolso

La composición patrimonial de la sociedad de gananciales implica que con frecuencia la calificación de un bien como ganancial o privativo no coincide con el origen de los fondos empleados para su adquisición. En estos casos, se mantiene la naturaleza del bien, pero surge la obligación de reembolsar las cantidades correspondientes al patrimonio que soportó el gasto.

Así, cuando se adquiere un bien ganancial con dinero privativo, el cónyuge aportante tiene derecho a ser reintegrado, y del mismo modo la sociedad de gananciales tiene derecho de reembolso cuando se han empleado fondos comunes para bienes privativos. Esta regla general se recoge en el art. 1358, que establece que, con independencia de la procedencia del caudal, debe reintegrarse el valor satisfecho mediante su actualización al tiempo de la liquidación.

El derecho de reembolso del dinero privativo invertido en bienes gananciales existe aunque no se haya formulado reserva expresa en el momento de la adquisición, siempre que tampoco se haya excluido expresamente. La atribución del carácter ganancial al bien no altera la naturaleza privativa del dinero empleado, generando un crédito por el valor satisfecho que será exigible en el momento de la liquidación si no se hubiera hecho efectivo con anterioridad.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
