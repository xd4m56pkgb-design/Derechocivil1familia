    const SCORE_BLANK = 0;    // no suma ni resta

    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LA DISOLUCIÓN DE LA SOCIEDAD DE GANANCIALES

La disolución de la sociedad de gananciales supone la pérdida de vigencia de este régimen económico-matrimonial. Puede producirse por decisión de los cónyuges de sustituirlo por otro régimen, por circunstancias sobrevenidas relativas al matrimonio que determinan automáticamente su extinción o por concurrir causas legales que permiten a cualquiera de los cónyuges solicitarla.

2. LA DISOLUCIÓN DE PLENO DERECHO

La disolución de pleno derecho tiene lugar en los casos previstos en el art. 1392: disolución del matrimonio, nulidad matrimonial, separación legal de los cónyuges y pacto de un régimen económico distinto en la forma legalmente prevista. En todos estos supuestos, la sociedad de gananciales se extingue desde el mismo momento en que concurre la causa correspondiente. En realidad, salvo el cambio voluntario de régimen, lo que refleja la norma es que toda crisis matrimonial priva de sentido a un régimen basado en la existencia de un matrimonio válido y estable. Por eso, el art. 95.1 dispone que la sentencia firme, el decreto firme o la escritura pública que formalicen el convenio regulador producen la disolución del régimen económico-matrimonial respecto de los bienes del matrimonio.

El momento inicial de la extinción es la firmeza de la sentencia de nulidad, separación o divorcio, y no la admisión de la demanda. Hasta entonces subsiste el régimen de gananciales, de modo que sigue operando la presunción de ganancialidad incluso respecto de bienes adquiridos durante la separación de hecho, aunque la jurisprudencia tienda cada vez más a valorar la desaparición de la convivencia como fundamento material de la comunidad ganancial.

2.1. La disolución del matrimonio

La disolución del matrimonio, a estos efectos, remite al art. 85, según el cual solo se produce por muerte o declaración de fallecimiento de uno de los cónyuges o por divorcio.

2.2. La nulidad matrimonial

La nulidad matrimonial priva de sentido a la subsistencia del régimen económico-matrimonial, dada la eficacia retroactiva de la declaración de nulidad. No obstante, esta consecuencia debe conciliarse con la protección del matrimonio putativo y con la conservación de efectos respecto de los hijos y del cónyuge o cónyuges que hubieran actuado de buena fe al celebrar el matrimonio.

Cuando solo uno de los cónyuges ha actuado de buena fe, el art. 1395 permite al cónyuge de buena fe optar entre liquidar el régimen conforme a las reglas de la sociedad de gananciales o aplicar las disposiciones del régimen de participación, quedando en todo caso excluido el contrayente de mala fe de las ganancias obtenidas por su consorte. Esta solución fue después reiterada y ampliada por el art. 95.2 a cualquier régimen económico-matrimonial, manteniendo siempre la pérdida de ganancias para quien contrajo matrimonio de mala fe.

2.3. La separación matrimonial

La separación judicial provoca la disolución de la sociedad de gananciales, pues un régimen fundado en la comunidad de vida y ganancias resulta incompatible con una situación de separación acordada judicialmente. En cambio, la separación de hecho no produce por sí sola esa disolución automática, aunque sea duradera o estable.

En caso de separación de hecho, no basta un acuerdo privado entre los cónyuges para entender extinguida la sociedad de gananciales. Es necesario otorgar la correspondiente escritura pública, de acuerdo con la interpretación conjunta de los arts. 1327 y 1392 y con la doctrina fijada por la STS 61/2006.

2.4. La modificación del régimen económico-matrimonial

En situaciones de separación de hecho, los cónyuges pueden poner fin a la sociedad de gananciales mediante capitulaciones matrimoniales. De hecho, estas capitulaciones se utilizan con frecuencia en contextos de crisis matrimonial y especialmente en supuestos de separación de hecho. Sin embargo, la fecha en que comenzó la separación resulta irrelevante para la extinción del régimen, ya que esta solo se produce cuando se otorgan las capitulaciones correspondientes.

Además, la modificación del régimen económico-matrimonial no exige la existencia de separación de hecho. Desde la consagración del principio de mutabilidad del régimen económico-matrimonial, los cónyuges pueden cambiar libremente de sistema en cualquier momento de la convivencia, sin necesidad de alegar causa concreta alguna.

3. LA DISOLUCIÓN JUDICIAL

Junto a los supuestos de disolución de pleno derecho, el art. 1393 contempla diversas causas que permiten a uno de los cónyuges solicitar judicialmente la disolución de la sociedad de gananciales. Se trata de una disolución que depende de la iniciativa de parte, pero sobre todo de una resolución judicial, que es la que verdaderamente pone fin al régimen, ya que sus efectos solo se producen desde la fecha en que se acuerda. Por tanto, mientras no recaiga resolución judicial, la sociedad de gananciales continúa vigente aunque concurra alguna de las causas legales.

El art. 1393 prevé esta disolución cuando respecto del otro cónyuge se hayan adoptado judicialmente medidas de apoyo con representación plena en la esfera patrimonial, cuando haya sido declarado ausente o en concurso, o condenado por abandono de familia; cuando realice por sí solo actos de disposición o de gestión patrimonial que impliquen fraude, daño o peligro para los derechos del otro en la sociedad; cuando exista separación de hecho durante más de un año por acuerdo mutuo o abandono del hogar; y cuando incumpla de forma grave y reiterada el deber de informar sobre la marcha y rendimiento de sus actividades económicas. También remite a una regulación específica para el caso de embargo de la parte de uno de los cónyuges por deudas propias.

Estos supuestos responden a una misma idea de fondo: la dificultad o imposibilidad de actuación conjunta que exige la comunidad de ganancias o la pérdida de confianza en la gestión del otro cónyuge. Salvo en los casos del número primero, los demás exigen un procedimiento contencioso. Si se discute judicialmente la concurrencia de la causa de disolución, iniciado el proceso deberá practicarse inventario y el juez adoptará las medidas necesarias para la administración del caudal, siendo precisa autorización judicial para los actos que excedan de la administración ordinaria.

En principio, durante el tiempo que media entre la demanda y la firmeza de la sentencia debe entenderse subsistente la sociedad de gananciales. Así lo confirma especialmente el supuesto de separación de hecho superior a un año, que exige ese plazo para que el juez pueda declarar la disolución por esta causa. Sin embargo, la jurisprudencia atiende cada vez más a la desaparición de la convivencia como fundamento material de la comunidad ganancial y, por ello, en algunos casos ha situado la disolución en momentos anteriores, como el auto de orden de alejamiento o el auto de medidas provisionales, cuando con ellos cesa efectivamente la convivencia conyugal.

La doctrina jurisprudencial reiterada parte de que la libre separación de hecho elimina el fundamento de la sociedad de gananciales, que es la convivencia entre los cónyuges. En consecuencia, una vez rota esa convivencia, no resulta conforme con la buena fe reclamar derechos sobre bienes a cuya adquisición no se ha contribuido, pues ello puede constituir incluso abuso del derecho. No obstante, esta flexibilización de la interpretación literal no opera automáticamente, ya que exige una voluntad inequívoca de poner fin a la sociedad conyugal y un periodo de separación de hecho caracterizado por una absoluta independencia económica entre los cónyuges. Cuando los actos de ambos revelan mantenimiento de cuentas comunes, gestión compartida o continuidad en las cargas de la sociedad, no puede entenderse extinguida la sociedad de gananciales por la mera separación de hecho.

4. LAS OPERACIONES DE LIQUIDACIÓN

Disuelta la sociedad de gananciales, debe procederse a su liquidación, entendida como la atribución a cada cónyuge de la mitad de los bienes y derechos gananciales una vez realizados los pagos y reintegros procedentes. Esta liquidación puede practicarse inmediatamente por acuerdo de los cónyuges, incluso dentro del convenio regulador, o puede posponerse, dando lugar mientras tanto a una comunidad posganancial. El retraso prolongado genera importantes problemas prácticos, por lo que el art. 95.1 del Código Civil dispone que la resolución o escritura pública que formalice el convenio regulador extinguirá el régimen económico matrimonial y aprobará su liquidación si existe mutuo acuerdo. Además, la reforma de 2022 reconoce expresamente la legitimación de los herederos de la víctima fallecida para instar la liquidación del régimen matrimonial en los casos de violencia de género y atribuye la competencia correspondiente a los Juzgados de Violencia sobre la Mujer.

4.1. El inventario y avalúo de los bienes

La liquidación comienza con la formación del inventario del activo y del pasivo de la sociedad de gananciales. Solo se tienen en cuenta los bienes, derechos, obligaciones y deudas de la sociedad, no los bienes privativos de los cónyuges, salvo en cuanto existan reembolsos o reintegros entre las masas privativas y la masa ganancial. El activo comprende los bienes gananciales existentes al tiempo de la disolución, el valor actualizado de los bienes enajenados ilegal o fraudulentamente que no hayan sido recuperados y las cantidades actualizadas pagadas por la sociedad que debían ser soportadas solo por uno de los cónyuges, así como los créditos de la sociedad frente a este. El pasivo incluye las deudas pendientes a cargo de la sociedad, el valor actualizado de los bienes privativos gastados en interés de la sociedad o deteriorados por su uso en beneficio de ella, y las cantidades satisfechas por uno solo de los cónyuges que fueran a cargo de la sociedad, junto con los créditos de los cónyuges frente a esta.

El Código se refiere a bienes existentes, deudas pendientes e importes actualizados, pero no fija reglas expresas sobre el momento al que debe atenderse para la valoración. En la práctica y en la jurisprudencia ha prevalecido el criterio de que el avalúo debe referirse al momento de la liquidación efectiva y no al de la disolución, pues ambos momentos son distintos y los valores actualizados deben computarse cuando se realizan realmente las operaciones liquidatorias. Este criterio se refuerza por la aplicación supletoria de las normas sobre partición hereditaria, que también conducen a valorar los bienes al tiempo de la liquidación y permiten incluso la rescisión por lesión en más de la cuarta parte.

4.2. La liquidación: el pago de las deudas

Formado el inventario, procede satisfacer las deudas a cargo de la comunidad ganancial para determinar el remanente divisible entre los cónyuges o sus herederos. El Código parte de que primero deben atenderse las deudas frente a terceros acreedores de la sociedad y después los reembolsos o reintegros debidos a cada cónyuge frente a la masa común. La liquidación presupone necesariamente la previa disolución de la sociedad, aunque ello no impide que los cónyuges puedan transmitir bienes gananciales concretos al patrimonio privativo de uno de ellos mediante los mecanismos admitidos por el ordenamiento.

Dentro de esta fase, el Código menciona en primer lugar las llamadas deudas alimenticias, a las que atribuye preferencia. Sin embargo, no se trata técnicamente de verdaderas deudas frente a terceros, sino de anticipos del haber ganancial que puedan corresponder a los cónyuges o, en su caso, al sobreviviente y a los hijos mientras se practica la liquidación. Tales cantidades no constituyen una adjudicación definitiva, sino una mera imputación contable que después se descuenta de lo que corresponda a cada beneficiario en la liquidación final.

La protección de los acreedores de la sociedad de gananciales ocupa una posición central.

Aunque en muchos casos las deudas no quedan totalmente extinguidas en el momento de la liquidación, el Código les reconoce mecanismos de tutela específicos. Los acreedores tienen en la liquidación los mismos derechos que en la partición y liquidación de herencias, lo que implica incluso que pueden instarla si les conviene. Además, mientras no se paguen por entero las deudas de la sociedad, conservan sus créditos frente al cónyuge deudor y también pueden dirigirse contra los bienes adjudicados al cónyuge no deudor, siempre que se haya formulado debidamente inventario judicial o extrajudicial. Si el caudal inventariado no basta para satisfacer todos los créditos, rigen las normas sobre concurrencia y prelación de créditos. Cuando no haya metálico suficiente, pueden ofrecerse adjudicaciones de bienes gananciales para pagar, pero si cualquier partícipe o acreedor lo solicita, deberán enajenarse esos bienes y destinar su importe al pago.

Una vez satisfechas las deudas de la sociedad, se atiende a los reintegros e indemnizaciones debidos a cada cónyuge hasta donde alcance el caudal inventariado, practicando las compensaciones oportunas si alguno es deudor de la sociedad. Si uno de los cónyuges hubiera pagado a los acreedores de la sociedad más de lo que le correspondía, podrá repetir contra el otro. Distinto es el caso en que uno resulte acreedor personal del otro al tiempo de la liquidación, supuesto en el que podrá exigir la satisfacción de su crédito mediante adjudicación de bienes comunes, salvo pago voluntario del deudor.

4.3. La división y adjudicación de los gananciales

Concluidas las deducciones procedentes, el remanente constituye el haber de la sociedad de gananciales y debe dividirse por mitad entre los cónyuges o sus respectivos herederos. Esa división por mitad no implica repartir cada bien por partes iguales, sino distribuir el conjunto del haber conforme al acuerdo alcanzado por los interesados, lo que permite soluciones diversas, desde la permanencia de situaciones de copropiedad ordinaria hasta adjudicaciones completamente diferenciadas. La aplicación supletoria de las reglas de la partición hereditaria no impone necesariamente una igualdad cualitativa estricta de los lotes, especialmente porque esa regla tiene carácter facultativo.

El Código reconoce, además, un derecho de adjudicación preferente a favor de cada cónyuge respecto de determinados bienes. Puede incluirse con preferencia en su haber los bienes de uso personal que no sean privativos, la explotación económica que gestione efectivamente, el local donde ejerza su profesión y, en caso de muerte del otro cónyuge, la vivienda habitual. En relación con el local profesional y la vivienda habitual, el cónyuge puede optar entre la propiedad o un derecho de uso o habitación, y si el valor del bien o del derecho supera su haber deberá abonar la diferencia en dinero. En cambio, respecto de los bienes de uso personal y de la explotación económica, la adjudicación preferente solo es posible si su valor cabe dentro del haber del cónyuge, sin posibilidad de imponer compensación en metálico. Finalmente, por remisión a las normas de la comunidad hereditaria, si existieran animales de compañía gananciales y no hubiera acuerdo sobre su destino, la autoridad judicial decidirá atendiendo a su bienestar y podrá incluso cederlos a un tercero para su cuidado y protección.

5. LA LIQUIDACIÓN DE VARIAS SOCIEDADES DE GANANCIALES

Cuando la liquidación de una sociedad de gananciales se pospone sin fecha concreta, puede ocurrir que la comunidad postmatrimonial se prolongue y se complique si el cónyuge supérstite contrae un nuevo matrimonio también sujeto al régimen de gananciales. En tal caso, la falta de liquidación de la primera sociedad y de la herencia del cónyuge fallecido puede coexistir con la formación de una nueva sociedad de gananciales.

Este supuesto, ya contemplado en el antiguo art. 1431 y mantenido en el actual art. 1409, se refiere a la liquidación simultánea de las sociedades de gananciales de dos o más matrimonios contraídos por una misma persona. Para determinar el capital de cada sociedad, el precepto admite toda clase de pruebas cuando no existan inventarios. Si persiste la duda, los gananciales deben atribuirse proporcionalmente a las distintas sociedades, atendiendo a la duración de cada una y a los bienes e ingresos de los respectivos cónyuges.

La principal dificultad del supuesto no reside tanto en la regla legal como en la prueba del carácter de los bienes que integran el patrimonio final al tiempo de la liquidación. Por eso el precepto insiste en la amplitud de los medios probatorios para determinar su naturaleza. La jurisprudencia ha señalado que, en estos casos, debe liquidarse primero la sociedad de gananciales del primer matrimonio, con intervención de los herederos de la primera esposa, y después la segunda sociedad, con participación de la viuda y de los herederos del segundo matrimonio.

La regla de proporcionalidad del art. 1409 solo actúa cuando no puede determinarse de ningún modo la naturaleza de los bienes matrimoniales y debe ponerse en relación con la presunción de ganancialidad del art. 1361. En la práctica, primero deben identificarse los posibles bienes privativos de los cónyuges de uno y otro matrimonio; después, los bienes gananciales que puedan probarse como tales; y solo respecto de los restantes entran en juego, por este orden, la presunción de ganancialidad y la atribución proporcional.

6. LA COMUNIDAD POSTMATRIMONIAL O POSTGANANCIAL

La falta de liquidación de una sociedad de gananciales ya disuelta puede dar lugar a una situación en la que, pese a haberse extinguido el régimen, no se practique de inmediato su liquidación. Aunque el Código contempla incluso la posibilidad de que se constituya después otra sociedad de gananciales sin haberse liquidado la anterior, lo más frecuente es que exista una única sociedad disuelta cuya liquidación se retrasa, especialmente tras el fallecimiento de uno de los cónyuges, cuando los hijos y el supérstite mantienen intacto el patrimonio familiar hasta la muerte del segundo progenitor.

6.1. Descripción del fenómeno

Disuelta la sociedad de gananciales, no puede mantenerse la continuidad de su régimen jurídico.

En particular, cuando uno de los cónyuges ha fallecido, resulta imposible concebir la subsistencia de una comunidad de ganancias entre el cónyuge sobreviviente y los hijos o herederos del fallecido. Por tanto, la situación que se produce no es la pervivencia de la sociedad de gananciales, sino la existencia de un patrimonio pendiente de liquidación.

6.2. Naturaleza jurídica

La cuestión central consiste en determinar la naturaleza jurídica del patrimonio ganancial disuelto y no liquidado, al que la jurisprudencia denomina comunidad postmatrimonial y parte de la doctrina llama comunidad postganancial. En un primer momento se llegó a admitir que el cónyuge viudo era titular de la mitad de cada uno de los inmuebles gananciales y podía enajenarlos, lo que suponía entender que existían tantas comunidades ordinarias como bienes integraban el patrimonio común. Sin embargo, esa tesis fue abandonada al afirmarse que los partícipes no tienen un derecho concreto sobre bienes singulares ni legitimación para enajenar o gravar supuestas mitades indivisas sobre ellos.

La doctrina rechaza también esa visión atomizada y entiende de forma general que, mientras subsiste la indivisión, no existen derechos concretos sobre cada bien, sino un patrimonio colectivo en liquidación con indeterminación de titularidades sobre los bienes singulares. Aunque esta calificación presenta dificultades porque la legislación no regula de forma sistemática el patrimonio en liquidación, la jurisprudencia opta por describir la situación como un conjunto de bienes en cotitularidad ordinaria. En este marco, cada comunero ostenta una cuota abstracta sobre el total del patrimonio ganancial, pero no una cuota concreta sobre cada uno de los bienes, y esa abstracción solo desaparece cuando se realizan las operaciones de liquidación y división.

6.3. Régimen normativo básico

De ello no puede deducirse sin más que la comunidad postmatrimonial se rija plenamente por las normas de la comunidad ordinaria, ya que estas están pensadas para bienes concretos y no para un patrimonio global, por lo que solo algunas de sus reglas resultan aplicables. También se acude al régimen de la comunidad hereditaria indivisa, por su semejanza con este supuesto, así como a la remisión del art. 1410 a las normas sobre partición y liquidación de la herencia en lo no previsto específicamente.

La jurisprudencia del Tribunal Supremo ha perfilado esta comunidad como una comunidad especial. En ella no ingresan las rentas del trabajo ni las procedentes del capital privativo surgidas tras la disolución, que conservan carácter privativo, salvo los frutos pendientes de bienes privativos en el momento de la disolución, a los que se aplican analógicamente las reglas de liquidación del usufructo. En cambio, sí se integran en el patrimonio común los frutos de los bienes comunes. Además, el patrimonio indiviso sigue respondiendo de las obligaciones que pesaban sobre la antigua sociedad de gananciales, mientras que las deudas posteriores contraídas por cada titular recaen sobre su propio patrimonio. Los acreedores solo pueden embargar la cuota abstracta que corresponda a su deudor sobre el patrimonio común, cuota que solo se concretará en bienes determinados cuando se produzca la división y adjudicación.

Esta línea jurisprudencial se mantiene en la actualidad y lleva a afirmar que, sobre el conjunto de bienes que integran la comunidad postmatrimonial, ambos cónyuges o, en su caso, el supérstite y los herederos del premuerto, ostentan una titularidad común que impide a cualquiera de ellos disponer por sí solo de bienes concretos integrados en ese patrimonio.

7. LA LIQUIDACIÓN DEL RÉGIMEN ECONÓMICO-MATRIMONIAL EN LA LEY DE ENJUICIAMIENTO CIVIL DE 2000 

La Ley de Enjuiciamiento Civil de 2000 considera como una de sus principales novedades la creación de un procedimiento específicamente destinado a la liquidación judicial del régimen económico-matrimonial. Con ello pretende dar respuesta a la necesidad de contar con una regulación procesal clara en esta materia, cuya ausencia se había puesto de manifiesto de forma reiterada bajo la legislación anterior.

Este procedimiento especial para la liquidación del régimen económico-matrimonial se regula en los arts. 806 a 811 de la Ley de Enjuiciamiento Civil de 2000, dentro del capítulo segundo del título segundo del libro cuarto, dedicado a los procesos especiales.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }


    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }

    /* =========================
       PDF -> epígrafes
    ========================= */
    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
