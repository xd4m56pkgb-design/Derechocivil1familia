    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INTRODUCCIÓN

1.1. La determinación de la filiación

A efectos legales, la filiación relevante es la que ha quedado legalmente determinada. Su determinación produce, con carácter general, efectos retroactivos al momento del nacimiento, siempre que esa retroactividad sea compatible con su naturaleza y la ley no disponga otra cosa.

No obstante, para proteger a terceros, conservan su validez los actos realizados antes de la determinación de la filiación en nombre del hijo menor por su representante legal o, si se trata de mayores con discapacidad con medidas de apoyo previstas, los efectuados conforme a ellas.

Tras la Constitución de 1978, el ordenamiento no distingue entre filiación matrimonial y no matrimonial en cuanto a sus efectos, pues una diferencia de ese tipo sería inconstitucional. Sin embargo, sí se mantiene la distinción respecto de las formas de determinación de una y otra, al considerarse que el matrimonio aporta en principio certeza sobre la paternidad, lo que justifica que los mecanismos de determinación, prueba, reclamación e impugnación se articulen de modo diferente según el carácter matrimonial o no matrimonial de la filiación.

También se menciona la iniciativa de crear un Certificado de filiación europeo, que no sustituiría a los documentos nacionales ni obligaría a modificar la legislación interna de los Estados, pero sí implicaría que estos deban admitir la filiación cuando haya sido legalmente determinada en otro país de la Unión Europea.

1.2. Determinación de la filiación materna o de la filiación del progenitor gestante

En el sistema normativo español, la filiación materna se determina por el parto, aunque el Código Civil no haya contenido históricamente una regla expresa en ese sentido y haya sido la legislación sobre reproducción asistida la que lo haya formulado de manera formal por primera vez. Esa ausencia se explica porque, antes del desarrollo de la reproducción humana asistida, resultaba natural identificar a la madre gestante con la madre genética, de modo que no era necesario fijar expresamente un criterio legal.

La necesidad de precisar ese criterio surge cuando la maternidad gestante y la genética pueden separarse, lo que obliga a resolver posibles conflictos entre ambas. Por ello, la filiación materna queda determinada por el hecho de haber dado a luz y por la identificación del nacido como el hijo cuya filiación se pretende establecer. De ahí que se prevea la posibilidad de impugnar la filiación cuando se justifique la suposición del parto o no sea cierta la identidad del hijo.

La Ley 4/2023 ha sustituido en esta materia las referencias a madre y padre por las de progenitor gestante y no gestante. Esta modificación no es solo terminológica, sino que permite que las parejas de mujeres y las parejas de hombres en las que uno de sus miembros trans tenga capacidad de gestar puedan determinar la filiación en los mismos términos que las parejas heterosexuales.

Para la determinación de la filiación materna resulta indiferente que esta sea matrimonial o no matrimonial, aunque esa diferencia sigue siendo relevante en relación con la filiación paterna por el juego de las presunciones de paternidad del marido. Finalmente, se anticipa que, tanto en la adopción como en la reproducción asistida, puede quedar legalmente determinada la filiación mediante la maternidad de dos mujeres.

2. LAS NORMAS Y PRESUNCIONES RELATIVAS A LA FILIACIÓN MATRIMONIAL

El Código Civil inicia la regulación de la determinación de la filiación matrimonial estableciendo que esta queda legalmente fijada por la inscripción del nacimiento junto con la del matrimonio de los padres o por sentencia firme. Sin embargo, el elemento central de esta materia no radica tanto en esa formulación general como en las presunciones y reglas referidas a la paternidad del marido de la madre que ha dado a luz.

2.1. La presunción de paternidad y la eventual concepción prematrimonial del hijo

La presunción de paternidad del marido constituye una regla clásica del Derecho de familia, basada en la idea de que, constante matrimonio, lo normal es que la paternidad corresponda al marido. Esta regla se mantiene en el Derecho vigente al presumirse hijos del marido los nacidos después de la celebración del matrimonio y antes de los trescientos días siguientes a su disolución o a la separación legal o de hecho de los cónyuges.

El sistema actual no excluye la filiación matrimonial por el solo hecho de que la concepción haya sido anterior al matrimonio. Si el hijo nace dentro de los ciento ochenta días siguientes a la celebración del matrimonio, el marido puede destruir la presunción mediante declaración auténtica en contrario dentro de los seis meses siguientes al conocimiento del parto. Pero también puede no hacerlo y asumir la condición de padre del hijo concebido antes del matrimonio.

El Código parte así de que el nacimiento dentro de esos ciento ochenta días revela normalmente una concepción anterior al matrimonio, manteniendo los periodos mínimo y máximo de gestación en los parámetros tradicionales de ciento ochenta y trescientos días. Aun así, favorece el carácter matrimonial del hijo concebido antes del matrimonio, atendiendo a la realidad de matrimonios celebrados cuando la mujer ya está embarazada.

La posibilidad de destruir la presunción desaparece cuando el marido ha reconocido expresa o tácitamente la paternidad. También queda limitada cuando conocía el embarazo antes de casarse, pues en ese caso el Código entiende que el matrimonio refuerza la atribución de paternidad al varón que, conociendo esa situación, contrae matrimonio con la mujer embarazada.

Por ello, si no conocía el embarazo, basta su sola declaración para impugnar la presunción, mientras que, si lo conocía, la declaración debe hacerse con el consentimiento de ambos cónyuges.

En todo caso, la presunción de paternidad del marido tiene carácter iuris tantum, de modo que despliega eficacia mientras no se pruebe en contrario que el marido no es el padre del hijo.

2.2. El supuesto del art. 118: la inexistencia de presunción de paternidad

Cuando falta la presunción de paternidad por causa de separación legal o de hecho, el Código permite que la filiación se inscriba como matrimonial si concurre el consentimiento de ambos cónyuges. La finalidad de esta norma es admitir el carácter matrimonial del hijo aunque ya no opere la presunción de paternidad, pero solo en los supuestos de separación, no en los de disolución del matrimonio.

Si el matrimonio se ha disuelto, no basta el consentimiento de ambos para atribuir carácter matrimonial al hijo, sino que será preciso acudir a las correspondientes acciones de filiación. Por eso, el precepto se refiere al caso del hijo nacido una vez transcurridos los trescientos días desde la separación, sea esta legal o de hecho, circunstancia que condiciona el cómputo del plazo.

En el fondo, la norma permite que los cónyuges separados determinen por sí mismos, mediante su consentimiento, el carácter matrimonial del hijo nacido cuando ya no rige la presunción. Ese consentimiento actúa materialmente como reconocimiento del hecho de la generación. Aunque el Código solo exige que concurra el consentimiento de ambos y no dice expresamente que deba prestarse conjuntamente, la peculiaridad del supuesto aconseja entender que esa manifestación debe realizarse de forma conjunta.

2.3. La filiación matrimonial del hijo nacido con anterioridad al matrimonio

No puede considerarse matrimonial al hijo nacido antes del matrimonio de sus progenitores, porque si estos no estaban casados en el momento del nacimiento, el hijo debe ser tenido por no matrimonial. Sin embargo, el Derecho ha conocido desde antiguo mecanismos que permitían atribuir después carácter matrimonial a esos hijos mediante el posterior matrimonio de sus progenitores, atendiendo al beneficio del hijo.

Aunque la igualdad entre hijos matrimoniales y no matrimoniales ha reducido la importancia práctica de esta cuestión, la reforma de 1981 mantuvo un mecanismo de matrimonialización de los hijos extramatrimoniales cuando sus progenitores celebran posteriormente matrimonio entre sí. En ese caso, la filiación pasa a tener carácter matrimonial desde la fecha del matrimonio, siempre que la filiación hubiera quedado previamente determinada conforme a las reglas de la filiación extramatrimonial.

Ello significa que los progenitores deben estar legalmente identificados como tales, ya que al no ser cónyuges en el momento del nacimiento la filiación solo pudo haberse determinado por las reglas propias de la filiación no matrimonial. No existe aquí ningún plazo para la celebración del matrimonio, de modo que este puede producirse muchos años después del nacimiento del hijo y aun así transformar en matrimonial la filiación previamente determinada.

Ese efecto alcanza incluso al supuesto de que el hijo haya fallecido antes del matrimonio, pues aprovecha también a sus descendientes. No se trata de una presunción, sino de una regla que atribuye efectos concretos al matrimonio posterior de quienes, antes de ser cónyuges, habían procreado un hijo extramatrimonial.

3. LA DETERMINACIÓN DE LA FILIACIÓN EXTRAMATRIMONIAL

La filiación extramatrimonial se determina legalmente por los medios recogidos en el art. 120 del Código Civil. Entre ellos se incluyen la declaración conforme realizada por el padre o progenitor no gestante en el momento de la inscripción del nacimiento, el reconocimiento ante el encargado del Registro Civil, en testamento o en otro documento público, la resolución dictada en expediente tramitado conforme a la legislación registral, la sentencia firme y, respecto de la madre o progenitor gestante, la constancia de su filiación en la inscripción de nacimiento practicada dentro de plazo conforme a la Ley del Registro Civil.

Aunque el precepto afirme que la filiación extramatrimonial queda determinada legalmente, esa expresión no significa que la ley la establezca de forma directa por sí sola, sino que exige la realización de algún acto jurídico por los progenitores o la tramitación de un expediente o proceso dirigido a fijarla. Por ello, a diferencia de la filiación matrimonial, la filiación extramatrimonial no resulta nunca directamente de la ley, sino que requiere siempre un mecanismo específico de determinación.

Entre todos esos procedimientos, el reconocimiento ocupa el lugar más importante, hasta el punto de que el legislador dedica a su regulación la mayor parte de las normas sobre determinación de la filiación extramatrimonial. Por eso, su estudio debe hacerse separadamente, dejando para después la consideración de los demás medios de determinación.

4. EL RECONOCIMIENTO DE LA FILIACIÓN EXTRAMATRIMONIAL

4.1. Concepto y naturaleza: el reconocimiento como acto jurídico

El reconocimiento tiene por objeto la admisión de la relación biológica entre quien lo realiza y la persona a la que se refiere. Se trata de un acto jurídico del progenitor que reconoce, cuyos efectos vienen fijados por la ley, sin que el reconocedor pueda determinar su alcance. Por ello, no existe en él base negocial, sino una declaración de voluntad a la que el ordenamiento atribuye directamente sus consecuencias.

4.2. Características del acto de reconocimiento

El reconocimiento es un acto voluntario, pues depende de la decisión espontánea del progenitor.

Es también irrevocable, de manera que, una vez emitido en forma legal, el reconocedor ya no puede decidir sobre sus efectos. Tiene carácter solemne, porque debe realizarse en alguna de las formas legalmente previstas. Es además personalísimo, ya que ha de ser efectuado por el propio progenitor, aunque excepcionalmente otra persona pueda limitarse a transmitir una voluntad ya formada. Finalmente, debe ser expreso e incondicional, pues solo puede consistir en una declaración clara de la relación biológica, sin quedar sometido a condición o término. Aunque normalmente reconocerá el padre, también puede hacerlo la madre.

4.3. Sujeto activo: el progenitor

La validez del reconocimiento depende de la capacidad del progenitor que lo otorga. Si quien reconoce es menor no emancipado, se requiere aprobación judicial con audiencia del Ministerio Fiscal. En el caso de personas mayores de edad con medidas de apoyo, habrá que estar a lo que disponga la resolución judicial o la escritura pública que las haya establecido y, si nada se hubiera previsto y no existieran medidas voluntarias, deberá revisarse ese sistema de apoyo para completarlo a tal fin.

La legislación registral exige además, cuando el reconocimiento de la filiación no matrimonial se realiza mediante declaración del padre o progenitor no gestante ante el encargado del Registro Civil, el consentimiento expreso de la madre o persona trans gestante y, si el reconocido es menor, de su representante legal, o del propio reconocido si es mayor de edad.

También se alude a los reconocimientos de complacencia, en los que un varón reconoce a sabiendas a un menor que no es biológicamente suyo con la finalidad de formar una familia. Tales reconocimientos son válidos si cumplen los requisitos legales, pero suscitan el problema de su posible impugnación posterior por falta de verdad biológica.

4.4. Hijos susceptibles de reconocimiento

Tras la reforma de 1981, el reconocimiento puede recaer sobre cualquier hijo extramatrimonial, sin las antiguas restricciones derivadas de la clasificación entre hijos. Además, su carácter intemporal permite que se refiera tanto a hijos menores como a hijos de edad avanzada e incluso fallecidos, lo que justifica la existencia de reglas especiales según la situación del reconocido.

En el caso del hijo menor de edad, la eficacia del reconocimiento exige el consentimiento expreso de su representante legal o, en su defecto, aprobación judicial con audiencia del Ministerio Fiscal y del progenitor legalmente conocido. No obstante, ese consentimiento o aprobación no son necesarios cuando el reconocimiento se hace en testamento o dentro del plazo para practicar la inscripción del nacimiento. En tales casos, la inscripción puede ser suspendida a simple petición de la madre o progenitor gestante durante el año siguiente al nacimiento y, si el padre o progenitor no gestante solicita su confirmación, será precisa la aprobación judicial. Además, el reconocimiento posterior a la inscripción de nacimiento puede hacerse en cualquier tiempo conforme a las formas civiles aplicables.

Respecto del hijo mayor de edad, el reconocimiento no produce efectos sin su consentimiento expreso o tácito. La norma responde a la idea de que quien tiene plena capacidad debe poder aceptar o rechazar un reconocimiento tardío. En el caso de persona mayor de edad con discapacidad, ese consentimiento deberá prestarse con los apoyos que precise y conforme, en su caso, a las medidas de apoyo previamente establecidas.

En relación con el hijo incestuoso, si ya está determinada legalmente la filiación respecto de uno de los progenitores y el otro es hermano o consanguíneo en línea recta, la segunda filiación solo podrá determinarse previa autorización judicial, con audiencia del Ministerio Fiscal, cuando convenga al menor o incapaz. Al alcanzar la plena capacidad, el hijo podrá invalidar esa segunda determinación si no la hubiera consentido.

Si el hijo ya ha fallecido, el reconocimiento solo surtirá efecto si lo consienten sus descendientes por sí o por medio de sus representantes legales.

En cuanto al nasciturus, la posibilidad de reconocimiento requiere matices. El reconocimiento unilateral del progenitor masculino no resulta admisible, porque la identificación del concebido solo puede hacerse a través de la madre gestante y el Código impide que un reconocimiento separado manifieste la identidad del otro progenitor si esta no está ya legalmente determinada.

En cambio, no existe obstáculo para el reconocimiento conjunto de ambos progenitores, aunque su reflejo registral presenta dificultades al no existir todavía inscripción de nacimiento.

4.5. Las formas de reconocimiento

La filiación extramatrimonial puede determinarse por reconocimiento ante el encargado del Registro Civil, en testamento o en otro documento público. Estas formas responden a la solemnidad exigida por la trascendencia del acto y a la necesidad de evitar controversias posteriores sobre su existencia. La irrevocabilidad del reconocimiento queda confirmada incluso cuando se realiza en testamento, pues no pierde eficacia aunque este sea revocado o resulten ineficaces las demás disposiciones testamentarias.

La eficacia del reconocimiento ante el Registro Civil es la misma tanto si se efectúa dentro del plazo de inscripción del nacimiento como si se realiza después, ya que la ley permite hacerlo en cualquier tiempo con arreglo a las formas civiles aplicables. En todo caso, para que produzca efectos deben concurrir todas las condiciones de validez y eficacia establecidas por la legislación civil.

La exigencia de forma solemne no significa que otras manifestaciones no formales carezcan por completo de relevancia, sino que reciben un tratamiento distinto. El reconocimiento solemne determina por sí mismo la filiación extramatrimonial, mientras que otras manifestaciones realizadas en forma no prevista legalmente solo constituyen prueba valorable conforme a las reglas generales y pueden servir de base para una declaración judicial de filiación.

Frente a esta exigencia formal, la legislación registral introdujo un sistema más simple para la determinación de la filiación en los nacimientos producidos en establecimientos sanitarios, mediante la remisión electrónica al Registro Civil del formulario oficial cumplimentado y firmado por quienes deben comunicar el nacimiento, en el que constan la identidad de los declarantes, el nombre del nacido, el orden de los apellidos y la filiación paterna.

5. LOS RESTANTES MEDIOS DE DETERMINACIÓN DE LA FILIACIÓN EXTRAMATRIMONIAL

Además del reconocimiento, la filiación extramatrimonial puede quedar determinada por expediente tramitado conforme a la legislación del Registro Civil, por sentencia firme y, respecto de la madre o progenitor gestante, por la constancia de la filiación en la inscripción de nacimiento. Se trata, por tanto, de mecanismos distintos del reconocimiento en sentido estricto, aunque igualmente aptos para fijar legalmente la filiación extramatrimonial.

5.1. El llamado expediente gubernativo

La filiación extramatrimonial puede determinarse por resolución recaída en expediente tramitado con arreglo a la legislación del Registro Civil. Este expediente solo opera cuando no existe oposición del Ministerio Fiscal ni de parte interesada debidamente notificada. Su función es permitir la inscripción de la filiación cuando concurre un escrito indubitado del padre o de la madre en el que se reconozca expresamente la filiación, cuando el hijo se encuentre en posesión continua del estado de hijo justificada por actos del progenitor o de su familia, o cuando, respecto de la madre o persona trans gestante, quede suficientemente probado el parto y la identidad del hijo.

Si existe oposición, la inscripción ya no puede obtenerse por esta vía y habrá que acudir al procedimiento judicial correspondiente. Por ello, este expediente queda limitado a los supuestos en los que no exista verdadera controversia entre los interesados.

5.2. La determinación de la filiación extramatrimonial por sentencia firme

La filiación extramatrimonial puede también quedar determinada por sentencia firme, ya sea civil o penal, cuando esta ponga fin a un proceso cuyo objeto haya sido precisamente la determinación, reclamación o impugnación de la filiación. No obstante, el análisis detallado de este medio exige estudiar previamente las acciones de filiación, por lo que aquí solo se deja constancia de su existencia como vía legal de determinación.

5.3. La determinación de la maternidad extramatrimonial o de la filiación del progenitor gestante

La filiación extramatrimonial respecto de la madre o progenitor gestante queda determinada cuando su filiación consta en la inscripción de nacimiento practicada dentro de plazo conforme a la legislación registral. De las normas del Registro Civil se desprende que, salvo en supuestos excepcionales, en toda inscripción de nacimiento ocurrida en España debe hacerse constar necesariamente la filiación materna si en la declaración oficial figura el nombre de la madre, el parte médico identifica a la madre y existe coincidencia plena entre ambos documentos. En caso de discordancia, prevalece el parte facultativo, lo que obliga a comprobar debidamente la identidad de la madre.

Cumplidos esos requisitos, no cabe excluir la constancia registral de la filiación materna ni ocultar la identidad de la madre biológica por decisión de esta, aunque posteriormente pueda procederse, si corresponde, a la rectificación registral por resolución judicial o a la cesión para adopción. Sí se prevé, sin embargo, que el acceso al conocimiento de esa filiación pueda quedar restringido cuando la madre lo solicite por motivos fundados y renuncie a ejercer los derechos derivados de dicha filiación.

La regulación vigente refuerza así el conocimiento de los orígenes biológicos y el principio de igualdad entre los progenitores, al no admitir que la madre pueda sustraerse voluntariamente a la constancia de su filiación cuando esta ya ha quedado determinada legalmente.

Por su parte, la filiación del padre o de la madre no gestante puede hacerse constar en el momento de la inscripción del hijo cuando exista matrimonio con la madre gestante y resulten aplicables las presunciones legales, o, aun faltando estas y también cuando la madre esté casada con otra mujer, si concurre el consentimiento de ambos cónyuges, incluso en caso de separación legal o de hecho. También puede constar cuando el padre o la madre no gestante manifieste su conformidad, siempre que no se contradigan las presunciones legales y no exista controversia, además de cumplirse las condiciones exigidas por la legislación civil. Si se comprueba que la madre está unida por vínculo matrimonial con persona distinta de la que figura en la declaración o resulta aplicable la presunción legal de paternidad, la inscripción de nacimiento se practicará inicialmente solo con la filiación materna y se abrirá después un expediente registral para determinar la filiación paterna.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }
    
    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
