    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LA FAMILIA Y EL PARENTESCO

El parentesco es la relación existente entre dos o más personas por razón de su posición dentro de la familia. Puede referirse tanto al vínculo inmediato entre progenitores e hijos como proyectarse sobre relaciones familiares muy alejadas en el tiempo, siempre que pueda reconstruirse la conexión genealógica entre los descendientes y un tronco común.

La importancia jurídica y social del parentesco depende de su cercanía. Por eso, la relación paterno-filial constituye su manifestación más relevante y el ámbito que recibe una regulación más detallada en el Derecho de familia, ya que en ella se concentra el núcleo principal de derechos y deberes familiares y se refleja la idea histórica y social de familia en sentido estricto.

Aunque los grados más remotos de parentesco tienen menor relevancia que la relación entre padres e hijos, no carecen de interés. Incluso cuando el vínculo es muy lejano, la pertenencia a una misma estirpe familiar suele manifestarse en la conservación del apellido paterno como elemento identificador de los descendientes procedentes de un mismo tronco común.

2. MODALIDADES DE LA RELACIÓN PARENTAL

2.1. El parentesco por consanguinidad

En sentido estricto, el parentesco se identifica con la consanguinidad o comunidad de sangre entre personas que descienden unas de otras directamente o que comparten un antepasado común. Cuando unas personas descienden directamente de otras existe parentesco en línea recta, mientras que cuando la relación exige remontarse a un ascendiente común se trata de parentesco en línea colateral. Aunque la consanguinidad constituye la realidad familiar más importante para la familia y el Derecho de familia, no agota todas las formas de relación parental jurídicamente relevantes.

2.2. El parentesco adoptivo

En sentido amplio, el parentesco comprende también el derivado de la adopción. El ordenamiento atribuye a este parentesco un rango similar al de la consanguinidad, pues el vínculo entre adoptantes y adoptado no procede de la sangre, sino de la regulación jurídica que equipara la relación adoptiva a la consanguínea. En el Derecho vigente, esa equiparación es absoluta y total.

2.3. El parentesco por afinidad

El parentesco por afinidad es la relación existente entre uno de los cónyuges y los parientes por consanguinidad del otro. Aunque el Código Civil no lo regula de forma sistemática ni define expresamente su noción, el ordenamiento sigue reconociéndole relevancia, especialmente en normas que establecen prohibiciones o incompatibilidades. Esa relevancia aparece, entre otros casos, en materia de adopción, en la regulación de testigos testamentarios y en la prohibición de favorecer por testamento a determinados afines del notario o de los testigos, y también se proyecta en ámbitos administrativos, laborales, penales o procesales.

El sentido de estas previsiones es evitar que el vínculo familiar con los parientes de un cónyuge pueda beneficiar indebidamente al otro. Por ello, aunque parte de la doctrina haya minimizado su importancia por su origen histórico en el Derecho canónico y por la falta de mención expresa en algunos preceptos del Código Civil, el Derecho positivo sigue conociendo y reconociendo esta modalidad de parentesco.

La afinidad tiene un carácter estrictamente personal: vincula a cada cónyuge con los parientes consanguíneos o adoptivos del otro. De ahí que los afines de uno y otro no sean afines entre sí, por lo que no existe parentesco entre quienes coloquialmente se denominan consuegros o concuñados. Además, la afinidad no genera una relación parental continua e indefinida como la consanguinidad, ya que no se extiende automáticamente a nuevas relaciones surgidas tras cambios familiares posteriores.

En la actualidad, algunas normas equiparan el matrimonio y las uniones extramatrimoniales estables a efectos de afinidad, y cabe entender que la jurisprudencia seguiría el mismo criterio para impedir fraudes a las prohibiciones legales. En todo caso, la afinidad se refiere únicamente a la relación entre los parientes de uno de los miembros de la pareja y el otro miembro, de modo que técnicamente no existe parentesco entre los propios cónyuges ni entre quienes conviven extramatrimonialmente.

3. EL CÓMPUTO DEL PARENTESCO

La determinación de la proximidad del parentesco tiene gran importancia en Derecho civil, porque numerosas disposiciones del Código Civil y de la legislación complementaria exigen saber con precisión qué generaciones o grados atribuyen derechos o imponen obligaciones entre parientes.

Esta necesidad se manifiesta especialmente en materias como las prohibiciones matrimoniales, la obligación de alimentos y los derechos sucesorios. Aunque las reglas sobre el cómputo aparecen formuladas en el Código al regular la sucesión intestada, su alcance es general, pues rigen en todas las materias salvo que el legislador disponga expresamente otra solución.

3.1. Las líneas y los grados de parentesco

El lenguaje jurídico utiliza la noción de grado de parentesco para expresar la proximidad entre familiares. La proximidad se determina por el número de generaciones, de modo que cada generación constituye un grado. La sucesión de grados forma una línea, que puede ser recta o colateral. La línea recta existe entre personas que descienden unas de otras y puede ser considerada tanto en sentido ascendente como descendente. La línea colateral existe entre personas que no descienden unas de otras, pero proceden de un tronco común, como ocurre con hermanos, primos o tíos y sobrinos.

3.2. El cómputo de las líneas

En las líneas se cuentan tantos grados como generaciones o personas, excluyendo la del progenitor. Así, para determinar el parentesco entre nieto y abuelo se cuentan las generaciones intermedias partiendo del nieto, de modo que el padre representa el primer grado y el abuelo el segundo, por lo que ambos están unidos en segundo grado de línea recta. En la línea recta el cómputo se hace ascendiendo hasta el tronco, aunque en la práctica lo decisivo es no contar la persona desde la que parte el cálculo.

En la línea colateral el cómputo exige subir hasta el tronco común y después bajar hasta la persona respecto de la cual se realiza la comparación. Por ello, entre hermanos hay dos grados, entre una persona y su tío hay tres, y entre primos hermanos hay cuatro. El sistema puede representarse gráficamente marcando con cero a la persona desde la que se inicia el cómputo, ya que así se obtiene con mayor claridad el mismo resultado.

3.3. El cómputo en el parentesco por afinidad

El Código Civil no regula de forma sistemática la afinidad ni establece reglas específicas para su cómputo. Sin embargo, a partir del mandato general aplicable al cómputo del parentesco, se entiende que las reglas vistas deben adaptarse también al parentesco por afinidad. De este modo, la misma línea y el mismo grado de parentesco que unen a uno de los cónyuges con uno de sus parientes sirven para determinar directamente el grado de afinidad existente entre ese pariente y el otro cónyuge.

4. LA RELACIÓN PATERNO-FILIAL

La relación paterno-filial, también denominada filiación, es el vínculo directo e inmediato que une a padres e hijos y constituye una de las materias centrales del Derecho de familia. Su estudio general debe distinguirse de otras cuestiones específicas, como la determinación de la filiación, las acciones de filiación, la filiación derivada de técnicas de reproducción asistida, la adopción y la patria potestad. A efectos jurídicos, la filiación relevante es la legalmente determinada, lo que explica que pueda existir filiación biológica sin filiación legal y que el ordenamiento prevea mecanismos para determinarla. La filiación produce efectos desde que tiene lugar y su determinación legal puede desplegar eficacia retroactiva cuando ello sea compatible con la naturaleza de esos efectos y la ley no disponga lo contrario.

La intervención necesaria de padre y madre en la concepción y gestación permite distinguir entre paternidad y maternidad. Aunque normalmente ambas se determinan de forma conjunta, en ciertos supuestos resulta necesario tratarlas por separado. Pese a que el sistema atiende a la filiación legal, en algún caso concreto se ha valorado la realidad efectiva del ejercicio de las funciones parentales, reconociendo consecuencias jurídicas a quien actuó realmente como progenitor y negándolas a quien se desentendió por completo de sus deberes.

4.1. Consideraciones generales sobre la filiación: apunte histórico

La tradición histórica y la codificación civil de inspiración napoleónica establecieron una separación rígida entre filiación legítima e ilegítima y, con carácter general, prohibieron la investigación de la paternidad. La filiación legítima, nacida dentro del matrimonio, atribuía a los hijos la plenitud de derechos, mientras que los nacidos fuera de él quedaban comprendidos en la categoría de hijos ilegítimos. Dentro de esta última se diferenciaba entre filiación natural, cuando los progenitores podían haberse casado entre sí, y filiación ilegítima en sentido estricto, cuando existía impedimento para contraer matrimonio. A ello se sumaban categorías históricas como los hijos adulterinos, incestuosos y sacrílegos, que reflejaban una discriminación especialmente grave hacia quienes no eran responsables de las circunstancias de su nacimiento.

Ese sistema fue objeto de críticas desde el siglo XIX, porque hacía recaer sobre los hijos las consecuencias de conductas ajenas con el fin de proteger el matrimonio. En España, la Constitución de 1931 proclamó que los padres tenían los mismos deberes respecto de los hijos nacidos fuera y dentro del matrimonio y dispuso que las leyes civiles regularan la investigación de la paternidad. Sin embargo, las circunstancias políticas e históricas impidieron desarrollar plenamente ese principio.

4.2. La Constitución de 1978 y el principio de igualdad entre los hijos

La Constitución de 1978 consagra la igualdad ante la ley y prohíbe la discriminación por razón de nacimiento, lo que resulta incompatible con el régimen tradicional de diferenciación entre hijos.

Además, establece la protección integral de los hijos y afirma expresamente su igualdad con independencia de la filiación, al tiempo que impone a la ley la posibilidad de investigar la paternidad. De este modo, la igualdad entre los hijos se convierte en principio constitucional y se traduce en la exigencia de que sus derechos y deberes frente a los progenitores sean idénticos hayan nacido o no dentro del matrimonio. La admisión de la investigación de la filiación facilita, además, el reconocimiento de los derechos de quienes nacen fuera del matrimonio. En coherencia con ello, el Código Civil dispone que la filiación matrimonial, la no matrimonial y la adoptiva producen los mismos efectos.

4.3. Las clases de filiación en la actualidad

Tras la Constitución, la doctrina civilista destacó la necesidad de abandonar definitivamente las categorías de filiación legítima e ilegítima y sustituirlas por las de filiación matrimonial y extramatrimonial. Ese cambio se llevó al plano legislativo mediante la Ley 11/1981, que reformó el Código Civil para adaptar su regulación al principio de igualdad. En la actualidad, el Código establece que la filiación puede tener lugar por naturaleza o por adopción, que la filiación por naturaleza puede ser matrimonial o no matrimonial, y que es matrimonial cuando los progenitores están casados entre sí. Al mismo tiempo, reafirma que la filiación matrimonial, la no matrimonial y la adoptiva producen los mismos efectos conforme al propio Código.

5. CONTENIDO BÁSICO DE LA RELACIÓN PATERNO-FILIAL

El contenido básico de la relación paterno-filial consiste, ante todo, en un conjunto de deberes de los progenitores respecto de sus hijos. La Constitución lo expresa mediante la idea de asistencia de todo orden, que deben prestar a los hijos habidos dentro o fuera del matrimonio durante la minoría de edad y en los demás casos legalmente previstos. Esta formulación subraya que la filiación genera fundamentalmente obligaciones para los padres, pues ambos progenitores, aunque no ostenten la patria potestad, están obligados a velar por los hijos menores y a prestarles alimentos.

La expresión constitucional asistencia de todo orden responde a la idea de recoger de forma amplia y adecuada el conjunto de deberes derivados de la filiación, evitando una enumeración detallada en el propio texto constitucional y remitiendo su concreción a la legislación ordinaria. Ya en el debate constituyente se partía de que la relación paterno-filial comporta esencialmente deberes de los progenitores por el mero hecho de serlo y respecto de todos los hijos sin distinción.

Debe diferenciarse el contenido de la relación paterno-filial del régimen de la patria potestad.

Aunque ambos ámbitos se relacionan estrechamente y en parte coinciden, no son idénticos, ya que la filiación por sí sola genera obligaciones para los progenitores con independencia de que ostenten o no la patria potestad. Por ello, algunos efectos de la filiación coinciden con las reglas de la patria potestad, mientras que otros derivan directamente de normas imperativas vinculadas a la determinación de la filiación.

Esta eficacia propia de la filiación se manifiesta incluso cuando la guarda del menor es asumida por la entidad pública correspondiente, pues también en ese caso puede imponerse a los progenitores la obligación de contribuir, según sus posibilidades, a los gastos de cuidado y atención del menor y a los derivados de la responsabilidad civil imputable a este por sus actos.

6. LOS EFECTOS DE LA FILIACIÓN: LOS APELLIDOS

Entre los efectos de la filiación destacan los apellidos, la asistencia y alimentos y los derechos sucesorios. En relación con los alimentos, ambos progenitores están obligados a velar por los hijos menores y a prestarles alimentos aunque no ostenten la patria potestad. En cuanto a los apellidos, su regulación se contiene en la legislación del Registro Civil y en su Reglamento, y el sistema español se caracteriza por atribuir a la persona dos apellidos, uno paterno y otro materno, lo que distingue este modelo de otros ordenamientos en los que el apellido materno pierde relevancia desde la primera generación.

La legislación admite que, al alcanzar la mayoría de edad, el hijo pueda alterar el orden de sus apellidos. Esta posibilidad ha suscitado valoraciones distintas, pero responde al reconocimiento de que en la práctica social muchas personas son identificadas preferentemente por el apellido materno cuando el paterno resulta muy común y escasamente individualizador. Actualmente, la filiación determina los apellidos con arreglo a la ley y, si está determinada por ambas líneas, los progenitores pueden acordar antes de la inscripción registral el orden de transmisión de su respectivo primer apellido. El orden fijado para el hijo mayor rige también para los posteriores hermanos del mismo vínculo.

Los apellidos de las personas de nacionalidad española son siempre dos y han de estar formados por el primer apellido de cada progenitor, sin que quepa elegir otros distintos. No obstante, existen supuestos en los que no puede imponerse un cambio de orden si ello perjudica el interés del menor, especialmente cuando este ha venido siendo conocido e identificado de forma estable con el apellido materno como primero. La jurisprudencia ha reiterado esta idea en casos de reclamación tardía de la paternidad, dando prevalencia al interés del menor en conservar el apellido con el que ha sido inscrito e identificado socialmente.

Además del cambio de orden, existe una regulación específica para modificar el propio apellido cuando sea contrario al decoro, ocasione graves inconvenientes, se pretenda evitar la desaparición de un apellido español, se quiera hacer constar el apellido usual o concurran supuestos de adopción. En algunos casos basta la declaración de voluntad del interesado y en otros es preciso un expediente previo. En materia de violencia de género, el encargado del Registro puede autorizar el cambio de apellidos sin necesidad de cumplir los requisitos ordinarios e incluso, por razones de urgencia o seguridad, un cambio total de identidad. Ese cambio puede extenderse a quienes estén sujetos a la patria potestad del afectado y a los demás descendientes que lo consientan expresamente. Cuando la filiación sea desconocida, el encargado del Registro impondrá un nombre y apellidos de uso corriente.

Cuando la filiación está determinada por ambas líneas, los progenitores deben acordar el orden de transmisión de sus primeros apellidos antes de la inscripción. Si no hay acuerdo, el encargado del Registro Civil les requerirá para que lo comuniquen en un breve plazo y, si persiste la falta de acuerdo, decidirá atendiendo al interés superior del menor. En los casos en que solo exista una filiación reconocida, esa única filiación determina los apellidos y el progenitor puede fijar su orden, ya sea manteniendo el suyo propio o alterándolo.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function textoPorId(id){

      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;

    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
