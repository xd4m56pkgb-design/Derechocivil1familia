    ========================================================= */
const PDF_TEXTO = `
1. LAS RELACIONES CONYUGALES

1.1. Las relaciones personales y patrimoniales

La unión matrimonial es una de las relaciones interpersonales más intensas de la experiencia humana y genera múltiples derechos y deberes entre los cónyuges.

Los Códigos Civiles solo pueden regular los aspectos más generales de esta convivencia, ya que la vida matrimonial presenta innumerables situaciones que escapan a una regulación detallada.

En situaciones de armonía, las normas pueden parecer irrelevantes; sin embargo, el legislador debe prever los supuestos de conflicto grave, estableciendo reglas que permitan resolver desacuerdos que trascienden el ámbito íntimo y pueden desembocar en intervención judicial o crisis matrimonial.

La regulación de las relaciones entre cónyuges comprende tanto los aspectos personales de la convivencia como las cuestiones patrimoniales que surgen en cualquier matrimonio.

Por ello, doctrinalmente se habla de “efectos personales” y “efectos patrimoniales” del matrimonio, como categorías clásicas y generalmente aceptadas.

1.2. El principio de igualdad conyugal

Tradicionalmente, los conflictos conyugales se resolvían conforme al principio patriarcal o de autoridad marital, de modo que prevalecía la opinión del marido en caso de desacuerdo.

Este sistema constituye hoy una referencia histórica superada, ya que el ordenamiento vigente establece el principio constitucional de igualdad entre los cónyuges (art. 32 CE).

La Ley 30/1981 incorporó este principio al Código Civil, estableciendo en el art. 66 que “el marido y la mujer son iguales en derechos y deberes”.

Posteriormente, la Ley 13/2005, al admitir el matrimonio entre personas del mismo sexo, adaptó la redacción del precepto, que actualmente dispone: “Los cónyuges son iguales en derechos y deberes”, manteniendo intacto el contenido material del principio.

2. LOS DEBERES CONYUGALES

Los deberes conyugales tienen escasa relevancia en situaciones de normalidad matrimonial, asentadas en el afecto y en la voluntad de convivencia. Sin embargo, su verdadero alcance se manifiesta en los supuestos de incumplimiento.

Aunque su infracción no genera el aparato coactivo propio de las obligaciones en sentido técnico (arts. 1088 y ss. CC), sí produce consecuencias jurídicas, como puede ser la desheredación conforme al art. 855 CC.

Los deberes conyugales no pueden entenderse como obligaciones patrimoniales típicas, ya que el componente puramente patrimonial está ausente del matrimonio, incluso en sus llamados efectos patrimoniales.

Tampoco responden al esquema clásico acreedor-deudor, pues los derechos y deberes matrimoniales son recíprocos y mutuos, vinculando a ambos cónyuges (arts. 67 y 68 CC).

2.1. La atención del interés familiar

El art. 67 CC establece que los cónyuges deben actuar en interés de la familia.

El concepto resulta difícil de concretar, ya que la familia no es un ente autónomo portador de intereses propios. Tradicionalmente puede identificarse con la familia nuclear (cónyuges e hijos), aunque la reforma del art. 68 por la Ley 15/2005 amplía la perspectiva.

Actualmente, los cónyuges están obligados a: • Vivir juntos. • Guardarse fidelidad. • Socorrerse mutuamente. • Compartir responsabilidades domésticas. • Atender a ascendientes, descendientes y personas dependientes a su cargo.

El interés familiar funciona como criterio valorativo para el juez en caso de conflicto, permitiéndole ponderar objetivamente las circunstancias y, en la práctica, proteger a los miembros más desamparados o necesitados.

La reforma evidencia que la noción de familia supera la estrictamente nuclear, incluyendo la atención a personas dependientes.

2.2. El respeto debido al otro cónyuge

El art. 67 CC consagra el deber de respeto mutuo.

Este deber implica: • No interferir en decisiones personales pertenecientes a la esfera íntima. • Tratar al cónyuge con deferencia y consideración. • Excluir conductas injuriosas, vejatorias o dañinas física o moralmente.

El respeto incluye el rechazo de la infidelidad, aunque esta tenga consideración normativa autónoma por su tradicional relevancia social.

Las conductas injuriosas o vejatorias fueron anteriormente causa de separación legal (art. 82.1.a CC, hoy sin contenido tras la Ley 15/2005).

Respecto al llamado débito conyugal, la jurisprudencia ha afirmado que no existe derecho a exigir prestación sexual. El matrimonio no otorga derecho alguno sobre la sexualidad del otro cónyuge, y la imposición mediante fuerza o intimidación constituye delito.

2.3. La ayuda y socorro mutuos

Tras la Ley 30/1981, el art. 67 CC recoge la ayuda mutua y el art. 68 CC el socorro mutuo.

La doctrina es prácticamente unánime en señalar que existe una reiteración innecesaria, pues ambos términos son sustancialmente sinónimos. Aunque algunos autores han intentado diferenciar ambos conceptos —atribuyendo al socorro un carácter económico y a la ayuda un alcance más amplio— resulta difícil sostener tal distinción desde el significado ordinario del lenguaje.

En consecuencia, el deber de ayuda y socorro mutuos debe entenderse referido a la atención de cualesquiera necesidades del otro cónyuge, incluyendo de forma particular la obligación alimenticia entre cónyuges.

Las reformas posteriores (Ley 13/2005 y Ley 15/2005) modificaron la terminología y añadieron la corresponsabilidad doméstica, pero no corrigieron la reiteración técnica previamente criticada por la doctrina.

2.4. El deber de convivencia

La convivencia constituye el designio fundamental del matrimonio. Salvo supuestos excepcionales de matrimonios de complacencia (nulos por falta de consentimiento real), el matrimonio se celebra para compartir vida en común.

El art. 68 CC establece que los cónyuges están obligados a vivir juntos. Además, el art. 69 CC presume, salvo prueba en contrario, que los cónyuges viven juntos, configurando la convivencia como situación normal del matrimonio.

El cese efectivo de la convivencia supone la infracción de un deber y suele revelar una crisis matrimonial.

No obstante, la obligación de vivir juntos admite modulaciones razonables derivadas de circunstancias laborales, profesionales o familiares, sin exigir necesariamente residencia en el mismo municipio o domicilio permanente común.

En relación con el llamado débito conyugal, la jurisprudencia europea ha declarado que la obligación marital no puede interpretarse como imposición de relaciones sexuales. El consentimiento matrimonial no implica consentimiento permanente a futuras relaciones, pues ello sería incompatible con el derecho a la libertad sexual y a la autonomía corporal.

2.5. La fidelidad conyugal

El art. 68 CC establece expresamente que los cónyuges están obligados a guardarse fidelidad. La fidelidad se refiere a la exclusividad de las relaciones sexuales entre los cónyuges, vinculada históricamente a la erradicación del adulterio y a la lealtad matrimonial.

En el pasado, la infidelidad fue causa legal de separación (art. 82.1.a CC) y, hasta 1978, el adulterio constituyó incluso delito. Con la reforma de 2005 desaparece el sistema causalista de separación, de modo que la infidelidad deja de tener consecuencias automáticas en el ámbito de la crisis matrimonial.

Actualmente, la fidelidad se configura como un parámetro de normalidad matrimonial, sin sanción económica específica. La jurisprudencia ha reiterado que el incumplimiento del deber de fidelidad no genera automáticamente indemnización ni pensión compensatoria.

No obstante, pueden plantearse acciones por vulneración del honor cuando se difunden imputaciones falsas de infidelidad. La información no veraz puede dañar tanto al cónyuge al que se atribuye como al que supuestamente la soporta.

En definitiva, la fidelidad tiene relevancia ética y social, pero su infracción no activa un régimen indemnizatorio automático.

2.6. La corresponsabilidad doméstica

La Ley 15/2005 añadió al art. 68 CC el deber de compartir las responsabilidades domésticas y el cuidado de ascendientes, descendientes y otras personas dependientes a cargo.

Se introduce así el principio de corresponsabilidad doméstica, que amplía el ámbito tradicional del matrimonio más allá de la pareja nuclear, incorporando el cuidado de familiares dependientes.

El precepto convierte en norma jurídica una exigencia de reparto equitativo de tareas domésticas y de cuidados. Sin embargo, su aplicación práctica presenta dificultades, pues cada matrimonio constituye una realidad concreta y diversa.

La corresponsabilidad doméstica puede generar tensiones cuando existe desacuerdo sobre su alcance, especialmente en el contexto del actual sistema de divorcio sin necesidad de causa.

En todo caso, el precepto refleja una opción legislativa clara por la igualdad material dentro del matrimonio, aunque su eficacia depende en gran medida de la dinámica interna de cada pareja.

3. OTRAS CUESTIONES

3.1. Domicilio conyugal

El domicilio conyugal es la vivienda que constituye el hogar común del matrimonio. El art. 70 CC establece que los cónyuges fijarán de común acuerdo el domicilio conyugal y, en caso de discrepancia, resolverá el juez atendiendo al interés de la familia.

La regla del acuerdo refleja el principio de igualdad conyugal, superando la antigua autoridad marital que obligaba a la mujer a seguir la residencia del marido. La intervención judicial solo procede cuando existe desacuerdo grave, lo que normalmente revela una crisis matrimonial.

El domicilio conyugal tiene relevancia procesal, pues sirve como criterio para determinar la competencia territorial en procesos matrimoniales (art. 769.1 LEC). Tras la LO 1/2025, la competencia se atribuye progresivamente a los Tribunales de Instancia, transformándose los juzgados de familia en secciones especializadas.

En síntesis, el domicilio conyugal es una decisión compartida basada en la igualdad, con posible intervención judicial en caso de conflicto y relevancia práctica en materia procesal.

3.2. Honores

El Código Civil originario reconocía que la mujer gozaba de los honores del marido. La reforma de 1975 extendió la previsión a ambos cónyuges, pero la Ley 30/1981 suprimió definitivamente esta regulación.

Se considera que la transmisión de honores (títulos nobiliarios o dignidades) tiene hoy más relevancia social que jurídica. La Ley 33/2006 reforzó el principio de igualdad en la sucesión de títulos nobiliarios, eliminando la preferencia masculina.

Actualmente, el matrimonio no implica automáticamente la transmisión jurídica de honores; la cuestión queda en el ámbito simbólico y representativo.

3.3. Nacionalidad y vecindad

Históricamente, la mujer adquiría la nacionalidad y la vecindad del marido. Esta situación fue superada por la Ley 14/1975, que estableció que el matrimonio por sí solo no modifica la nacionalidad de los cónyuges ni condiciona su adquisición, pérdida o recuperación.

Aunque el Código vigente no lo formule expresamente en los mismos términos, el principio se deduce del sistema actual basado en la igualdad.

En cuanto a la vecindad civil, la reforma de 1990 eliminó la atribución automática de la vecindad del marido a la mujer (art. 14.4 CC).

En consecuencia, el matrimonio no altera ni la nacionalidad ni la vecindad civil de los cónyuges, en coherencia con el principio constitucional de igualdad.

4. LA CAPACIDAD PATRIMONIAL DE LOS CÓNYUGES

La reforma operada por la Ley 11/1981 tuvo como finalidad adaptar la regulación patrimonial del matrimonio al principio constitucional de igualdad conyugal.

Los arts. 1315 y siguientes del Código Civil se inspiran en ese principio, eliminando la preeminencia tradicional del marido y configurando un sistema basado en la igualdad en la administración y disposición de los bienes familiares.

En el ámbito patrimonial, la igualdad se manifiesta en que ninguno de los cónyuges tiene facultades exclusivas sobre los bienes comunes ni puede representar al otro sin su autorización.

Ambos cónyuges pueden realizar actos de administración y disposición relativos a las necesidades ordinarias de la familia (art. 1319.1), lo que implica la llamada potestad doméstica.

Esta facultad comporta que los bienes comunes queden afectos frente a terceros por los actos realizados por cualquiera de ellos (art. 1319.2).

Asimismo, ambos cónyuges están obligados a contribuir al levantamiento de las cargas del matrimonio (art. 1318), pudiendo el juez adoptar medidas cautelares si uno incumple este deber.

Finalmente, el art. 1320 exige el consentimiento de ambos cónyuges para disponer de los derechos sobre la vivienda habitual y los muebles de uso ordinario, incluso cuando pertenezcan a uno solo, garantizando así la protección del domicilio familiar.

5. LA CONTRATACIÓN ENTRE CÓNYUGES.

5.1. En general.

En su redacción originaria, el Código Civil, siguiendo una tradición histórica consolidada, prohibía determinados contratos onerosos entre los cónyuges, además de las donaciones. Entre ellos destacaba la compraventa, pues el antiguo art. 1458 establecía que el marido y la mujer no podían venderse bienes recíprocamente salvo que existiera separación de bienes, con el fin de evitar desplazamientos patrimoniales fraudulentos. Por analogía, se entendía igualmente prohibida la dación en pago, la permuta o la transacción, e incluso se sostuvo que la mujer no podía adquirir por compra al marido aunque este actuara como mandatario de un tercero.

La Ley 11/1981 supuso un giro radical al adoptar un criterio permisivo. El nuevo art. 1458 pasó a permitir la compraventa entre cónyuges y el art. 1323 reconoció expresamente que podían transmitirse bienes y derechos por cualquier título y celebrar toda clase de contratos. Desde entonces, el principio general es la plena admisibilidad de la contratación entre cónyuges.

Posteriormente, la Ley 13/2005 sustituyó las referencias a “marido y mujer” por “cónyuges”, manteniendo intacto el contenido material del precepto.

5.2. Las donaciones entre cónyuges.

La redacción originaria del Código Civil, en línea con la tradición romanista y las Partidas, establecía la prohibición absoluta de las donaciones entre cónyuges, salvo los regalos módicos realizados en ocasiones familiares. La finalidad de esta prohibición era evitar la influencia indebida de un cónyuge sobre el otro y los posibles desplazamientos patrimoniales derivados de situaciones de supremacía marital, en un contexto histórico de desigualdad jurídica entre los esposos.

Con la consagración del principio de igualdad conyugal, esta justificación perdió fundamento. Al reconocerse a ambos cónyuges igual capacidad de obrar en la administración y disposición de los bienes, la reforma de 1981 permitió expresamente las donaciones y cualquier otro contrato entre ellos, conforme al art. 1323. De este modo, la decisión de realizar actos de liberalidad entre cónyuges queda sometida a su autonomía y voluntad, en coherencia con el principio constitucional de igualdad.
`.trim();

    function escapeHtml(s){

        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}

    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }


    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }

    /* =========================
       PDF -> epígrafes
    ========================= */
    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
