1. LAS DONACIONES POR RAZÓN DE MATRIMONIO

1.1. Introducción

En la mayoría de las sociedades es habitual facilitar y celebrar el matrimonio mediante la entrega de regalos a los futuros cónyuges por parte de familiares, amigos o entre los propios esposos.

Estas prácticas, como la pedida o las listas de boda, siguen vigentes, aunque hoy es menos frecuente que tales donaciones consistan en bienes de gran valor como inmuebles.

Jurídicamente, todas las donaciones realizadas con ocasión del matrimonio se califican como donaciones por razón de matrimonio, con independencia de su valor. Aunque históricamente estas donaciones tuvieron un amplio desarrollo y diversas modalidades, el análisis actual debe centrarse en su regulación conforme al Código Civil.

1.2. La sistematización del Código Civil

El Código Civil, en su redacción originaria, reguló las donaciones por razón de matrimonio en el capítulo siguiente al de las capitulaciones matrimoniales, integrando en él las donaciones esponsalicias y antenupciales, junto con la prohibición de las donaciones realizadas tras la celebración del matrimonio. La doctrina valoró positivamente la unificación de las distintas modalidades, al considerar excesiva su diferenciación histórica, pero criticó la inclusión conjunta de la prohibición de donaciones entre cónyuges durante el matrimonio por su falta de conexión con las donaciones antenupciales. Esta crítica fue asumida por el legislador en la Ley 11/1981, que separó claramente las donaciones antenupciales de las postnupciales. La regulación vigente se basa en dicha reforma, posteriormente ajustada de forma puntual, sin que las leyes posteriores hayan modificado sustancialmente esta materia.

2. CONCEPTO

El art. 1336 define las donaciones por razón de matrimonio como aquellas que cualquier persona realiza antes de su celebración, en consideración al mismo y en favor de uno o de los dos esposos, estableciendo así sus presupuestos esenciales. En primer lugar, deben efectuarse necesariamente con carácter antenupcial, lo que constituye una característica propia de la institución. Además, han de realizarse en contemplación de un matrimonio futuro o anunciado, cuya efectiva celebración condiciona su eficacia.

El donatario puede ser uno solo de los esposos o ambos conjuntamente. En este último caso, el art. 1339 dispone que los bienes donados pertenecen a ambos en proindiviso ordinario y por partes iguales, salvo disposición en contrario del donante, como concreción de las reglas generales de la copropiedad. La posibilidad de que uno solo de los esposos sea donatario se relaciona con la previsión de que la donación pueda hacerla cualquier persona, lo que incluye a uno de los propios esposos en favor del otro.

La delimitación de este concepto resulta relevante porque el legislador ha otorgado a estas donaciones un régimen más favorable que el de las donaciones ordinarias, flexibilizando ciertos aspectos de su regulación. Así, el art. 1337 establece que se rigen prioritariamente por sus normas específicas y, de forma supletoria, por las reglas generales de las donaciones. De este modo, resulta necesario identificar su régimen jurídico propio, especialmente en aquellos aspectos en que se aparta de las reglas comunes previstas en los arts. 618 y siguientes del Código Civil.

3. RÉGIMEN JURÍDICO

3.1. Las reglas relativas a la capacidad

El art. 1338 establece una regla especial para el menor no emancipado que pudiera contraer matrimonio, permitiéndole realizar donaciones por razón de matrimonio con autorización de sus padres o tutor, lo que evidencia el trato favorable de esta institución. No obstante, esta previsión resulta hoy inaplicable al no existir supuestos de menores no emancipados con capacidad legal para casarse. Cuando el donante es un tercero, se aplican las reglas generales de capacidad, exigiéndose capacidad contractual y libre disposición de los bienes. También rigen las normas generales para la aceptación, bastando la capacidad natural de entender y querer, salvo en donaciones condicionales u onerosas.

3.2. La aceptación de las donaciones por razón de matrimonio

Tras la reforma de 1981 desaparece la regla que permitía la validez de estas donaciones sin aceptación, por lo que actualmente se aplican las normas generales. En consecuencia, la aceptación del donatario es necesaria en todo caso, sin que exista particularidad alguna respecto del régimen común.

3.3. La forma

Las donaciones por razón de matrimonio se someten igualmente a las reglas generales en materia de forma, según se trate de bienes muebles o inmuebles. En el caso de bienes inmuebles, es necesaria la escritura pública, si bien no es obligatorio que esta se integre en las capitulaciones matrimoniales, pudiendo formalizarse en escritura independiente. Por ello, estas donaciones pueden constar en capitulaciones, pero no tienen que formar parte de ellas necesariamente.

3.4. La obligación de saneamiento

El art. 1340 establece una especialidad en materia de saneamiento, limitando la obligación del donante a los supuestos en que haya actuado con mala fe, tanto por evicción como por vicios ocultos.

4. DONACIÓN DE BIENES PRESENTES Y DE BIENES FUTUROS

La regla general, aplicable tanto a las donaciones ordinarias como a las realizadas por razón de matrimonio, exige que los bienes donados sean presentes y formen parte del patrimonio del donante, conforme al principio de que no pueden donarse bienes futuros. Esta exigencia es reiterada expresamente en el ámbito de las donaciones por razón de matrimonio, al establecerse que los futuros esposos pueden donarse bienes presentes.

No obstante, se admite una excepción en relación con los bienes futuros, permitiéndose su donación antes del matrimonio en capitulaciones matrimoniales, pero únicamente para el caso de muerte y dentro de los límites propios de la sucesión testada. Esta posibilidad no altera la regla general, sino que introduce un supuesto específico sujeto a condiciones estrictas.

La denominada donación de bienes futuros presenta importantes limitaciones, ya que solo puede ser realizada por los propios contrayentes, debe formalizarse necesariamente en capitulaciones matrimoniales anteriores al matrimonio y su eficacia queda restringida al supuesto de fallecimiento de uno de los cónyuges. Estas características evidencian que no se trata de una verdadera donación en sentido estricto, sino de un pacto sucesorio entre los esposos integrado en el contenido de las capitulaciones matrimoniales.

5. LA FALTA DE CELEBRACIÓN DEL MATRIMONIO: INEFICACIA DE LAS DONACIONES POR

RAZÓN DE MATRIMONIO La validez y eficacia de las donaciones por razón de matrimonio dependen de la efectiva celebración del matrimonio proyectado, de modo que, si este no llega a celebrarse, dichas donaciones pierden su fundamento y sentido. Esta dependencia ha sido interpretada doctrinalmente de diversas formas, considerándose tradicionalmente como donaciones sometidas a condición suspensiva, aunque también se ha defendido que la falta de matrimonio actúa como condición resolutoria o que la celebración del matrimonio constituye una verdadera condicio iuris como presupuesto de validez.

En su redacción originaria, el Código Civil configuró la falta de celebración del matrimonio como causa de revocación, opción criticada por su inadecuación técnica, ya que la revocación presupone un acto previamente válido, lo que no ocurre en este caso hasta que se celebra el matrimonio. La reforma introducida por la Ley 11/1981 modificó este planteamiento, estableciendo que las donaciones quedarán sin efecto si el matrimonio no se contrae en el plazo de un año.

En consecuencia, la falta de celebración del matrimonio determina la ineficacia de las donaciones por razón de matrimonio, entendida como una ineficacia sobrevenida derivada del incumplimiento de la condicio iuris. Esta ineficacia no opera automáticamente, sino que requiere la reclamación del donante, y el plazo de un año desde la consumación de la donación se configura como un plazo de caducidad.

6. LA REVOCACIÓN DE LAS DONACIONES POR RAZÓN DE MATRIMONIO

El art. 1343 establece que las donaciones por razón de matrimonio son revocables por las causas comunes, con exclusión de la superveniencia o supervivencia de hijos. En consecuencia, pueden revocarse por incumplimiento de cargas o por ingratitud del donatario conforme a las reglas generales, siendo lógica la exclusión de los hijos dada la posible condición de donantes de los propios esposos. El precepto distingue además según que la donación haya sido realizada por los contrayentes o por terceros.

6.1. Las donaciones realizadas por los esposos

En las donaciones otorgadas entre los contrayentes, se amplían las causas de revocación. Se considera incumplimiento de cargas la nulidad del matrimonio cuando el donatario haya actuado de mala fe, y se equipara a la ingratitud tanto la concurrencia de causas de desheredación como la imputabilidad al donatario de la separación o el divorcio. De este modo, la responsabilidad del cónyuge donatario en la crisis matrimonial puede justificar la revocación, aunque esta previsión resulta difícil de encajar en el sistema vigente tras la reforma de 2005, que eliminó el carácter causal de la separación y el divorcio.

6.2. Las donaciones hechas por terceros

En las donaciones realizadas por terceros, el art. 1343 se centra en el incumplimiento de cargas, considerando como tal, además de las específicas, la anulación del matrimonio y la separación o divorcio imputables al cónyuge donatario. Esta regulación presenta dificultades en el sistema actual, al no poder atribuirse la responsabilidad de la ruptura matrimonial tras la reforma de 2005.

No obstante, también resultan aplicables las causas generales de revocación por ingratitud, lo que permite la revocación si el donatario comete delitos contra el donante, le imputa delitos o le niega alimentos, incluso cuando el donante sea un tercero como un familiar, siendo en este ámbito la separación o el divorcio imputables al donatario considerados como incumplimiento de cargas y no como ingratitud.

7. REFERENCIA A LAS DONACIONES INTERCONYUGALES CONSTANTE MATRIMONIO

La referencia a la imputabilidad de la crisis matrimonial al donatario resulta hoy problemática, ya que, tras la desaparición del sistema causal de separación y divorcio, carece de sentido jurídico hablar de cónyuge responsable o de circunstancias imputables a uno de ellos. Ello pone de manifiesto la persistencia de esquemas normativos superados en la regulación vigente.

En su redacción originaria, el Código Civil establecía la prohibición general de las donaciones entre cónyuges, salvo en el caso de regalos módicos en ocasiones familiares, siguiendo una tradición romanista. Esta prohibición se justificaba en la necesidad de evitar posibles abusos o influencias de un cónyuge sobre el otro, especialmente en un contexto de desigualdad jurídica en el que el marido concentraba las facultades de administración y disposición.

Sin embargo, la consagración del principio de igualdad entre los cónyuges vació de fundamento esta prohibición, al reconocer a ambos la misma capacidad de actuación patrimonial. En coherencia con ello, la Ley 11/1981 adoptó un criterio permisivo, permitiendo a los cónyuges transmitirse bienes y celebrar entre sí toda clase de contratos, lo que implica la plena licitud de las donaciones entre ellos. Esta regulación se mantiene tras la reforma de 2005, que adapta la terminología a una formulación neutra.

Por último, la jurisprudencia reciente ha precisado que determinadas operaciones entre cónyuges no constituyen donaciones, como ocurre cuando se aportan bienes privativos a la sociedad de gananciales, supuesto en el que el beneficiario no es el otro cónyuge, sino la propia sociedad conyugal.
`.trim();

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){

    function textoPorId(id){

      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;

    function normalizeKey(s){

    /* =========================

    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
</html>
