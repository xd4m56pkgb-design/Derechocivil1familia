    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. LA SEPARACIÓN MATRIMONIAL.

La separación matrimonial, a diferencia de la nulidad y del divorcio, no extingue el vínculo entre los cónyuges, sino que produce únicamente la suspensión de la vida en común, conforme al art. 83 CC. Se mantiene, por tanto, la existencia del matrimonio, aunque cesa la convivencia.

En el sistema normativo español, la separación puede producirse mediante sentencia judicial, decreto o escritura pública con convenio regulador. Sin embargo, desde la reforma de 1981 se reconoce también una notable relevancia jurídica a la separación de hecho, realidad social ampliamente extendida antes y después de la Ley 30/1981. Esta opción responde a diversas razones: preservar la intimidad de la crisis matrimonial, evitar la publicidad del proceso judicial, facilitar soluciones rápidas y menos costosas, y, bajo el antiguo sistema causalista, permitir que la falta de convivencia cumpliera una función cercana a la separación judicial de cara al eventual divorcio.

La separación, tanto legal como de hecho, suele configurarse como una situación transitoria, orientada bien a la posible reconciliación, bien al posterior divorcio —opción estadísticamente más frecuente—, especialmente cuando uno de los cónyuges desea contraer nuevo matrimonio.

No obstante, en determinados casos puede prolongarse durante largos períodos, incluso durante toda la vida de uno de los cónyuges, reflejando la creciente importancia de las situaciones fácticas en las relaciones familiares.

En consecuencia, el estudio de la separación exige diferenciar entre la separación judicial y la separación de hecho, atendiendo a su distinto fundamento y efectos dentro del sistema matrimonial.

2. LA SEPARACIÓN JUDICIAL EN EL DERECHO VIGENTE: LA LEY 15/2005.

La denominada separación legal encontraba tradicionalmente su fundamento en las causas previstas en el Código Civil, pues la Ley 30/1981 configuró tanto la separación como el divorcio dentro de un sistema causalista. Con la Ley 15/2005 se abandona dicho sistema, desapareciendo las causas legales de separación y resultando más adecuado hablar de separación judicial, expresión utilizada en la propia Exposición de Motivos y que permite diferenciarla de la separación de hecho.

Bajo la normativa anterior, la ley no producía automáticamente la separación, sino que determinaba las circunstancias que permitían al juez declararla. Tales circunstancias se concretaban en la separación por mutuo acuerdo y en las causas tasadas del antiguo art. 82 CC.

Desde 2005, la separación puede solicitarse por ambos cónyuges o por uno solo, sin necesidad de alegar causa, si bien requiere en todo caso resolución judicial. Además, opera con independencia de la forma de celebración del matrimonio y mantiene su carácter autónomo respecto del divorcio, que ya no necesita ser precedido por separación.

Las reformas posteriores —Ley de Jurisdicción Voluntaria y Ley 8/2021— han introducido ajustes competenciales y precisiones, pero no han alterado la estructura esencial del modelo instaurado en 2005. Actualmente, cuando existan hijos menores no emancipados o mayores con medidas de apoyo, la separación debe decretarse judicialmente, a petición de ambos cónyuges o de uno solo una vez transcurridos tres meses desde la celebración del matrimonio.

2.1. La separación por mutuo acuerdo.

La separación por mutuo acuerdo —también denominada consensual— se basa en el consentimiento concorde de ambos cónyuges. Puede instarse por ambos o por uno con el consentimiento del otro, siempre que hayan transcurrido tres meses desde la celebración del matrimonio. La demanda debe acompañarse de un convenio regulador, conforme al art. 90 CC, que determine las medidas personales y patrimoniales derivadas de la crisis.

En el modelo de 2005, el juez debía limitarse a verificar el cumplimiento de los requisitos formales y a homologar el acuerdo, sin entrar a valorar los motivos de la separación. No era necesario alegar causa alguna, bastando el transcurso del plazo y la presentación del convenio.

Tras la Ley 15/2015, cuando no existan hijos menores no emancipados ni personas con medidas de apoyo, los cónyuges pueden formalizar la separación de mutuo acuerdo mediante escritura pública ante notario o ante el letrado de la Administración de Justicia. En tales casos deben intervenir personalmente, asistidos por letrado, y prestar su consentimiento expreso. Si existen hijos menores o mayores con medidas de apoyo, la competencia corresponde a la autoridad judicial.

La sentencia, decreto o escritura pública producen la suspensión de la vida en común y el cese de la posibilidad de vincular bienes del otro cónyuge en el ejercicio de la potestad doméstica. Los efectos se producen desde la firmeza o desde la manifestación del consentimiento en escritura pública, debiendo inscribirse en el Registro Civil para surtir plenos efectos frente a terceros de buena fe.

2.2. La iniciativa de uno solo de los cónyuges.

La Ley 15/2005 introdujo una modificación sustancial al permitir que la mera voluntad de uno solo de los cónyuges constituya fundamento suficiente para decretar judicialmente la separación, sin necesidad de alegar ni acreditar causa alguna. Basta la decisión de no querer continuar vinculado al otro cónyuge, eliminándose así cualquier exigencia de motivación o exposición de conflictos personales.

Esta opción legislativa generó debate doctrinal y social, especialmente entre quienes defendían un modelo más rígido del vínculo matrimonial. Sin embargo, desde la perspectiva jurídica, la reforma no crea la ruptura unilateral, sino que reconoce y canaliza normativamente una realidad social ya existente, facilitando la institucionalización jurídica de una crisis previamente producida en el plano fáctico.

La separación a instancia de uno solo de los cónyuges exige, con carácter general, el transcurso de tres meses desde la celebración del matrimonio, plazo que también opera en la separación consensual. Este periodo pretende evitar decisiones precipitadas, aunque ha sido criticado por su brevedad. No obstante, dicho plazo no es exigible cuando se acredite la existencia de riesgo para la vida, la integridad física o moral, la libertad o la indemnidad sexual del cónyuge demandante o de los hijos.

En los supuestos en que existan hijos menores no emancipados o mayores con medidas de apoyo, la separación debe decretarse judicialmente. A la demanda deberá acompañarse una propuesta fundada de las medidas que regulen los efectos derivados de la separación. Además, como requisito de procedibilidad, debe acreditarse el intento de actividad negociadora previa, salvo en casos excluidos legalmente —como los supuestos de violencia de género o violencia sexual— en los que puede acudirse directamente a la vía judicial.

3. LA ACCIÓN DE SEPARACIÓN.

La acción de separación corresponde a cualquiera de los cónyuges, ya actúe individualmente o de forma conjunta con el otro. Tras el abandono del sistema causalista por la Ley 15/2005, no es necesario alegar ni acreditar causa alguna: basta la voluntad de separarse una vez cumplidos los requisitos temporales y procesales exigidos por la ley.

La acción tiene carácter personalísimo, lo que implica que solo puede ser ejercitada por el propio cónyuge legitimado y que se extingue por el fallecimiento de cualquiera de ellos, tanto si el proceso no se ha iniciado como si se encuentra en trámite. No se transmite, por tanto, a los herederos del cónyuge fallecido.

No obstante, este carácter personalísimo no impide que, en supuestos de discapacidad, la acción pueda ejercitarse a través de representante legal cuando ello sea necesario para garantizar la tutela judicial efectiva. Negar tal posibilidad supondría vulnerar el derecho fundamental a la tutela judicial efectiva reconocido en el art. 24 CE, como ha señalado el Tribunal Constitucional.

Mientras subsistan circunstancias que hagan aconsejable la separación, la acción puede ejercitarse en cualquier momento, siempre que se cumpla el requisito de procedibilidad relativo a la actividad negociadora previa exigido por la LO 1/2025, salvo en los supuestos legalmente exceptuados.

4. LA RECONCILIACIÓN DE LOS CÓNYUGES.

La separación, ya sea de hecho o judicial, no constituye una situación irrevocable. Dado que el vínculo matrimonial se mantiene en los supuestos de separación, la reconciliación resulta plenamente posible en cualquier momento, bastando la voluntad de ambos cónyuges de reanudar la convivencia. El principio general es que la reconciliación debe prevalecer sobre la situación de separación, cualquiera que sea el estado del procedimiento.

El art. 84 CC establece que la reconciliación pone término al procedimiento de separación y deja sin efecto lo resuelto en él. Si el proceso se encuentra en trámite, cesan las actuaciones y las medidas provisionales adoptadas; si ya existe sentencia, esta queda sin efecto ulterior. La ley exige que ambos cónyuges comuniquen separadamente la reconciliación al juez que esté conociendo o haya conocido del litigio, reforzando así la autenticidad del restablecimiento de la convivencia.

No obstante, el juez puede mantener o modificar las medidas adoptadas respecto de los hijos cuando exista causa que lo justifique, priorizando su protección. Cuando la separación se haya formalizado sin intervención judicial (ante notario o letrado de la Administración de Justicia), la reconciliación deberá formalizarse en escritura pública o acta de manifestaciones y, para que produzca efectos frente a terceros, deberá inscribirse en el Registro Civil.

La jurisprudencia ha destacado la importancia de cumplir estas exigencias formales. Mientras no se comunique judicialmente la reconciliación o no se formalice e inscriba conforme a la ley, la reanudación de la convivencia carece de relevancia jurídica frente a terceros, incluso en materias como la pensión de viudedad.

5. LOS EFECTOS DE LA SEPARACIÓN.

El art. 83 CC establece que la sentencia o decreto de separación, o la escritura pública que la determine, producen la suspensión de la vida común de los cónyuges y el cese de la posibilidad de vincular bienes del otro en el ejercicio de la potestad doméstica. Este último aspecto tiene carácter patrimonial y se conecta con el régimen económico matrimonial.

En el plano personal, la separación no solo implica el cese de la convivencia, sino que altera profundamente los deberes recíprocos del art. 68 CC. Aunque el vínculo matrimonial subsiste, desaparece el deber de vivir juntos y se debilitan los deberes de socorro mutuo y corresponsabilidad doméstica. La doctrina admite que el deber de convivencia queda extinguido y que el socorro mutuo se transforma, sin perjuicio de que puedan reclamarse alimentos entre cónyuges conforme al art. 143 CC. En cuanto al deber de fidelidad, existen discrepancias doctrinales acerca de su subsistencia durante la separación.

Respecto de los hijos, la patria potestad será ejercida conforme al art. 156 CC, normalmente por el progenitor con quien convivan. En el ámbito sucesorio, la separación judicial priva al cónyuge separado de sus derechos legitimarios (arts. 834 y ss. CC) y de su derecho a suceder abintestato (art. 945 CC).

Los efectos de la separación se producen desde la firmeza de la resolución o desde el otorgamiento de la escritura pública, pero no despliegan plenos efectos frente a terceros de buena fe hasta su inscripción en el Registro Civil.

6. LA SEPARACIÓN DE HECHO.

La separación de hecho se diferencia de la separación judicial en que no requiere proceso ni resolución alguna, sino que deriva exclusivamente de decisiones personales de los cónyuges que no se someten al control judicial. Puede iniciarse por abandono unilateral del hogar o por acuerdo de ambos para cesar la convivencia.

Tradicionalmente fue contemplada con recelo por doctrina y jurisprudencia, llegándose incluso a cuestionar su licitud por vulnerar el deber de convivencia. Sin embargo, desde finales del siglo XX se ha admitido plenamente su licitud como manifestación del libre desarrollo de la personalidad.

Tras la Ley 30/1981, y con mayor claridad tras la Ley 15/2005, el ordenamiento no ignora la separación de hecho, sino que le atribuye efectos jurídicos relevantes, adaptando el régimen matrimonial a la situación de ruptura efectiva.

6.1. La separación de hecho provocada unilateralmente.

Cuando la separación es unilateral, resulta imposible el acuerdo sobre las consecuencias de la ruptura. Bajo el sistema causalista anterior, el cese efectivo de la convivencia constituía causa de separación o divorcio. Aunque el sistema causalista fue abandonado, la separación de hecho sigue produciendo efectos jurídicos de gran relevancia.

Así, la separación de hecho durante más de un año es causa suficiente para instar la disolución judicial de la sociedad de gananciales (art. 1393.3.º). En materia de patria potestad, el art. 156.5 dispone que, si los padres viven separados, la ejercerá el progenitor con quien conviva el hijo, pudiendo el no conviviente solicitar su ejercicio conjunto o la distribución de funciones.

En el ámbito sucesorio, la separación de hecho priva al cónyuge separado de sus derechos legitimarios (art. 834 CC, sensu contrario) y del llamamiento en la sucesión intestada (art. 945 CC).

Por el contrario, la separación de hecho no extingue la obligación alimenticia entre cónyuges, pues el deber de alimentos no se condiciona legalmente al mantenimiento de la convivencia, si bien no podrá reclamar alimentos el cónyuge que haya abandonado sin justa causa.

6.2. LA SEPARACIÓN DE HECHO CONVENCIONAL.

La separación de hecho convencional produce los mismos efectos jurídicos que la separación unilateral, pero presenta una característica propia: va acompañada normalmente de pactos entre los cónyuges que regulan las consecuencias de la ruptura. Estos acuerdos suelen formalizarse incluso en escritura pública ante notario.

Su contenido es amplio y heterogéneo, pero en la práctica coincide con las medidas típicas previstas para las crisis matrimoniales: uso de la vivienda y ajuar familiar, régimen de custodia y cuidado de los hijos, contribución a cargas familiares, alimentos y cuestiones relativas al régimen económico matrimonial.

Durante largo tiempo se cuestionó la validez de estos pactos por entender que podían estar afectados por causa ilícita al vulnerar el deber de convivencia. Sin embargo, tras la Constitución de 1978 y las reformas de 1981, se consolidó doctrinalmente su plena licitud, en coherencia con el principio de autonomía privada y la igualdad entre los cónyuges.

En la actualidad, tales pactos se consideran válidos siempre que no vulneren el orden público, no lesionen el principio de igualdad conyugal y no resulten perjudiciales para los hijos.

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function extraerEncabezados(){

      }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){

    /* =========================

    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
