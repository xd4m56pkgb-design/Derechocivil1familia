    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. EL RÉGIMEN DE SEPARACIÓN DE BIENES

El régimen de separación de bienes se basa en la inexistencia de una masa patrimonial común entre los cónyuges, de modo que cada uno conserva la titularidad, la administración y la facultad de disposición sobre sus propios bienes como si no estuviera casado. No obstante, ambos siguen obligados a contribuir al sostenimiento de las cargas del matrimonio y, al no existir patrimonio común, deben hacerlo con cargo a sus respectivos bienes.

Antes de la reforma de 1981, este régimen tenía en el Código una regulación muy escasa y un marcado sentido sancionador, pues se aplicaba a matrimonios celebrados con infracción de determinadas prohibiciones o impedimentos. Esa insuficiente regulación, unida al predominio del régimen de gananciales en el Derecho común, hacía que la separación de bienes tuviera una importancia claramente residual.

En la actualidad, su significado ha cambiado de forma profunda. En la redacción vigente del Código, la separación de bienes actúa como régimen legal supletorio de segundo grado, lo que le otorga una relevante posición normativa. Además, en la práctica, muchas crisis matrimoniales de matrimonios sometidos al régimen de gananciales terminan desembocando en la instauración de la separación de bienes. También resulta especialmente aconsejable cuando la actividad profesional o laboral de uno de los cónyuges puede generar graves riesgos patrimoniales, ya que las deudas propias de uno no afectan al patrimonio privativo del otro, sin perjuicio de que los acreedores suelan exigir en ocasiones la asunción conjunta de responsabilidad por ambos.

Sin embargo, este régimen no presenta solo ventajas. La separación estricta de la titularidad de los bienes dentro de una comunidad de vida como la matrimonial puede resultar difícil de mantener en la práctica. Además, se ha destacado tradicionalmente que impedir que cada cónyuge participe en las vicisitudes patrimoniales del otro puede generar situaciones de notable injusticia.

En definitiva, la elección entre este régimen y los demás corresponde a los cónyuges, que, conforme al art. 1315, pueden decidir cuál les resulta más conveniente o atractivo.

2. ORIGEN CONVENCIONAL E INCIDENTAL DEL RÉGIMEN DE SEPARACIÓN DE BIENES

El art. 1435 establece que existirá separación de bienes cuando así lo hayan convenido los cónyuges, cuando en capitulaciones matrimoniales excluyan la sociedad de gananciales sin fijar las reglas de su régimen patrimonial y cuando, vigente el matrimonio, se extinga la sociedad de gananciales o el régimen de participación sin que los interesados lo sustituyan por otro distinto.

Por ello, la aplicación de este régimen puede tener un origen convencional, basado en la voluntad de los cónyuges, o un origen incidental, derivado de supuestos en los que la ley lo impone como régimen legal supletorio de segundo grado.

2.1. El régimen de separación de bienes convencional

La separación de bienes convencional corresponde al supuesto del art. 1435.1., que exige el otorgamiento de capitulaciones matrimoniales. En este caso, las reglas legales del régimen de separación de bienes solo se aplican en la medida en que no contradigan lo pactado expresamente por los cónyuges, ya que los acuerdos capitulares prevalecen por la libertad de configuración de la que disfrutan en materia de régimen económico matrimonial. Por ello, el modelo legal no tiene carácter imperativo para quienes hayan optado voluntariamente por este régimen.

2.2. El régimen de separación de bienes incidental

La separación de bienes incidental se produce por circunstancias ajenas a la voluntad de los cónyuges, aunque parte de la doctrina prefiera calificar estos supuestos como casos de separación legal o judicial. Entre ellos se incluye el supuesto en que los cónyuges otorgan capitulaciones para excluir expresamente el régimen de gananciales, pero sin determinar las reglas que han de regir sus bienes, caso que se presenta como anómalo en la práctica. También comprende los supuestos en que se extingue un régimen económico previo y este ha de ser sustituido por otro, siendo entonces aplicable la separación de bienes.

En consecuencia, este régimen se aplicará cuando se disuelva la sociedad de gananciales por embargo de bienes comunes a causa de deudas propias de uno de los cónyuges, cuando se decrete judicialmente la separación de los cónyuges y en todos los supuestos contemplados en el art. 1393 para la disolución judicial de la sociedad de gananciales, supuestos que también se consideran aplicables al régimen de participación por la remisión del art. 1415.

3. LA TITULARIDAD DE LOS BIENES

En el régimen de separación de bienes, la regla general es que cada cónyuge mantiene un patrimonio propio y separado, que funciona con autonomía respecto del otro. Solo en los supuestos de separación de bienes de origen convencional pueden introducirse matizaciones pactadas por los cónyuges, como la consideración común de determinados bienes muebles.

3.1. Inexistencia de masa conyugal

La inexistencia de masa conyugal se expresa en el art. 1437, según el cual pertenecen a cada cónyuge los bienes que tuviera al iniciarse el régimen y los que adquiera después por cualquier título. De este modo, todos los bienes corresponden separadamente a uno u otro cónyuge, tanto si fueron adquiridos antes del matrimonio como después, ya procedan de actos gratuitos o de la actividad laboral o profesional de quien los obtiene.

3.2. La eventualidad de la copropiedad ordinaria

La ausencia de patrimonio común exige una identificación precisa de la pertenencia de los bienes para poder determinar, en el momento de la liquidación, cuáles integran cada patrimonio privativo o el ajuar familiar. Esta dificultad apenas se plantea respecto de los inmuebles, por su documentación e inscripción registral, pero sí resulta especialmente problemática en relación con los bienes muebles. Por ello, el art. 1441 dispone que, cuando no pueda acreditarse a cuál de los cónyuges pertenece un bien o derecho, se entenderá que corresponde a ambos por mitad. Esa atribución determina la aplicación del régimen de copropiedad o comunidad ordinaria.

3.3. La declaración de quiebra o concurso de uno de los cónyuges

El Código contiene una regla especial para el supuesto de concurso de uno de los cónyuges. La legislación concursal, siguiendo el criterio anterior, establecía una presunción en beneficio de la masa activa según la cual, si el concursado estaba casado en separación de bienes, se presumía que había donado a su cónyuge la mitad de las contraprestaciones satisfechas por este durante el año anterior a la declaración de concurso para adquirir bienes o derechos a título oneroso. Si se acreditaba que la contraprestación procedía directa o indirectamente del patrimonio del concursado, se presumía la donación de la totalidad. Estas presunciones no operaban cuando los cónyuges estuvieran separados judicialmente o de hecho al realizarse el acto.

Posteriormente, la Ley 15/2015 dio nueva redacción al art. 1442 CC, que pasó a remitirse de forma general a la legislación concursal en caso de declaración de concurso de uno de los cónyuges. Entre sus disposiciones destaca la presunción de que, en caso de concurso del titular de una cuenta indistinta, la totalidad del saldo pertenece a este, salvo prueba en contrario.

4. REGLAS DE ADMINISTRACIÓN Y DISPOSICIÓN

El art. 1437, tras atribuir a cada cónyuge los bienes que tuviera al iniciarse el régimen y los que adquiera después por cualquier título, establece también que corresponde a cada uno la administración, el goce y la libre disposición de esos bienes. En consecuencia, salvo en lo relativo al sostenimiento de las cargas del matrimonio, el régimen de separación de bienes parte de que cada cónyuge actúa respecto de su propio patrimonio como si no estuviera casado, dada la plena separación patrimonial existente entre ambos.

No obstante, el art. 1439 contempla el supuesto de que uno de los cónyuges administre o gestione bienes o intereses del otro, previendo así que, pese a la regla general de autonomía patrimonial, uno de ellos pueda intervenir en el ámbito patrimonial reservado al otro como titular de los bienes. Sin embargo, conforme al principio del art. 71, ningún cónyuge puede atribuirse la representación del otro si no le ha sido conferida, por lo que tales actos de administración o disposición deben fundarse en un poder otorgado al efecto o, al menos, en circunstancias que permitan deducir de forma tácita la conformidad del otro cónyuge.

Por ello, la gestión de los asuntos patrimoniales del otro se reconduce al ámbito del mandato o, en su caso, de la gestión de negocios sin mandato. De ahí que el art. 1439 disponga que el cónyuge que actúe tendrá las mismas obligaciones y responsabilidades que un mandatario, aunque no estará obligado a rendir cuentas de los frutos percibidos y consumidos, salvo que se pruebe que los destinó a atenciones distintas del levantamiento de las cargas del matrimonio.

5. EL SOSTENIMIENTO DE LAS CARGAS DEL MATRIMONIO

Aunque en el régimen de separación de bienes exista una clara disgregación patrimonial, la convivencia matrimonial exige atender los gastos y obligaciones derivados de la vida familiar. Por ello, también en este régimen rige la regla general de que los bienes de ambos cónyuges quedan sujetos al levantamiento de las cargas del matrimonio. El art. 1438 concreta esta idea al disponer que los cónyuges contribuirán a su sostenimiento, comprendiendo en tales cargas los gastos necesarios para la familia, especialmente los relativos a los hijos, la asistencia sanitaria y la atención del hogar.

5.1. La contribución al sostenimiento de las cargas del matrimonio

La obligación de contribuir presenta aquí rasgos propios, ya que, al no existir patrimonio común, es necesario determinar cómo debe hacerse esa aportación. El art. 1438 establece que, a falta de convenio, los cónyuges contribuirán proporcionalmente a sus respectivos recursos económicos.

No obstante, esa contribución puede regularse libremente por acuerdo entre ellos, sin que el Código imponga un criterio igualitario ni exija capitulaciones matrimoniales para ello. En defecto de pacto, la regla subsidiaria no es la contribución por mitad, sino la proporcionalidad según el conjunto de bienes, rentas e ingresos de cada cónyuge.

5.2. La valoración del trabajo doméstico

La reforma de 1981 introdujo la novedad de reconocer expresamente que el trabajo para la casa se computa como contribución a las cargas del matrimonio y que, al extinguirse el régimen, da derecho a una compensación fijada por el juez si no existe acuerdo. La jurisprudencia interpretativa de este inciso excluye que para obtener esa compensación sea necesario acreditar un incremento patrimonial del otro cónyuge. La dedicación a las tareas domésticas, especialmente cuando recae de forma principal sobre uno de los cónyuges y comprende la atención y educación de los hijos, constituye una aportación relevante al sostenimiento familiar y debe ser tenida en cuenta tanto durante la vigencia del régimen como al extinguirse.

El precepto plantea, sin embargo, la dificultad de explicar por qué el trabajo doméstico, además de computarse como contribución, debe ser también compensado, lo que sugiere una doble valoración económica. Pese a ello, el sentido de la norma parece vincularse a la tradicional minusvaloración del trabajo doméstico y a la voluntad de proteger al cónyuge que sacrifica su capacidad laboral o profesional en beneficio de la familia y del otro cónyuge, especialmente en un régimen en el que quien no obtiene ingresos no participa en los del otro. El texto añade que algunas legislaciones autonómicas contienen reglas semejantes, formuladas de manera más amplia, y recuerda finalmente que el baremo de daños personales en accidentes de circulación ha reconocido también relevancia económica al trabajo doméstico al prever indemnización por lucro cesante para quienes dejan de realizarlo por causa del accidente.

6. LA RESPONSABILIDAD POR DEUDAS

En materia de deudas frente a terceros, debe distinguirse entre las deudas propias de cada cónyuge y aquellas que, aunque hayan sido asumidas por uno solo, queden comprendidas en el ejercicio de la potestad doméstica. Para delimitar qué debe entenderse por deuda propia de uno de los cónyuges, el texto remite, con las matizaciones oportunas, a lo ya expuesto al tratar el régimen de gananciales.

6.1. Las deudas propias de uno de los cónyuges

El art. 1440 establece que las obligaciones contraídas por cada cónyuge son de su exclusiva responsabilidad. Por tanto, el acreedor no puede dirigirse contra el patrimonio privativo del otro.

Esta es una de las razones por las que el régimen de separación de bienes resulta especialmente adecuado cuando uno de los cónyuges desarrolla actividades empresariales o negociales cuyos riesgos patrimoniales se pretende aislar del patrimonio del otro, a diferencia de lo que ocurre en el régimen de gananciales, donde los bienes gananciales pueden responder subsidiariamente incluso de deudas propias de uno de los cónyuges.

6.2. Las deudas asumidas en virtud de la potestad doméstica

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }
    
    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}




function formatearParrafos(t){
  const BUL = "[-\\u2010\\u2011\\u2012\\u2013\\u2014\\u2212\\u2022]"; // -, ‐, -, ‒, –, —, −, •
  const WS  = "[\\s\\u00A0\\u2000-\\u200A\\u202F\\u205F\\u3000]+";   // espacios raros PDF incluidos

  // 1) Normaliza espacios “raros” y saltos
  let raw = String(t ?? "")
    .replace(/\r/g,"")
    .replace(/[\u00A0\u2000-\u200A\u202F\u205F\u3000]/g, " "); // NBSP/EMSP/etc -> espacio normal

  // 2) ✅ Inserta saltos antes de enumeraciones internas "1) 2) 3)"
  // Caso típico: "puede ser: 1) ... 2) ... 3) ..."
  raw = raw
    // después de : ; . ! ? -> salto + "n)"
    .replace(/([:;.!?])\s*(\d+\)\s+)/g, "$1\n$2")
    // si vienen encadenadas sin puntuación clara pero con mucho espacio: " ...  2) ..."
    .replace(/(\s{2,})(\d+\)\s+)/g, "\n$2");

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){

    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes

}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
</body>
