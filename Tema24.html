    /* =========================================================
       1) TEXTO BASE (tu PDF pegado)
    ========================================================= */
    const PDF_TEXTO = `
1. INTRODUCCIÓN: LOS ALIMENTOS ENTRE PARIENTES

1.1. Sede sistemática y consideraciones previas

El Código Civil regula los alimentos entre parientes en los arts. 142 a 153 como una obligación legal de asistencia y socorro que alcanza a los cónyuges y a determinados parientes cercanos. La denominación es solo relativamente exacta, porque no se refiere a todos los parientes, sino a los de línea recta y a los hermanos, e incluye además a los cónyuges, que técnicamente no son parientes.

Esta institución no sustituye a los deberes alimenticios derivados del matrimonio o de la filiación, sino que actúa de forma complementaria cuando tales deberes resultan insuficientes o han decaído, como ocurre en supuestos de separación matrimonial o cuando los hijos alcanzan la mayoría de edad y se extingue la patria potestad. En la práctica, aumentan las reclamaciones de alimentos de hijos mayores de edad, especialmente frente a padres divorciados o separados de hecho.

Aunque varios preceptos parecen partir de la idea de que la prestación de alimentos surge tras un procedimiento judicial y una sentencia, ese planteamiento resulta criticable, porque no responde a la realidad sociológica ni a la dinámica ordinaria de las relaciones familiares. Lo habitual es que la ayuda entre familiares cercanos se preste espontáneamente e incluso por encima de las exigencias legales, sin necesidad de intervención judicial.

Pese a ello, existe una notable litigiosidad, sobre todo en contextos de divorcio o separación de hecho, en los que con frecuencia se generan reclamaciones alimenticias respecto de los hijos. En esos casos, si la reclamación la formula un progenitor contra el otro en nombre de los hijos menores, la competencia territorial se determina conforme al art. 769.3 de la Ley de Enjuiciamiento Civil. Además, la negativa a prestar alimentos puede dar lugar tanto a la revocación de donaciones como a la desheredación.

1.2. Fundamento y vigencia actual: solidaridad familiar y política asistencial

La obligación alimenticia se fundamenta en la solidaridad familiar entre los parientes más cercanos y presupone, por un lado, la existencia de una situación de necesidad en el alimentista y, por otro, la disponibilidad de medios económicos suficientes en el familiar obligado para atender su subsistencia.

Históricamente, esta obligación cumplió una función de asistencia social familiar, pero su sentido actual debe reconsiderarse a la luz de la política asistencial que la Constitución encomienda a los poderes públicos. Los preceptos constitucionales sobre enseñanza básica gratuita, tutela de la salud pública, Seguridad Social, atención a las personas con discapacidad y suficiencia económica de las personas mayores muestran que muchas necesidades que antes podían recaer sobre la familia deben ser hoy atendidas también mediante cauces públicos.

Por ello, la satisfacción de esas necesidades a través de prestaciones públicas puede exonerar o, al menos, mitigar la obligación de los familiares. De ahí que parte de la doctrina sostenga que la obligación civil de alimentos tiene hoy carácter subsidiario respecto de la asistencia pública, pues no sería razonable que quien tiene derecho a prestaciones públicas dejara de solicitarlas para vivir a costa de sus familiares.

Sin embargo, el texto pone en duda que esa subsidiariedad pueda afirmarse de manera absoluta.

Resulta más adecuado entender que la obligación de alimentos cumple una función complementaria respecto de la asistencia pública, ya que las ayudas y pensiones no aseguran por sí solas, como regla general, la satisfacción plena de las necesidades del alimentista. En este sentido, las obligaciones familiares no quedan desplazadas sin más por la acción pública, sino que pueden coexistir con ella.

Finalmente, en el plano internacional, los problemas de esta obligación se agravan cuando concurren elementos que impiden la aplicación directa del Derecho interno y exigen mecanismos de cooperación entre Estados. Para hacer frente a esas situaciones se menciona el Convenio de La Haya de 23 de noviembre de 2007 sobre cobro internacional de alimentos para los niños y otros miembros de la familia, aprobado en nombre de la Unión Europea por la Decisión 2011/432/ UE, de 9 de junio.

2. NATURALEZA Y CARACTERES

La naturaleza del derecho de alimentos ha sido discutida doctrinalmente a partir de la contraposición entre su posible carácter patrimonial o extrapatrimonial. Frente a quienes niegan su carácter patrimonial aunque admiten la patrimonialidad de su contenido, el texto considera más adecuado distinguir entre el derecho de alimentos en abstracto y una obligación alimenticia ya concreta, porque el régimen jurídico de ambas situaciones no es coincidente.

El derecho de alimentos se entiende como un derecho-deber latente entre los familiares comprendidos en la ley para exigir o prestar alimentos conforme al Código Civil, mientras que la relación obligatoria alimenticia alude a una obligación ya determinada, nacida por acuerdo entre las partes o por sentencia judicial.

En su fase general o latente, el derecho de alimentos se caracteriza por la reciprocidad, ya que los familiares legalmente previstos pueden ser potencialmente acreedores o deudores si concurren los presupuestos legales. Presenta también carácter personalísimo, porque solo esas personas pueden exigirlo o prestarlo, lo que explica su irrenunciabilidad e intransmisibilidad.

Además, es imprescriptible mientras permanece en estado de latencia, de modo que puede ejercitarse en cualquier momento por el familiar necesitado.

Estas notas cambian cuando la obligación alimenticia se concreta en una pensión periódica. En ese momento, la prestación adquiere un contenido patrimonial evidente y desaparece la reciprocidad, ya que quien es acreedor de la renta no puede ser a la vez deudor de esa misma prestación. También deja de existir la imprescriptibilidad, porque las pensiones vencidas y no pagadas prescriben a los cinco años. Del mismo modo, el carácter personalísimo se atenúa respecto de las pensiones atrasadas, pues pueden ser renunciadas y transmitidas, al tratarse ya de un derecho de crédito susceptible de negociación.

3. LOS ALIMENTISTAS Y LAS PERSONAS OBLIGADAS AL PAGO O ALIMENTANTES

El carácter recíproco de la obligación alimenticia implica que las mismas personas pueden ocupar la posición de alimentistas o de alimentantes, según tengan derecho a reclamar alimentos o deban satisfacerlos efectivamente. Esa reciprocidad alcanza a los cónyuges, a los parientes en línea recta y a los hermanos, de manera que el vínculo familiar constituye el presupuesto básico de la deuda alimenticia, junto con la suficiencia económica del obligado y la situación de necesidad del reclamante, siempre dentro del concreto entorno familiar y de sus condiciones económicas.

El art. 143 contempla como obligados recíprocos a los cónyuges, a los ascendientes y descendientes y, con alcance más limitado, a los hermanos, que solo se deben los auxilios necesarios para la vida cuando la necesidad no sea imputable al alimentista, extendiéndose en su caso a la educación. Quedan fuera de este régimen los cónyuges divorciados y las parejas no casadas en el Derecho común, sin perjuicio de otras posibles soluciones jurídicas en caso de ruptura. La jurisprudencia recoge además supuestos en los que la conducta del reclamante excluye la procedencia de alimentos, como cuando quien abandona voluntariamente el hogar familiar pretende mantener simultáneamente su propio modelo de vida y las ventajas económicas del entorno que rechaza, sin acreditar una verdadera situación de necesidad o incapacidad para mantenerse por sí mismo.

3.1. Los alimentantes u obligados al pago: orden de prelación

Cuando existen varios familiares potencialmente obligados, el art. 144 fija un orden de prelación para la reclamación de alimentos, comenzando por el cónyuge, seguido de los descendientes de grado más próximo, después los ascendientes también del grado más próximo y, finalmente, los hermanos. Entre descendientes y ascendientes, la gradación se determina según el orden de llamamiento en la sucesión legítima.

No obstante, ese orden no opera de forma rígida, pues la jurisprudencia admite reclamar alimentos a cualquiera de los obligados cuando se pruebe que los llamados con preferencia carecen de medios. Así, puede imponerse la obligación a los abuelos cuando los progenitores no pueden atenderla. En relación con los cónyuges, la aplicación práctica de estas normas queda reducida esencialmente a los supuestos de separación de hecho, ya que durante la convivencia matrimonial rige un deber de ayuda más amplio y, en las crisis matrimoniales judicializadas, la cuestión se encauza por las reglas específicas correspondientes. El Tribunal Supremo ha afirmado reiteradamente que la separación de hecho no excluye por sí sola la exigibilidad de alimentos entre cónyuges.

Respecto de los hermanos, el texto critica la terminología legal que distingue entre hermanos de doble vínculo y hermanos uterinos o consanguíneos, por considerarla poco adecuada, aunque la idea normativa es clara: tienen preferencia como alimentantes los hermanos de doble vínculo frente a los de vínculo sencillo. Se aclara además que los medio hermanos no deben confundirse con los hermanastros, ya que estos últimos no comparten consanguinidad, sino solo un vínculo de afinidad derivado del matrimonio entre sus respectivos progenitores. Finalmente, se recuerda que, si el obligado a prestar alimentos es declarado en concurso, resultan aplicables las disposiciones específicas de la legislación concursal.

3.2. Pluralidad de obligados: el carácter mancomunado de la deuda alimenticia

Cuando varios sujetos están obligados a prestar alimentos, la sola proximidad del parentesco no basta para resolver quién debe pagarlos y en qué medida. El art. 145 establece que el pago de la pensión debe repartirse entre todos los obligados en proporción a su respectivo caudal, lo que excluye una condena solidaria y configura la deuda alimenticia como una obligación mancomunada pasiva. Por tanto, la contribución de cada obligado depende de su concreta capacidad económica y no de una división igualitaria automática.

Excepcionalmente, en casos de urgente necesidad y circunstancias especiales, el juez puede imponer provisionalmente la prestación íntegra a uno solo de los obligados, sin perjuicio de que este pueda repetir después frente a los demás por la parte que les corresponda. Cuando concurren varios alimentistas frente a un único obligado que no dispone de recursos suficientes para atender a todos, debe respetarse el orden legal de preferencia, salvo que concurran el cónyuge y un hijo sujeto a patria potestad, supuesto en el que el hijo será preferido.

4. EL NACIMIENTO DEL DERECHO A LOS ALIMENTOS

El derecho a reclamar alimentos nace desde el momento en que el alimentista los necesita para subsistir y existe un familiar obligado con medios económicos suficientes para prestarlos. Sin embargo, el art. 148.1 establece que, aunque la obligación sea exigible desde la necesidad, solo deben abonarse desde la fecha de interposición de la demanda, lo que refleja una concepción judicializada de la institución.

Esta regla procede del ius commune y responde a la idea de que los alimentos, por su función de subsistencia inmediata, no pueden proyectarse sobre períodos anteriores a la reclamación judicial. Por ello, el juez no puede fijarlos desde una reclamación extrajudicial previa, aunque esta se hubiera formulado sin éxito. Distinto es el caso en que la reclamación extrajudicial sea atendida, pues entonces los alimentos pueden exigirse desde ese momento y su pago no tiene carácter indebido pese a no existir demanda.

La lentitud del proceso judicial ha hecho necesaria la previsión de mecanismos que permitan atender de forma inmediata las necesidades del alimentista. Con esta finalidad, el art. 148 incorpora la posibilidad de que el juez, a petición del alimentista o del Ministerio Fiscal, adopte con urgencia medidas cautelares para asegurar los anticipos realizados por una entidad pública u otra persona y para atender las necesidades futuras, entendidas estas como las surgidas desde la presentación de la demanda hasta que recaiga sentencia firme.

La jurisprudencia ha afirmado, en relación con los hijos menores en situaciones de crisis matrimonial o de pareja no casada, que la regla del art. 148.1 resulta aplicable y que los alimentos deben abonarse desde la interposición de la demanda. En cambio, cuando se trata de hijos mayores de edad, la legitimación activa para reclamarlos corresponde a ellos mismos y no a su madre.

Finalmente, se recuerda que en estos procesos es necesario acreditar una actividad negociadora previa como requisito para acudir a la vía judicial, sin perjuicio de que, si los alimentos se refieren a menores de edad, los acuerdos alcanzados deban ser homologados judicialmente.

5. EL CONTENIDO DE LA OBLIGACIÓN ALIMENTICIA

El contenido de la obligación alimenticia no es uniforme, sino que varía según el grupo familiar de que se trate. Entre cónyuges y parientes en línea recta se configura con gran amplitud, mientras que entre hermanos su contenido queda notablemente restringido. De ahí la distinción doctrinal entre alimentos amplios o civiles y alimentos estrictos o naturales, que resulta útil para explicar el diferente alcance de la prestación alimenticia.

5.1. Los alimentos amplios

Entre cónyuges y parientes en línea recta la obligación de alimentos comprende todo lo indispensable para el sustento, la habitación, el vestido y la asistencia médica. Incluye además la educación e instrucción del alimentista mientras sea menor de edad y también después, cuando no haya terminado su formación por causa no imputable a él. Asimismo, se incorporan los gastos de embarazo y parto cuando no estén cubiertos de otro modo.

La obligación alimenticia no se reduce, por tanto, al mero mantenimiento físico, sino que abarca el conjunto de atenciones necesarias para el desarrollo personal, con especial relevancia del cobijo, la formación y la instrucción. Precisamente por ello, la reforma de 1981 consideró necesario dejar expresamente garantizada la continuidad de la educación más allá de la mayoría de edad cuando el alimentista no haya podido concluirla por causa no imputable a él.

Esa precisión responde a la conjunción de dos circunstancias: la fijación de la mayoría de edad en los dieciocho años y la prolongación progresiva de los periodos de formación y dependencia juvenil. En consecuencia, la obligación alimenticia amplia se adapta a una realidad en la que la plena autonomía económica y formativa suele alcanzarse después de la mayoría de edad.

5.2. Los alimentos estrictos

Entre hermanos, la obligación se limita a los auxilios necesarios para la vida cuando la necesidad no sea imputable al alimentista, extendiéndose también, en su caso, a lo preciso para su educación. Se trata, por tanto, de una prestación más reducida, orientada a cubrir necesidades básicas y no al conjunto más amplio de atenciones que integran los alimentos entre cónyuges y parientes en línea recta.

Con todo, la diferencia entre alimentos amplios y estrictos no siempre presenta contornos nítidos, especialmente en relación con los criterios para fijar su cuantía. El texto subraya que no existen razones concluyentes para entender que tales criterios deban reservarse exclusivamente a los alimentos amplios, y destaca además la escasez de jurisprudencia sobre reclamaciones de alimentos entre hermanos. Las pocas resoluciones citadas inciden en aspectos concretos y confirman, en todo caso, el carácter personalísimo de esta obligación, de modo que, si un hermano no puede prestar alimentos, no cabe trasladar la reclamación a otros parientes como los sobrinos.

6. DETERMINACIÓN DE LA PRESTACIÓN ALIMENTICIA

6.1. Los criterios de determinación

La cuantía de la prestación alimenticia no puede fijarse legalmente mediante criterios rígidos, porque la variedad de situaciones impide establecer módulos abstractos. Por ello, el Código remite su concreción al acuerdo de las partes o, en su defecto, a la decisión judicial, tomando como criterio conjunto la situación económica del alimentante y las necesidades del alimentista.

Así, la determinación de los alimentos parte siempre de la valoración simultánea de los medios de quien debe prestarlos y de las necesidades de quien debe recibirlos.

Esa valoración constituye la base de toda fijación concreta de la obligación alimenticia, cuya prestación puede materializarse bien mediante una pensión, bien a través del mantenimiento del alimentista en la casa del alimentante.

6.2. Las formas de la prestación

La obligación alimenticia tiene carácter alternativo, ya que el obligado puede cumplirla, a su elección, pagando la pensión correspondiente o recibiendo y manteniendo en su propia casa al alimentista. Aunque la práctica y algunos preceptos del Código conceden preferencia a la pensión pecuniaria, que debe abonarse por meses anticipados, ello no elimina en principio la posibilidad de que el alimentante opte por el mantenimiento en su domicilio.

Sin embargo, esa facultad de elección no es absoluta. La ley excluye esta opción cuando contradiga la situación de convivencia establecida para el alimentista por las normas aplicables o por resolución judicial, y también cuando exista justa causa o resulte perjudicial para el interés del alimentista menor de edad. De este modo, la libertad de elección del obligado queda subordinada a la protección efectiva de la situación personal y familiar del alimentista.

6.3. La fijación y duración de la pensión

Cuando la obligación alimenticia se cumple mediante pensión, lo habitual en los procesos judiciales es que se fije una cuantía concreta en dinero. Esa cuantía puede ir acompañada de cláusulas de estabilización para preservar su valor futuro y también cabe que se determine mediante un porcentaje de los ingresos líquidos del alimentante.

La práctica jurisprudencial muestra que, en familias de tipo medio, las pensiones fijadas en favor de los hijos se sitúan habitualmente en torno a una determinada cuantía mensual, aunque su importe varía según las circunstancias del caso. También es posible establecer pensiones diferentes para hijos de distintos matrimonios cuando concurran situaciones distintas, ya que para fijar la aportación del padre debe valorarse igualmente la contribución que corresponde a la madre.

Una vez fijada judicialmente la pensión de alimentos, la obligación de abonarla se mantiene mientras no concurra alguna de las causas legales de extinción.

7. LA MODIFICACIÓN DE LA PENSIÓN

La prestación alimenticia, al depender de la situación patrimonial de las partes y tener carácter duradero y periódico, es esencialmente modificable. Por ello, la cuantía o el porcentaje de la pensión puede reducirse o aumentarse en función de la variación que experimenten tanto las necesidades del alimentista como la fortuna del alimentante.

La posibilidad de modificación se mantiene mientras la obligación alimenticia no se haya extinguido y responde a los mismos criterios que presiden la fijación inicial de la pensión. Así, la cuantía no es estable por naturaleza, sino que debe adaptarse a los cambios que puedan producirse en la situación económica o personal de una y otra parte, ya sea por mejora o empeoramiento de la salud, adquisición de bienes, acceso o pérdida de ingresos o cualquier otra circunstancia relevante que altere el equilibrio inicial.

Aunque alguna jurisprudencia y parte de la doctrina han vinculado esta modificación a la cláusula rebus sic stantibus, el texto rechaza expresamente ese planteamiento. La razón es que el propio art. 147 ya establece un mecanismo específico de ajuste para adecuar la pensión a las variaciones sobrevenidas de las necesidades del alimentista y de la fortuna del obligado, por lo que no resulta necesario acudir a una construcción pensada para otros ámbitos.

Finalmente, se advierte que la alteración de las circunstancias patrimoniales puede alcanzar tal intensidad que no solo justifique la modificación de la pensión, sino incluso la extinción de la propia obligación alimenticia.

8. LA EXTINCIÓN DE LA OBLIGACIÓN ALIMENTICIA

La obligación de prestar alimentos cesa con la muerte del obligado y también con la del alimentista. El Código reúne bajo la rúbrica de extinción supuestos de distinta naturaleza, pues algunos producen verdaderamente la desaparición de una obligación ya existente, mientras que otros funcionan más bien como causas que impiden su nacimiento o continuidad en sentido propio.

8.1. La muerte de los interesados

La muerte o declaración de fallecimiento del alimentante o del alimentista extingue la obligación alimenticia por su carácter personalísimo. Si fallece el obligado, sus herederos no asumen por sucesión la deuda de alimentos, aunque puedan quedar obligados por una nueva relación alimenticia si concurren entre ellos y el necesitado los presupuestos legales. Si muere el alimentista, la obligación desaparece y sus herederos no adquieren por ello derecho alguno a percibir alimentos. Además, si el pago se había hecho por meses anticipados, los herederos del alimentista no deben devolver la parte correspondiente a los días no vividos del mes en curso.

8.2. La variación de las circunstancias patrimoniales

La obligación alimenticia puede extinguirse cuando la fortuna del obligado disminuye hasta el punto de no poder atenderla sin desatender sus propias necesidades y las de su familia, o cuando el alimentista llega a poder mantenerse por sí mismo mediante trabajo, profesión, industria, destino o mejora de fortuna. En estos casos, la alteración patrimonial alcanza tal entidad que hace desaparecer la necesidad o imposibilita legítimamente la prestación, produciendo la cesación de la obligación.

8.3. La mala conducta del alimentista

También incide en la obligación alimenticia la conducta del propio alimentista. Cuando incurre en hechos que darían lugar a desheredación, esa conducta puede extinguir una obligación ya existente o impedir una reclamación futura. En cambio, cuando el alimentista es descendiente del obligado y su necesidad procede de mala conducta o de falta de aplicación al trabajo, no se está propiamente ante una extinción de una obligación ya nacida, sino ante la inexistencia del presupuesto que permitiría exigirla mientras subsista esa situación.

El texto subraya además que la falta de verdadera necesidad y la actitud pasiva del descendiente mayor de edad pueden justificar el cese de la pensión alimenticia. Así, cuando quien reclama alimentos cuenta con capacidad física y mental, ha alcanzado una edad madura y no acredita diligencia suficiente en su formación o en la búsqueda de empleo, deja de encontrarse en una situación que justifique el mantenimiento indefinido de la prestación. En esta línea, la desafección grave y prolongada hacia el progenitor, cuando resulte imputable exclusivamente al hijo mayor de edad, puede también operar como fundamento para extinguir la pensión alimenticia.

9. OTRAS OBLIGACIONES ALIMENTICIAS

El art. 153 dispone que las reglas sobre alimentos entre parientes se aplicarán también a otros supuestos en que exista derecho a alimentos por previsión del Código, por testamento o por pacto, salvo que prevalezca lo pactado, lo ordenado por el testador o lo establecido específicamente por la ley. Con ello, el precepto parece pretender que el régimen de los alimentos entre parientes actúe como marco general para otras obligaciones alimenticias.

Sin embargo, el texto considera que esa pretensión carece de verdadero alcance general, porque los presupuestos propios de los alimentos entre parientes, especialmente su reciprocidad y la necesidad del alimentista, impiden trasladar sin más sus reglas a otras deudas alimenticias.

Existen, en efecto, supuestos en los que el fundamento y el régimen de la obligación son distintos, lo que hace inviable una aplicación automática de los arts. 142 y siguientes.

Así ocurre, por ejemplo, en casos en que la ley impone alimentos sin atender a la necesidad del beneficiario, o en aquellos en que la obligación nace de la voluntad de las partes o del causante.

En las prestaciones alimenticias de origen convencional o testamentario, la cuantía y el contenido quedan determinados por lo pactado o dispuesto, lo que excluye por principio la aplicación de las reglas propias de la obligación alimenticia entre parientes, incluida su posible modificación conforme a ese régimen.

Por ello, la verdadera relevancia del art. 153 queda reducida, en lo esencial, a reconocer la admisibilidad de obligaciones alimenticias convencionales y a admitir, de manera puramente eventual, que un testador pudiera someter un legado de alimentos al modelo normativo de los alimentos entre parientes.

10. EL FONDO DE GARANTÍA DEL PAGO DE ALIMENTOS

El Fondo de Garantía del Pago de Alimentos entra en vigor como respuesta de los poderes públicos al grave problema social que supone el impago de prestaciones alimenticias debidas a menores de edad, especialmente en situaciones de separación, divorcio, nulidad matrimonial, procesos de filiación o reclamaciones de alimentos. Su creación se presenta así como una medida de protección frente al incumplimiento del obligado al pago.

Su finalidad es garantizar a los hijos e hijas menores de edad la percepción de determinadas cantidades económicas configuradas como anticipos, destinadas a atender las necesidades de la unidad familiar en la que se integran cuando no se abonan los alimentos judicialmente reconocidos. Para apreciar si procede la concesión de esos anticipos, resulta decisiva la insuficiencia económica de dicha unidad familiar.

Pueden ser beneficiarios los menores titulares de un derecho de alimentos reconocido judicialmente e impagado y también los hijos e hijas mayores de edad con discapacidad cuando concurran las mismas circunstancias de insuficiencia económica. El Fondo se nutre de las aportaciones consignadas en los Presupuestos Generales del Estado y, en su caso, de los reintegros y reembolsos de los anticipos satisfechos.

La cuantía máxima del anticipo se fija por cada beneficiario en una suma mensual determinada y su percepción tiene una duración máxima también legalmente limitada. El derecho se extingue al alcanzar el beneficiario la mayoría de edad y el Estado queda subrogado de pleno derecho, hasta el importe abonado, en los derechos del interesado frente al obligado al pago, teniendo ese crédito naturaleza pública.

    function quitarTituloRepetidoSeguro(texto, titulo){
  const t0 = String(texto || "");
  const h0 = String(titulo || "");
  if(!t0.trim() || !h0.trim()) return t0.trim();

  // Normaliza: minúsculas + espacios raros (NBSP) + BOM
  const clean = s => String(s)
    .replace(/^\uFEFF/, "")          // BOM
    .replace(/\u00A0/g, " ")         // NBSP -> espacio normal
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();

  const t = clean(t0);
  const h = clean(h0);

  if(!t.startsWith(h)) return t0.trim();

  // Corta del texto ORIGINAL, pero usando la longitud del título ORIGINAL
  // (buscamos el match real al principio ignorando mayúsculas y espacios raros)
  const re = new RegExp(
    "^\\s*" + h0.trim()
      .replace(/[.*+?^${}()|[\]\\]/g, "\\$&")   // escape regex
      .replace(/\s+/g, "[\\s\\u00A0]+")         // admite NBSP
    + "[\\s\\u00A0]+",
    "i"
  );

  return t0.replace(re, "").trim();
}

  const lines = raw
    .split("\n")
    .map(l => l.replace(/\s+$/,"")); // trimEnd

  const connectors = /^(Además|En consecuencia|No obstante|Sin embargo|Asimismo|Por tanto|Por ello|Finalmente|En cambio|De hecho|Ahora bien|Por otro lado|En efecto|Así,?|En primer lugar|En segundo lugar)\b/i;

  const isNumParenItem = (s) => /^\d+\)\s+/.test(s.trimStart());
  const isLetterItem   = (s) => /^[a-z]\)\s+/i.test(s.trimStart());
  const isBullet       = (s) => new RegExp("^" + BUL + WS).test(s.trimStart());

  const isListOrHeading = (s) =>
    new RegExp("^(\\d+(?:\\.\\d+)*\\.|\\d+\\)|" + BUL + "|[a-z]\\))" + WS).test(s.trimStart());

  const splitBulletAtFirstSentence = (s) => {
    if(!isBullet(s)) return null;
    const m = s.match(new RegExp("([.!?])" + WS));
    if(!m) return null;
    const idx = s.search(new RegExp("([.!?])" + WS));
    const cut = idx + 1;
    const left  = s.slice(0, cut).trim();
    const right = s.slice(cut).replace(new RegExp("^" + WS), "").trim();
    if(!right) return null;
    return { left, right };
  };

  const paras = [];
  let current = "";

  const flush = () => {
    if(current.trim()) paras.push(current.trim());
    current = "";
  };

  for (let i=0; i<lines.length; i++){
    const line = lines[i].trimStart();

    if(!line.trim()){
      flush();
      continue;
    }

    if(isListOrHeading(line)){
      flush();

      // a) b) c)
      if(isLetterItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // 1) 2) 3) -> línea propia
      if(isNumParenItem(line)){
        paras.push(line.trim());
        current = "";
        continue;
      }

      // viñeta
      if(isBullet(line)){
        const sp = splitBulletAtFirstSentence(line);
        if(sp){
          paras.push(sp.left);
          current = sp.right;
        }else{
          paras.push(line.trim());
          current = "";
        }
        continue;
      }

      current = line.trim();
      continue;
    }

    if(current && /[.!?]$/.test(current) && connectors.test(line.trim())){
      flush();
      current = line.trim();
      continue;
    }

    current += (current ? " " : "") + line.trim();
  }

  flush();

  // Render: si es "1) ..." lo pintamos como bloque tipo lista (sangría real)
  return paras.map(p => {
    const s = String(p);
    const m = s.match(/^(\d+)\)\s+([\s\S]+)$/);
    if(m){
      return `<p class="li"><span class="liNum">${escapeHtml(m[1])})</span>${escapeHtml(m[2])}</p>`;
    }
    return `<p>${escapeHtml(s)}</p>`;
  }).join("");
}

    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }


    // Jerarquía epígrafes
    function esDescendiente(idHijo, idPadre){
      return String(idHijo).startsWith(String(idPadre) + ".");
    }
    function parentId(id){
      const parts = String(id || "").split(".");
      if(parts.length <= 1) return null;
      parts.pop();
      return parts.join(".");
    }

    /* =========================
       PDF -> epígrafes
    ========================= */
    function extraerEncabezados(){
      // Soporta: "1. TÍTULO" y "1.1. TÍTULO"
      const re = /^\s*(\d+(?:\.\d+)*)\.\s+(.+?)\s*$/;
      const lines = String(PDF_TEXTO).replace(/\r/g,"").split("\n");
      const out = [];
      for(const l of lines){
        const m = l.match(re);
        if(!m) continue;
        out.push({ id:m[1], titulo:`${m[1]}. ${m[2].trim()}` });
      }
      return out;
    }

    function textoPorId(id){
      if(!id) return "";
      const safe = id.replace(/\./g,"\\.");
      const reStart = new RegExp(`(^|\\n)${safe}\\.\\s+`, "m");
      const full = String(PDF_TEXTO);
      const m = full.match(reStart);
      if(!m) return "";
      const startIdx = full.indexOf(m[0]) + m[0].length;
      const rest = full.slice(startIdx);
      const nextIdx = rest.search(/\n\s*\d+(?:\.\d+)*\.\s+/);
      const chunk = (nextIdx === -1 ? rest : rest.slice(0, nextIdx)).trim();
      return chunk;
    }
    
    
       
    function normalizeKey(s){
  return String(s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // quita tildes
    .replace(/\s+/g," ")
    .replace(/[^\p{L}\p{N} ]/gu,"")                   // quita signos raros
    .trim();
}

    /* =========================
       PARSER banco
    ========================= */
    function parseBanco(texto){
      const t = String(texto || "").replace(/\r/g, "");
      const bloques = t.split(/\n(?=#ID\s*=\s*)/g).map(x=>x.trim()).filter(Boolean);
      const QUIZ = {};
      for(const bloque of bloques){
        const mId = bloque.match(/^#ID\s*=\s*([0-9]+(?:\.[0-9]+)*)\s*$/m);
        if(!mId) continue;
        const id = mId[1];

        const sinHeader = bloque.replace(/^#ID\s*=\s*[0-9]+(?:\.[0-9]+)*\s*$/m, "").trim();
        const partesQ = sinHeader.split(/\n(?=Q:\s*)/g).map(x=>x.trim()).filter(Boolean);

        const preguntas = [];
        for(const pq of partesQ){
          // ✅ acepta: // [1]  o  // N: 1
          const nMatch = pq.match(/^\/\/\s*(?:N:|\[)\s*([0-9]{1,3})\s*\]?\s*$/m);
          const qMatch = pq.match(/^Q:\s*(.+)$/m);
          if(!qMatch) continue;

          const aMatch = pq.match(/^A\)\s*(.+)$/m);
          const bMatch = pq.match(/^B\)\s*(.+)$/m);
          const cMatch = pq.match(/^C\)\s*(.+)$/m);
          const okMatch = pq.match(/^OK:\s*([ABC])\s*$/m);
          const expMatch = pq.match(/^EXP:\s*([\s\S]+)$/m);

          if(!aMatch || !bMatch || !cMatch || !okMatch) continue;

          const preguntaTxt = qMatch[1].trim();
          const uid = `${id}::${normalizeKey(preguntaTxt)}`;

          preguntas.push({
            __id: id,
            __uid: uid,
            __n: nMatch ? Number(nMatch[1]) : null,
            pregunta: preguntaTxt,
            a: aMatch[1].trim(),
            b: bMatch[1].trim(),
            c: cMatch[1].trim(),
            correcta: okMatch[1].toLowerCase(),
            explicacion: expMatch ? expMatch[1].trim() : ""
          });
        }

        if(!QUIZ[id]) QUIZ[id] = [];
        QUIZ[id].push(...preguntas);
      }
      return QUIZ;
    }

    const QUIZ = parseBanco(BANCO_TEXTO);

    function buildTemaPool(QUIZ){
      const pool = [];
      for(const id of Object.keys(QUIZ || {})){
        const list = QUIZ[id];
        if(Array.isArray(list)) pool.push(...list);
      }
      return pool;
    }
    let TEMA_POOL = buildTemaPool(QUIZ);

    /* =========================
       STORAGE
    ========================= */
    const STORAGE_KEY = "DA_TEMA2_STATS_V1";
    function loadStore(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
        const parsed = JSON.parse(raw);
        return {
          wrongUids: parsed.wrongUids || {},
          stats: parsed.stats || { ok:0, bad:0, blank:0 }
        };
      }catch{
        return { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      }
    }
    function saveStore(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STORE));
      }catch{}
    }
    let STORE = loadStore();

    function markWrong(uid){ STORE.wrongUids[uid] = true; saveStore(); }
    function clearWrong(uid){ delete STORE.wrongUids[uid]; saveStore(); }
    function isWrong(uid){ return !!STORE.wrongUids[uid]; }

    /* =========================
       DOM refs
    ========================= */
    const modalOverlay = document.getElementById("modalOverlay");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnNextQuestion = document.getElementById("btnNextQuestion");
    const btnBlank = document.getElementById("btnBlank");

    const modalPill = document.getElementById("modalPill");
    const modalTitle = document.getElementById("modalTitle");
    const modalQuestion = document.getElementById("modalQuestion");
    const modalOptions = document.getElementById("modalOptions");
    const modalFeedback = document.getElementById("modalFeedback");
    const modalFeedbackTitle = document.getElementById("modalFeedbackTitle");
    const modalExplanation = document.getElementById("modalExplanation");
    const modalCounter = document.getElementById("modalCounter");
    const scoreLine = document.getElementById("scoreLine");
    const modalTimer = document.getElementById("modalTimer");

    const btnTemaRandom = document.getElementById("btnTemaRandom");
    const selTemaN = document.getElementById("selTemaN");
    const btnSoloFalladas = document.getElementById("btnSoloFalladas");
    const btnResetStats = document.getElementById("btnResetStats");
    const badgeTemaTotal = document.getElementById("badgeTemaTotal");

    /* =========================
       ESTADO QUIZ
    ========================= */
    let currentMode = "epigrafe";
    let currentId = null;
    let deck = [];
    let idx = 0;
    let currentQ = null;
    let answered = false;

    let ses_ok = 0, ses_bad = 0, ses_blank = 0;

    function computeUNEDGrade(){
      const total = ses_ok + ses_bad + ses_blank;
      const puntos =
        (ses_ok * SCORE_OK) -
        (ses_bad * SCORE_BAD) +
        (ses_blank * SCORE_BLANK);
      return { puntos, total };
    }
    function renderScoreLine(){
      const { puntos, total } = computeUNEDGrade();
      scoreLine.textContent =
        `Aciertos ${ses_ok} · Fallos ${ses_bad} · Blancos ${ses_blank} · Puntos ${puntos.toFixed(2)} (de ${total})`;
    }

    /* =========================
       TIMER
    ========================= */
    let timerStart = 0;
    let timerHandle = null;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    function fmtTime(ms){
      const s = Math.floor(ms/1000);
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function stopTimer(){
      if(timerHandle){
        clearInterval(timerHandle);
        timerHandle = null;
      }
    }
    function startTimer(){
      stopTimer();
      timerStart = Date.now();
      timerHandle = setInterval(()=>{
        modalTimer.textContent = fmtTime(Date.now() - timerStart);
      }, 250);
    }
    function openModal(){
      modalOverlay.classList.add("show");
      modalOverlay.setAttribute("aria-hidden","false");
      startTimer();
    }
    function closeModal(){
      modalOverlay.classList.remove("show");
      modalOverlay.setAttribute("aria-hidden","true");
      stopTimer();

      currentMode = "epigrafe";
      currentId = null;
      deck = [];
      idx = 0;
      currentQ = null;
      answered = false;

      modalOptions.innerHTML = "";
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");
      modalQuestion.textContent = "—";
      modalCounter.textContent = "0/0";
      modalTimer.textContent = "00:00";
    }

    function setFeedback(kind, title, explanation){
      modalFeedback.classList.remove("ok","bad");
      modalFeedback.classList.add(kind);
      modalFeedbackTitle.textContent = title;
      modalExplanation.textContent = explanation ? explanation : "";
      modalFeedback.classList.add("show");
    }

    /* =========================
       DECK BUILDERS
    ========================= */
    function buildDeckForEpigrafe(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      return shuffle(list);
    }
    function buildDeckForTema(n){
      const pool = TEMA_POOL.slice();
      const barajado = shuffle(pool);
      const wanted = Math.max(1, Math.min(Number(n || 20), barajado.length));
      return barajado.slice(0, wanted);
    }
    function buildDeckForFalladas(){
      const pool = TEMA_POOL.filter(q => isWrong(q.__uid));
      return shuffle(pool);
    }

    function getNextFromDeck(){
      if(!deck.length) return null;
      if(idx >= deck.length){
        if(currentMode === "tema") return null;
        deck = shuffle(deck);
        idx = 0;
      }
      const q = deck[idx];
      idx += 1;
      return q;
    }

    /* =========================
       RENDER PREGUNTA
    ========================= */
    function renderQuestion(){
      const q = getNextFromDeck();
      if(!q){
        alert("Fin del test.");
        closeModal();
        return;
      }

      currentQ = q;
      answered = false;
      modalFeedback.className = "feedback";
      modalFeedback.classList.remove("show");

      modalPill.textContent = q.__id || currentId || "—";
      modalTitle.textContent =
        currentMode === "tema" ? "Modo tema (aleatorio)" :
        currentMode === "falladas" ? "Solo falladas" :
        "Por epígrafe";

      modalQuestion.textContent = q.pregunta;
      modalCounter.textContent = `${Math.min(idx, deck.length)}/${deck.length}`;

      let opts = [
        { label:"A", text:q.a, isCorrect: q.correcta === "a" },
        { label:"B", text:q.b, isCorrect: q.correcta === "b" },
        { label:"C", text:q.c, isCorrect: q.correcta === "c" },
      ];
      opts = shuffle(opts);

      modalOptions.innerHTML = opts.map(o=>`
        <button class="optBtn" type="button" data-correct="${o.isCorrect ? "1" : "0"}">
          <span class="k">${o.label}</span>${escapeHtml(o.text)}
        </button>
      `).join("");

      [...modalOptions.querySelectorAll(".optBtn")].forEach(btn=>{
        btn.addEventListener("click", ()=>{
          if(answered) return;
          answered = true;

          const chosenCorrect = btn.getAttribute("data-correct") === "1";

          if(chosenCorrect){
            ses_ok += 1;
            clearWrong(q.__uid);
            setFeedback("ok", "Correcto ✅", q.explicacion);
          }else{
            ses_bad += 1;
            markWrong(q.__uid);
            const correctLabel = (q.correcta || "").toUpperCase();
            setFeedback("bad", `Incorrecto ❌ (Correcta: ${correctLabel})`, q.explicacion);
          }

          renderScoreLine();
          refreshTemaStats();
        });
      });
    }

    /* =========================
       START MODOS
    ========================= */
    function startQuizForId(id){
      const list = Array.isArray(QUIZ[id]) ? QUIZ[id] : [];
      if(!list.length){
        alert(`No hay preguntas cargadas para el epígrafe ${id}.`);
        return;
      }
      currentMode = "epigrafe";
      currentId = id;
      deck = buildDeckForEpigrafe(id);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizTema(){
      if(!TEMA_POOL.length){
        alert("No hay preguntas cargadas en el tema todavía.");
        return;
      }
      const n = selTemaN ? Number(selTemaN.value) : 20;
      currentMode = "tema";
      currentId = "TEMA";
      deck = buildDeckForTema(n);
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function startQuizFalladas(){
      const d = buildDeckForFalladas();
      if(!d.length){
        alert("No tienes falladas guardadas aún.");
        return;
      }
      currentMode = "falladas";
      currentId = "FALLADAS";
      deck = d;
      idx = 0;
      ses_ok = 0; ses_bad = 0; ses_blank = 0;
      renderScoreLine();
      openModal();
      renderQuestion();
    }

    function blankQuestion(){
      if(answered) return;
      answered = true;
      ses_blank += 1;
      setFeedback("bad", "En blanco ⚪", currentQ ? currentQ.explicacion : "");
      renderScoreLine();
      refreshTemaStats();
    }

    function refreshTemaStats(){
      const total = TEMA_POOL.length;
      const wrongCount = Object.keys(STORE.wrongUids || {}).length;
      if(badgeTemaTotal){
        badgeTemaTotal.textContent = `${total} cargadas · ${wrongCount} falladas guardadas`;
      }
      if(diag){
        diag.innerHTML = `Diagnóstico: <b>OK</b> · Epígrafes detectados: <b>${extraerEncabezados().length}</b> · Preguntas cargadas: <b>${TEMA_POOL.length}</b>`;
      }
    }

    /* =========================
       ✅ RENDER ACORDEÓN EN CASCADA (ÁRBOL)
    ========================= */
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const heads = extraerEncabezados();

    // Construye nodos
    const nodesById = new Map();
    heads.forEach(h=>{
      nodesById.set(h.id, { ...h, children: [] });
    });

    // Enlaza padre-hijo
    const roots = [];
    heads.forEach(h=>{
      const node = nodesById.get(h.id);
      const pid = parentId(h.id);
      if(pid && nodesById.has(pid)){
        nodesById.get(pid).children.push(node);
      }else{
        roots.push(node);
      }
    });

    // Ordena hijos numéricamente (1.10 después de 1.2, etc.)
    function cmpIds(a,b){
      const pa = a.id.split(".").map(Number);
      const pb = b.id.split(".").map(Number);
      const len = Math.max(pa.length, pb.length);
      for(let i=0;i<len;i++){
        const xa = pa[i] ?? -1;
        const xb = pb[i] ?? -1;
        if(xa !== xb) return xa - xb;
      }
      return 0;
    }
    function sortTree(list){
      list.sort(cmpIds);
      list.forEach(n=>sortTree(n.children));
    }
    sortTree(roots);

    // Render recursivo
function renderNode(node){
  let txt = textoPorId(node.id);
  const idea = (IDEAS_CLAVE[node.id] ?? "").toString().trim();
  const quizCount = Array.isArray(QUIZ[node.id]) ? QUIZ[node.id].length : 0;

  const titleNoId = node.titulo.replace(
    new RegExp("^" + node.id.replace(/\./g,"\\.") + "\\.\\s*"),
    ""
  );

  // ✅ QUITA el título repetido al inicio del texto
  txt = quitarTituloRepetidoSeguro(txt, titleNoId);

  const d = document.createElement("details");
  d.open = false;
  d.dataset.id = node.id;

      d.innerHTML = `
        <summary>
          <div class="sumLeft">
            <span class="pill">${escapeHtml(node.id)}</span>
            <span class="sumTitle">${escapeHtml(titleNoId)}</span>
          </div>
          <div class="sumRight" style="display:flex; gap:10px; align-items:center;">
            ${quizCount ? `<span class="badge"></span>` : `<span class="badge"></span>`}
          </div>
        </summary>

        <div class="inner">
          ${txt ? `<div class="prio"><div class="tag">Texto prioritario</div>${formatearParrafos(txt)}</div>` : ""}
          ${idea ? `<div class="idea"><div class="tag">Idea clave</div>${escapeHtml(idea)}</div>` : ""}

          <div class="rowActions">
            ${quizCount ? `<button class="btn btnPrimary" type="button" data-quiz="${escapeHtml(node.id)}">Pregúntame</button>` : ""}
            <span class="badge">Epígrafe ${escapeHtml(node.id)}</span>
          </div>

          ${quizCount ? `
            <div class="quizBox">
              <div class="tag">Banco (cargado)</div>
              <div style="opacity:.85; font-size:13px">
                Tienes ${quizCount} preguntas en este epígrafe.
              </div>
            </div>
          ` : ""}

          <div class="children" style="margin-top:10px; padding-left:14px; border-left:2px solid rgba(17,24,39,.08)"></div>
        </div>
      `;

      // ✅ Cierre inteligente: deja abierto ancestros + descendientes; cierra lo demás
      d.addEventListener("toggle", () => {
        if(!d.open) return;

        const idActual = d.dataset.id;

        cont.querySelectorAll("details").forEach(other=>{
          if(other === d) return;
          const otherId = other.dataset.id;
          if(!otherId) return;

          const esDescDeActual = esDescendiente(otherId, idActual);
          const esAncestroDeActual = esDescendiente(idActual, otherId);

          if(!esDescDeActual && !esAncestroDeActual){
            other.open = false;
          }
        });
      });

      // Render hijos dentro del padre (cascada real)
      const childrenBox = d.querySelector(".children");
      node.children.forEach(ch=>{
        childrenBox.appendChild(renderNode(ch));
      });

      return d;
    }

    if(!heads.length){
      cont.innerHTML = `
        <div class="prio">
          <div class="tag">No se detectaron epígrafes</div>
          <div style="opacity:.85">
            El detector busca líneas tipo <b>“1. TÍTULO”</b> o <b>“1.1. TÍTULO”</b> (con punto y espacio).<br><br>
            Primeros 300 caracteres del texto:<br><br>
            <code style="white-space:pre-wrap">${escapeHtml(PDF_TEXTO.slice(0,300))}</code>
          </div>
        </div>
      `;
    }else{
      roots.forEach(r=>cont.appendChild(renderNode(r)));
    }

    // Click de botones “Pregúntame”
    cont.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-quiz]");
      if(!btn) return;
      const id = btn.getAttribute("data-quiz");
      if(!id) return;
      startQuizForId(id);
    });

    /* =========================
       EVENTOS UI
    ========================= */
    btnCloseModal.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target === modalOverlay) closeModal();
    });
    btnNextQuestion.addEventListener("click", renderQuestion);
    btnBlank.addEventListener("click", blankQuestion);

    document.addEventListener("keydown", (e)=>{
      if(!modalOverlay.classList.contains("show")) return;
      if(e.key === "Escape") closeModal();
      if(e.key === "Enter") renderQuestion();
    });

    btnTemaRandom.addEventListener("click", startQuizTema);
    btnSoloFalladas.addEventListener("click", startQuizFalladas);

    btnResetStats.addEventListener("click", ()=>{
      if(!confirm("¿Seguro que quieres borrar falladas y stats guardadas?")) return;
      STORE = { wrongUids: {}, stats: { ok:0, bad:0, blank:0 } };
      saveStore();
      refreshTemaStats();
      alert("Listo: reiniciado.");
    });

    // ✅ Arranque
    refreshTemaStats();
    renderScoreLine();

  } catch (err) {
    showErr("Error fatal: " + (err && err.message ? err.message : String(err)));
    if(diag){
      diag.innerHTML = `Diagnóstico: <b>ERROR</b>`;
    }
  }
});
</script>
